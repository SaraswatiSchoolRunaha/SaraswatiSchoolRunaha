<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Search Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .search-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            border: 2px solid #003366; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            width: 400px;
            position: relative;
        }

        .search-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: #003366;
            border-radius: 6px 6px 0 0;
        }

        .center-header { text-align: center; }

        h2 {
            color: #003366;
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .input-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 11px;
            color: #444;
            margin-bottom: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fff;
        }

        input[type="text"]:focus, select:focus {
            border-color: #003366;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 51, 102, 0.2);
        }

        .captcha-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        #captchaValue {
            background: #f4f4f4;
            padding: 10px 20px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 4px;
            border-radius: 4px;
            border: 1px dashed #003366;
            color: #003366;
            user-select: none;
            font-size: 18px;
        }

        .refresh-btn {
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
            color: #003366;
        }

        button.submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button.submit-btn:hover {
            background-color: #002244;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #777;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body onload="generateCaptcha()">

<div class="search-container">
    <div class="center-header">
        <h2>Student Portal</h2>
    </div>
    
    <div class="input-group">
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="Enter Roll No.">
    </div>

    <div class="input-group" style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>Class</label>
            <select id="class">
                <option value="12th">12वीं (Higher Secondary)</option>
                <option value="10th">10वीं (Secondary</option>
                <option value="9th">9th </option>
                <option value="8th">8th </option>
                <option value="7th">7th </option>
                <option value="6th">6th </option>
                <option value="5th">5th </option>
                <option value="4th">4th </option>
                <option value="3rd">3rd </option>
                <option value="2nd">2nd </option>
                <option value="1st">1st </option>
                <option value="KG2">KG2 </option>
                <option value="KG1"> KG1 </option>   
            </select>
        </div>
        <div style="flex: 1;">
            <label>Academic Year</label>
            <select id="year">
                <option value="">--Select--</option>
                <option value="2026-27">2026-27</option>
                <option value="2025-26">2025-26</option>
                <option value="2024-25">2024-25</option>
                <option value="2023-24">2023-24</option>
                <option value="2022-23">2022-23</option>
                <option value="2021-22">2021-22</option>
                <option value="2020-21">2020-21</option>
                <option value="2019-20">2019-20</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Security Captcha</label>
        <div class="captcha-row">
            <div id="captchaValue"></div>
            <button type="button" class="refresh-btn" onclick="generateCaptcha()">🔄</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter code">
    </div>

    <button class="submit-btn" onclick="validateAndGo()">SUBMIT REQUEST</button>

    <div class="footer-text">
        &copy; 2026 Marksheet Correction Portal
    </div>
</div>

<script>
let generatedCode = "";

function generateCaptcha() {
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let code = "";
    for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    generatedCode = code;
    document.getElementById("captchaValue").innerText = code;
    document.getElementById("captchaInput").value = ""; 
}

// Enter Key दबाने पर भी सबमिट होगा
document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        validateAndGo();
    }
});

function validateAndGo() {
    const roll = document.getElementById("roll").value;
    const sClass = document.getElementById("class").value;
    const year = document.getElementById("year").value;
    const userInput = document.getElementById("captchaInput").value;

    if (roll.trim() === "" || sClass === "" || year === "") {
        alert("Please fill all fields properly.");
        return;
    }

    if (userInput.toUpperCase() !== generatedCode) {
        alert("Invalid Captcha code!");
        generateCaptcha();
        return;
    }

    // स्पेलिंग सही कर दी गई है: marksheetcorrection.html
    const url = "marksheetcorrection.html?roll=" + encodeURIComponent(roll) + 
                "&class=" + encodeURIComponent(sClass) + 
                "&year=" + encodeURIComponent(year);

    window.location.href = url;
}
</script>

</body>
</html>
