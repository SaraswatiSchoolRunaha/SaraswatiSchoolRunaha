<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Search Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Humne font fix kiya hai taaki MIME error na aaye -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .search-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            border-top: 5px solid #003366; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            width: 95%;           
            max-width: 400px;     
        }
        .center-header { text-align: center; }
        h2 { color: #003366; margin-bottom: 30px; font-weight: 600; text-transform: uppercase; font-size: 1.3rem; letter-spacing: 1px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; color: #444; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; background-color: #fff; }
        .captcha-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        #captchaValue { background: #f4f4f4; padding: 10px 20px; font-weight: bold; letter-spacing: 4px; border-radius: 4px; border: 1px dashed #003366; color: #003366; user-select: none; font-size: 20px; }
        .refresh-btn { cursor: pointer; font-size: 20px; background: none; border: none; color: #003366; }
        button.submit-btn { width: 100%; padding: 15px; background-color: #003366; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .footer-text { text-align: center; font-size: 11px; color: #777; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body onload="generateCaptcha()">

<div class="search-container">
    <div class="center-header">
        <h2>Student Search Portal</h2>
    </div>
    
    <div class="input-group">
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="Enter Roll No." autofocus>
    </div>

    <div class="input-group" style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>Class</label>
            <select id="class">
                <option value="">--Select--</option>
                <option value="12th">12th</option>
                <option value="11th">11th</option>
                <option value="10th">10th</option>
                <option value="9th">9th</option>
                <option value="8th">8th</option>
                <option value="7th">7th</option>
                <option value="6th">6th</option>
                <option value="5th">5th</option>
                <option value="4th">4th</option>
                <option value="3rd">3rd</option>
                <option value="2nd">2nd</option>
                <option value="1st">1st</option>
                <option value="KG2">KG2</option>
                <option value="KG1">KG1</option>    
            </select>
        </div>
        <div style="flex: 1;">
            <label>Academic Year</label>
            <select id="year">
                <option value="">--Select--</option>
                <option value="2026-27">2026-27</option>
                <option value="2025-26">2025-26</option>
                <option value="2024-25">2024-25</option>
                <option value="2023-24">2023-24</option>
                <option value="2022-23">2022-23</option>
                <option value="2021-22">2021-22</option>
                <option value="2020-21">2020-21</option>
                <option value="2019-20">2019-20</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Security Captcha</label>
        <div class="captcha-row">
            <div id="captchaValue"></div>
            <button type="button" class="refresh-btn" onclick="generateCaptcha()">🔄</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter code">
    </div>

    <button class="submit-btn" onclick="validateAndGo()">SUBMIT REQUEST</button>

    <div class="footer-text">
        &copy; 2026 Marksheet Correction Portal
    </div>
</div>

<script>
let generatedCode = "";

function generateCaptcha() {
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let code = "";
    for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    generatedCode = code;
    document.getElementById("captchaValue").innerText = code;
    document.getElementById("captchaInput").value = "";
}

function validateAndGo() {
    const roll = document.getElementById("roll").value.trim();
    const sClass = document.getElementById("class").value;
    const year = document.getElementById("year").value;
    const userInput = document.getElementById("captchaInput").value.trim();

    if (roll === "" || sClass === "" || year === "") {
        alert("Please fill all fields properly.");
        return;
    }

    if (userInput.toUpperCase() !== generatedCode) {
        alert("Invalid Captcha code!");
        generateCaptcha();
        return;
    }

    const btn = document.querySelector(".submit-btn");
    btn.innerText = "SEARCHING...";
    btn.disabled = true;

    google.script.run
        .withSuccessHandler(function(response) {
            console.log("Server Response:", response);
            
            if (response && response.status === "success") {
                // scriptUrl ko safe tarike se handle karein
                var baseUrl = '<?!= scriptUrl ?>'; 
                
                var finalUrl = baseUrl 
                    + "?page=correction"
                    + "&roll=" + encodeURIComponent(roll)
                    + "&class=" + encodeURIComponent(sClass)
                    + "&year=" + encodeURIComponent(year);

                window.top.location.href = finalUrl;
            } else {
                alert("Result: " + (response ? response.message : "Record nahi mila"));
                resetButton(btn);
            }
        })
        .withFailureHandler(function(err) {
            console.error("Script Run Error:", err);
            alert("System Error: " + err.toString());
            resetButton(btn);
        })
       .getStudentData(roll, sClass, year); 
}        
    
    .withFailureHandler(function(err) {
            console.error("Script Run Error:", err);
            alert("Critical Error: " + err.toString());
            resetButton(btn);
        })
        .getStudentData(roll, sClass, year); 
}

function resetButton(btn) {
    btn.innerText = "SUBMIT REQUEST";
    btn.disabled = false;
    generateCaptcha();
}

document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { validateAndGo(); }
});
</script>
</body>
</html>
