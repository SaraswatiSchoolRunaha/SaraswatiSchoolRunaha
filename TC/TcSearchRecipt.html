<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search TC Receipt | टीसी रसीद खोजें</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .search-container { background-color: #ffffff; width: 100%; max-width: 500px; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-top: 6px solid #1a73e8; }
        .search-header { text-align: center; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #444; }
        input { padding: 12px; border: 1.5px solid #dadce0; border-radius: 6px; font-size: 16px; outline: none; }
        .captcha-box { background: #e2e8f0; font-weight: bold; font-size: 20px; letter-spacing: 5px; padding: 10px; text-align: center; border-radius: 6px; margin-bottom: 10px; }
        .search-btn { background-color: #1a73e8; color: white; border: none; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .error-message { color: #d93025; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="search-container">
    <div class="search-header">
        <h2>Print TC Application Receipt</h2>
        <p>आवेदन रसीद प्रिंट करने के लिए खोजें</p>
    </div>

    <form id="searchForm" onsubmit="executeSearch(event)">
        <div class="form-group">
            <label for="appNo">Application Number <span style="color:red">*</span></label>
            <input type="text" id="appNo" required placeholder="E.G. TC-2026-8542">
        </div>
        <div class="form-group">
            <label for="mobileNo">Mobile Number <span style="color:red">*</span></label>
            <input type="tel" id="mobileNo" required pattern="[0-9]{10}" placeholder="10-DIGIT NUMBER">
        </div>
        <div class="form-group">
            <label>Verification Code</label>
            <div class="captcha-box" id="captchaDisplay">XXXXXX</div>
            <input type="text" id="captchaInput" required placeholder="ENTER CODE" maxlength="6">
        </div>
        <button type="submit" id="searchBtn" class="search-btn">Search & Print</button>
        <div id="errorMsg" class="error-message"></div>
    </form>
</div>

<script>
    var generatedCode = "";
    function generateCaptcha() {
        var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        generatedCode = Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        document.getElementById('captchaDisplay').innerText = generatedCode;
    }
    window.onload = generateCaptcha;

    function executeSearch(event) {
        event.preventDefault();
        var errorMsg = document.getElementById('errorMsg');
        var searchBtn = document.getElementById('searchBtn');

        if (document.getElementById('captchaInput').value.toUpperCase() !== generatedCode) {
            errorMsg.innerText = "गलत चैप्टर कोड!"; errorMsg.style.display = 'block'; generateCaptcha(); return;
        }

        searchBtn.disabled = true; searchBtn.innerText = "Searching...";

        var formData = new FormData();
        formData.append('applicationNo', document.getElementById('appNo').value);
        formData.append('mobile', document.getElementById('mobileNo').value);

        fetch("YOUR_WEB_APP_URL_HERE", {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "SUCCESS") {
                localStorage.setItem("tcData", JSON.stringify(data));
                window.location.href = "TcReciptPrint.html";
            } else {
                errorMsg.innerText = "रिकॉर्ड नहीं मिला!"; errorMsg.style.display = 'block';
                searchBtn.disabled = false; searchBtn.innerText = "Search & Print";
            }
        });
    }
</script>
</body>
</html>
