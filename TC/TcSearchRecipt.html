<!DOCTYPE html>
<html>
<head>
    <title>Search TC Receipt | टीसी रसीद खोजें</title>
  <style>
    /* 🔥 PAGE BACKGROUND */
    body{
      font-family: Arial;
      background:#e3f2fd;
      margin:0;
      padding:30px;
    }

    /* 🔥 OUTER PAGE BORDER */
    .page{
      max-width:800px;
      margin:auto;
      border:4px solid #1565c0;
      background:white;
      padding:20px;
      border-radius:0px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .box{
      padding:20px;
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

      .input-group {
    margin-bottom: 15px;
    }
    .input-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
    }





      
    .captcha-box{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:15px 0;
    }

    #captchaText{
      padding:8px 15px;
      background:#f5f5f5;
      border:1px solid #000;
      font-weight:bold;
      letter-spacing:3px;
      border-radius:6px;
      min-width: 100px;
      display: inline-block;
      text-align: center;
    }

    .refresh-btn{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      background:#ff9800;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .refresh-btn:hover{
      background:#e68900;
      transform:scale(1.05);
    }

    #captchaInput{
      display:block;
      margin:15px auto;
      padding:10px;
      width:40%;
      text-align:center;
      border-radius:8px;
      border:1px solid #1e88e5;
    }

    .submit{
      display:block;
      margin:15px auto;
      padding:12px 25px;
      background:#43a047;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .submit:hover{
      background:#2e7d32;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="box">
    <h2>Print TC Application Receipt</h2>
      <p>आवेदन रसीद प्रिंट करने के लिए खोजें</p>

      <div class="input-group" style="margin-bottom: 15px;">
    <label for="appNo" style="display: block; font-weight: bold; margin-bottom: 5px;">Application Number</label>
    <input type="text" id="appNo" placeholder="E.G. TC-2026-8542" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
</div>

<div class="input-group" style="margin-bottom: 15px;">
    <label for="mobile" style="display: block; font-weight: bold; margin-bottom: 5px;">Mobile Number</label>
    <input type="tel" id="mobile" placeholder="10-digit Mobile Number" maxlength="10" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
</div>

    <div class="captcha-box">
      <span id="captchaText"></span>
      <button type="button" class="refresh-btn" onclick="generateCaptcha()">
        🔄 Refresh
      </button>
    </div>

    <input type="text" id="captchaInput" placeholder="Enter Captcha">
    <button class="submit" onclick="openReceipt()">Submit</button>
  </div>
</div>

<script>
let captcha = "";

window.onload = function() {
    generateCaptcha();
};

function generateCaptcha(){
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    captcha = "";
    for(let i=0; i<6; i++){
        captcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captchaText").innerText = captcha;
}

async function openReceipt() {
    let appNo = document.getElementById("appNo").value.trim();
    let mobileValue = document.getElementById("mobile").value.trim();
    let cap = document.getElementById("captchaInput").value.trim();
    let btn = document.querySelector(".submit");

    if (!appNo || !mobileValue) {
        alert("कृपया Application No और Mobile भरें");
        return;
    }

    if (cap.toUpperCase() !== captcha) {
        alert("Captcha गलत है");
        generateCaptcha();
        return;
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycbx9FMkptJA9pIChCwwHwD6DAp2QknNvy7lM4UmxJUWHK-Wn2ZN-66HYgoZYjFjnZRPc8g/exec";

    btn.innerText = "Verifying...";
    btn.disabled = true;

    try {
        const finalURL = `${scriptURL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobileValue)}&t=${new Date().getTime()}`;
        
        const response = await fetch(finalURL, {
            method: "GET",
            mode: "cors",
            redirect: "follow"
        });

        if (!response.ok) throw new Error("Network response was not ok");

        const result = await response.json();

        if (result.status === "SUCCESS") {
            localStorage.setItem("tcData", JSON.stringify(result));
            window.location.href = "TcReciptPrint.html";
        } 
        else if (result.status === "NOT_FOUND") {
            alert("❌ रिकॉर्ड नहीं मिला। कृपया एप्लिकेशन नंबर और मोबाइल नंबर की जाँच करें।");
        } 
        else {
            alert("❌ एरर: " + (result.message || "डेटाबेस में जानकारी उपलब्ध नहीं है।"));
        }

    } catch (error) {
        console.error("Verification Error:", error);
        alert("⚠️ सर्वर से संपर्क नहीं हो पाया।\nसुनिश्चित करें कि Apps Script को 'Anyone' के लिए Deploy किया गया है।");
    } finally {
        btn.innerText = "Submit";
        btn.disabled = false;
        generateCaptcha();
    }
}
</script>
</body>
</html>
