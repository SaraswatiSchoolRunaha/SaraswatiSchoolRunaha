<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search TC Receipt | टीसी रसीद खोजें</title>
    <style>
        /* 🔥 MODERN GLOBAL STYLES */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🔥 PREMIUM CARD CONTAINER */
        .page {
            width: 100%;
            max-width: 500px;
            margin: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(21, 101, 192, 0.15);
            overflow: hidden;
            border-top: 6px solid #1565c0;
        }

        .box {
            padding: 35px 30px;
        }

        /* 🔥 TYPOGRAPHY */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            margin: 0 0 8px 0;
            color: #1565c0;
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        /* 🔥 INPUT GROUPS */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #37474f;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 2px solid #cfd8dc;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1565c0;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(21, 101, 192, 0.1);
        }

        /* 🔥 MODERN CAPTCHA STYLE */
        .captcha-wrapper {
            background: #f8f9fa;
            border: 1px dashed #b0bec5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .captcha-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        #captchaText {
            padding: 10px 20px;
            background: linear-gradient(45deg, #cfd8dc, #eceff1);
            border: 2px solid #90a4ae;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 5px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
            user-select: none;
            color: #263238;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .refresh-btn {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #ff9800;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .refresh-btn:hover {
            background: #e68900;
            transform: translateY(-1px);
        }

        #captchaInput {
            display: block;
            margin: 15px auto 0 auto;
            padding: 12px;
            width: 80%;
            text-align: center;
            border-radius: 8px;
            border: 2px solid #cfd8dc;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #captchaInput:focus {
            outline: none;
            border-color: #1565c0;
            box-shadow: 0 0 0 4px rgba(21, 101, 192, 0.1);
        }

        /* 🔥 MODERN BUTTON */
        .submit {
            width: 100%;
            padding: 14px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
            margin-top: 10px;
        }

        .submit:hover {
            background: #1b5e20;
            box-shadow: 0 6px 16px rgba(46, 125, 50, 0.3);
            transform: translateY(-1px);
        }

        .submit:disabled {
            background: #a5d6a7;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="box">
        <div class="header-section">
            <h2>Print TC Application Receipt</h2>
            <p class="subtitle">आवेदन रसीद प्रिंट करने के लिए खोजें</p>
        </div>

        <div class="input-group">
            <label for="appNo">Application Number / आवेदन संख्या</label>
            <input type="text" id="appNo" placeholder="E.G. TC-2026-8542">
        </div>

        <div class="input-group">
            <label for="mobile">Mobile Number / मोबाइल नंबर</label>
            <input type="tel" id="mobile" placeholder="10-digit Mobile Number" maxlength="10">
        </div>

        <div class="captcha-wrapper">
            <div class="captcha-box">
                <span id="captchaText"></span>
                <button type="button" class="refresh-btn" onclick="generateCaptcha()">
                    🔄 Refresh
                </button>
            </div>
            <input type="text" id="captchaInput" placeholder="Enter Captcha">
        </div>

        <button class="submit" onclick="openReceipt()">Submit</button>
    </div>
</div>

<script>
let captcha = "";

window.onload = function() {
    generateCaptcha();
};

function generateCaptcha(){
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    captcha = "";
    for(let i=0; i<6; i++){
        captcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captchaText").innerText = captcha;
}

async function openReceipt() {
    let appNo = document.getElementById("appNo").value.trim();
    let mobileValue = document.getElementById("mobile").value.trim();
    let cap = document.getElementById("captchaInput").value.trim();
    let btn = document.querySelector(".submit");

    if (!appNo || !mobileValue) {
        alert("कृपया Application No और Mobile भरें");
        return;
    }

    if (cap.toUpperCase() !== captcha) {
        alert("Captcha गलत है");
        generateCaptcha();
        return;
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycbx9FMkptJA9pIChCwwHwD6DAp2QknNvy7lM4UmxJUWHK-Wn2ZN-66HYgoZYjFjnZRPc8g/exec";

    btn.innerText = "Verifying...";
    btn.disabled = true;

    try {
        const finalURL = `${scriptURL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobileValue)}&t=${new Date().getTime()}`;
        
        const response = await fetch(finalURL, {
            method: "GET",
            mode: "cors",
            redirect: "follow"
        });

        if (!response.ok) throw new Error("Network response was not ok");

        const result = await response.json();

        if (result.status === "SUCCESS") {
            localStorage.setItem("tcData", JSON.stringify(result));
            window.location.href = "TcReciptPrint.html";
        } 
        else if (result.status === "NOT_FOUND") {
            alert("❌ रिकॉर्ड नहीं मिला। कृपया एप्लिकेशन नंबर और मोबाइल नंबर की जाँच करें।");
        } 
        else {
            alert("❌ एरर: " + (result.message || "डेटाबेस में जानकारी उपलब्ध नहीं है।"));
        }

    } catch (error) {
        console.error("Verification Error:", error);
        alert("⚠️ सर्वर से संपर्क नहीं हो पाया।\nसुनिश्चित करें कि Apps Script को 'Anyone' के लिए Deploy किया गया है।");
    } finally {
        btn.innerText = "Submit";
        btn.disabled = false;
        generateCaptcha();
    }
}
</script>
</body>
</html>
