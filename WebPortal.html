    // 2. डेटा लाने वाला नया फंक्शन
    async function fetchSheetData(title) {
        const url = sheetUrls[title];
        if (!url) {
            document.getElementById('contentArea').innerHTML = `<h3>${title}</h3><p>डेटा सोर्स कॉन्फ़िगर नहीं है।</p>`;
            return;
        }

        document.getElementById('contentArea').innerHTML = "डेटा लोड हो रहा है...";
        try {
            const response = await fetch(url);
            const data = await response.json();
            renderTable(data);
        } catch (e) {
            document.getElementById('contentArea').innerHTML = "डेटा लाने में त्रुटि हुई। (Google Web App पब्लिशिंग चेक करें)";
        }
    }

    // 3. टेबल रेंडर करने वाला सुरक्षित फंक्शन
function renderTable(data) {
    if (!data || data.length === 0) {
        document.getElementById('contentArea').innerHTML = "कोई डेटा नहीं मिला।";
        return;
    }

    // सभी ऑब्जेक्ट्स के keys को इकट्ठा करें (ताकि अगर किसी row में key न हो तो भी error न आए)
    let allKeys = new Set();
    data.forEach(row => {
        Object.keys(row).forEach(key => allKeys.add(key));
    });
    let headers = Array.from(allKeys);

    let html = "<table><tr>" + headers.map(h => `<th>${h}</th>`).join('') + "</tr>";
    
    data.forEach(row => {
        html += "<tr>";
        headers.forEach(h => {
            // यदि वैल्यू undefined है, तो उसे खाली स्ट्रिंग ('') दिखाएं
            let cellValue = (row[h] !== undefined && row[h] !== null) ? row[h] : "";
            html += `<td>${cellValue}</td>`;
        });
        html += "</tr>";
    });
    
    document.getElementById('contentArea').innerHTML = html + "</table>";
}

  function buildMenu() {
        const container = document.getElementById('sideMenuContainer');
        container.innerHTML = "";
        const roleData = permissions[currentUserRole];
        document.getElementById('userRoleBadge').innerText = currentUserRole.toUpperCase();
        
        for (const [module, options] of Object.entries(roleData)) {
            const iconClass = icons[module] || 'fa-bars';
            const li = document.createElement('li');
            
            // अगर ऑप्शंस खाली हैं, तो डैशबोर्ड जैसा साधारण बटन
            if (options.length === 0) {
                li.innerHTML = `<div class="module-btn" onclick="showDashboard()"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span></div>`;
            } 
            // अगर ऑप्शंस हैं, तो सब-मेनू वाला बटन
            else {
                li.innerHTML = `<div class="module-btn" onclick="toggleSubMenu(this)">
                                    <span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span>
                                    <i class="fa-solid fa-chevron-down fa-xs"></i>
                                </div>
                                <div class="sub-menu">
                                    ${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${translations[currentLang][opt]}</a>`).join('')}
                                </div>`;
            }
            container.appendChild(li);
        }
    }
       
// 1. फॉर्म और क्लास सिलेक्शन
function showAttendanceForm() {
    document.getElementById('pageTitle').innerText = "दैनिक उपस्थिति";

    // सभी यूनिक क्लास निकालें
    let classes = [...new Set(window.lastData.map(s => s['Class'] || s['class']))].filter(c => c !== undefined && c !== "");

    let html = `
        <div style="margin-bottom:20px; display:flex; gap:15px; align-items:center;">
            <div>
                <label>तारीख: </label>
                <input type="date" id="attDate" value="${new Date().toISOString().split('T')[0]}">
            </div>
            <div>
                <label>कक्षा चुनें: </label>
                <select id="classFilter" onchange="filterStudentsByClass()">
                    <option value="">-- कक्षा चुनें --</option>
                    ${classes.map(cls => `<option value="${cls}">${cls}</option>`).join('')}
                </select>
            </div>
        </div>
        <div id="attendanceTableContainer"></div>
    `;
    document.getElementById('contentArea').innerHTML = html;
}

// 2. क्लास के हिसाब से टेबल फिल्टर करना
function filterStudentsByClass() {
    let selectedClass = document.getElementById('classFilter').value;
    if (!selectedClass) {
        document.getElementById('attendanceTableContainer').innerHTML = "";
        return;
    }

    // डेटा को फिल्टर करें (स्पेलिंग की किसी भी गलती को हैंडल करने के लिए)
    let filteredStudents = window.lastData.filter(s => {
        let cls = s['Class'] || s['class'] || s['CLASS'] || "";
        return cls == selectedClass;
    });

    let html = `
        <table id="attTable">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Father Name</th>
                    <th>Medium</th>
                    <th>Class</th>
                    <th>Status (P/A)</th>
                </tr>
            </thead>
            <tbody>
                ${filteredStudents.map(s => {
                    // डेटा सुरक्षित रूप से निकालने के लिए (Fallback logic)
                    let id = s['Student ID'] || s['ID'] || s['id'] || '-';
                    let name = s['Student Name'] || s['Name'] || s['name'] || '-';
                    let father = s['Father Name'] || s['FatherName'] || s['father'] || '-';
                    let medium = s['Medium'] || s['medium'] || '-';
                    let cls = s['Class'] || s['class'] || '-';

                    return `
                    <tr>
                        <td>${id}</td>
                        <td>${name}</td>
                        <td>${father}</td>
                        <td>${medium}</td>
                        <td>${cls}</td>
                        <td>
                            <select class="attStatus">
                                <option value="P">Present (P)</option>
                                <option value="A">Absent (A)</option>
                            </select>
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
        <button onclick="saveAttendance()" class="btn-action" style="margin-top:20px; background:#1e3a8a; color:white;">सबमिट उपस्थिति</button>
    `;
    document.getElementById('attendanceTableContainer').innerHTML = html;
}
       
// 3. डेटा सेव करना (इसे अपने पुराने फंक्शन से बदलें)
function saveAttendance() {
    let date = document.getElementById("attDate").value;
    let rows = document.querySelectorAll("#attTable tbody tr");
    
    if (!date) { alert("कृपया तारीख चुनें!"); return; }

    let attendance = [];
    rows.forEach(row => {
        attendance.push({
            date: date,
            id: row.cells[0].innerText,      // Student ID
            name: row.cells[1].innerText,    // Name
            father: row.cells[2].innerText,  // Father
            medium: row.cells[3].innerText,  // Medium
            class: row.cells[4].innerText,   // Class
            status: row.querySelector('.attStatus').value // Status (P/A)
        });
    });

    // अपना Web App URL यहाँ सही डालें
    const url = "https://script.google.com/macros/s/AKfycbxZJYBYZKp4iaAqiTeSlEJ-iR6J43kEDUH6COhy_jxm8eqvxBmybdmedyxqbYD8DI6y/exec";

    // बटन को लोड करते समय डिसेबल करें (ताकि डबल क्लिक न हो)
    event.target.innerText = "सेव हो रहा है...";
    event.target.disabled = true;

    fetch(url, {
        method: 'POST',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(attendance)
    })
    .then(response => response.text())
    .then(result => {
        alert("उपस्थिति सफलतापूर्वक दर्ज हो गई और कैलकुलेशन अपडेट हो गया!");
        event.target.innerText = "सबमिट उपस्थिति";
        event.target.disabled = false;
    })
    .catch(err => {
        alert("त्रुटि: " + err);
        event.target.innerText = "सबमिट उपस्थिति";
        event.target.disabled = false;
    });
}

        let html = `
        <div style="display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap; font-family:'Segoe UI', sans-serif;">
            <div style="background:linear-gradient(135deg,#1e3a8a,#3b82f6); color:white; padding:20px; border-radius:12px; min-width:180px; flex:1; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition:0.3s; cursor:pointer;"
                 onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                <div style="font-size:14px; opacity:0.9; text-transform:uppercase; letter-spacing:1px;">कुल छात्र</div>
                <div style="font-size:32px; font-weight:700; margin-top:8px;">${totalStudents}</div>
            </div>

            <div style="background:linear-gradient(135deg,#0f172a,#334155); color:white; padding:20px; border-radius:12px; min-width:180px; flex:1; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition:0.3s; cursor:pointer;"
                 onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                <div style="font-size:14px; opacity:0.9; text-transform:uppercase; letter-spacing:1px;">कुल कक्षाएं</div>
                <div style="font-size:32px; font-weight:700; margin-top:8px;">${Object.keys(classCount).length}</div>
            </div>
        </div>

        <div style="background:white; border-radius:10px; overflow:hidden; border:1px solid #ddd;">
            <div style="padding:15px; background:#f8fafc; font-weight:bold; border-bottom:1px solid #ddd;">कक्षा अनुसार छात्र संख्या</div>
            <table>
                <thead><tr><th>कक्षा</th><th>कुल छात्र</th></tr></thead>
                <tbody>
                    ${Object.keys(classCount).map(cls => `
                        <tr style="cursor:pointer;" onclick="showClassList('${cls}')" 
                            onmouseover="this.style.backgroundColor='#f1f5f9'" onmouseout="this.style.backgroundColor='transparent'">
                            <td>${cls}</td>
                            <td>${classCount[cls]}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;

        document.getElementById('contentArea').innerHTML = html;
    })
    .catch(error => {
        document.getElementById('contentArea').innerHTML = `
            <div style="color:red; padding:20px; background:#fff; border-radius:10px;">
                <h3>Dashboard डेटा लोड नहीं हुआ</h3>
                <p>${error.message}</p>
            </div>
        `;
    });
}       
    function showClassList(cls) {
        let filtered = window.lastData.filter(item => (item['class'] || 'N/A') === cls);
        let headers = Object.keys(filtered[0]);
        let html = `<button onclick="showDashboard()" class="btn-action">← वापस</button><table><tr>` 
                    + headers.map(h => `<th>${h}</th>`).join('') + `</tr>`;
        filtered.forEach(row => {
            html += "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join('') + "</tr>";
        });
        document.getElementById('contentArea').innerHTML = html + "</table>";
    }

    function showContent(title) {
    document.getElementById('pageTitle').innerText = translations[currentLang][title];
    
    // नया अटेंडेंस मॉड्यूल के लिए कंडीशन
    if (title === 'दैनिक उपस्थिति') {
        showAttendanceForm(); // यह वह फंक्शन है जो मैंने अभी आपको दिया था
    }
    // अगर डेटा पहले से लोड है और 'सभी छात्र' देखना है
    else if (title === 'सभी छात्र' && window.lastData) {
        renderTable(window.lastData);
    } 
    // अगर डेटा मौजूद नहीं है, तो 'Database' से लोड करें
    else if (title === 'सभी छात्र') {
        fetchSheetData('Database'); 
    }
    // बाकी ऑप्शंस के लिए
    else {
        fetchSheetData(title);
    }
}



       
    function toggleSubMenu(element) { const subMenu = element.nextElementSibling; subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block"; }
    function setLang(lang) { currentLang = lang; buildMenu(); showDashboard(); }
    function logout() { if(confirm("क्या आप लॉग आउट होना चाहते हैं?")) window.location.href = 'index.html'; }

    buildMenu();
    showDashboard();
</script>
</body>
</html>
