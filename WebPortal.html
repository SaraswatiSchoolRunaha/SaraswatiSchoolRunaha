     /* Newscast Ticker CSS */
.news-ticker { 
    background: #1e3a8a; 
    color: white; 
    padding: 10px; 
    overflow: hidden; 
    white-space: nowrap; 
    border-radius: 4px; 
    margin-bottom: 20px; 
    position: sticky; 
    top: 0; 
    z-index: 100;
}
.news-ticker span { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 20s linear infinite; 
}
@keyframes ticker { 
    0% { transform: translate(0, 0); } 
    100% { transform: translate(-100%, 0); } 
}

    // 2. डेटा लाने वाला नया फंक्शन
    async function fetchSheetData(title) {
        const url = sheetUrls[title];
        if (!url) {
            document.getElementById('contentArea').innerHTML = `<h3>${title}</h3><p>डेटा सोर्स कॉन्फ़िगर नहीं है।</p>`;
            return;
        }

        document.getElementById('contentArea').innerHTML = "डेटा लोड हो रहा है...";
        try {
            const response = await fetch(url);
            const data = await response.json();
            renderTable(data);
        } catch (e) {
            document.getElementById('contentArea').innerHTML = "डेटा लाने में त्रुटि हुई। (Google Web App पब्लिशिंग चेक करें)";
        }
    }

    // 3. टेबल रेंडर करने वाला सुरक्षित फंक्शन
function renderTable(data) {
    if (!data || data.length === 0) {
        document.getElementById('contentArea').innerHTML = "कोई डेटा नहीं मिला।";
        return;
    }

    // सभी ऑब्जेक्ट्स के keys को इकट्ठा करें (ताकि अगर किसी row में key न हो तो भी error न आए)
    let allKeys = new Set();
    data.forEach(row => {
        Object.keys(row).forEach(key => allKeys.add(key));
    });
    let headers = Array.from(allKeys);

    let html = "<table><tr>" + headers.map(h => `<th>${h}</th>`).join('') + "</tr>";
    
    data.forEach(row => {
        html += "<tr>";
        headers.forEach(h => {
            // यदि वैल्यू undefined है, तो उसे खाली स्ट्रिंग ('') दिखाएं
            let cellValue = (row[h] !== undefined && row[h] !== null) ? row[h] : "";
            html += `<td>${cellValue}</td>`;
        });
        html += "</tr>";
    });
    
    document.getElementById('contentArea').innerHTML = html + "</table>";
}

  function buildMenu() {
        const container = document.getElementById('sideMenuContainer');
        container.innerHTML = "";
        const roleData = permissions[currentUserRole];
        document.getElementById('userRoleBadge').innerText = currentUserRole.toUpperCase();
        
        for (const [module, options] of Object.entries(roleData)) {
            const iconClass = icons[module] || 'fa-bars';
            const li = document.createElement('li');
            
            // अगर ऑप्शंस खाली हैं, तो डैशबोर्ड जैसा साधारण बटन
            if (options.length === 0) {
                li.innerHTML = `<div class="module-btn" onclick="showDashboard()"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span></div>`;
            } 
            // अगर ऑप्शंस हैं, तो सब-मेनू वाला बटन
            else {
                li.innerHTML = `<div class="module-btn" onclick="toggleSubMenu(this)">
                                    <span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span>
                                    <i class="fa-solid fa-chevron-down fa-xs"></i>
                                </div>
                                <div class="sub-menu">
                                    ${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${translations[currentLang][opt]}</a>`).join('')}
                                </div>`;
            }
            container.appendChild(li);
        }
    }
       
// 1. फॉर्म और क्लास सिलेक्शन
function showAttendanceForm() {
    document.getElementById('pageTitle').innerText = "दैनिक उपस्थिति";

    // सभी यूनिक क्लास निकालें
    let classes = [...new Set(window.lastData.map(s => s['Class'] || s['class']))].filter(c => c !== undefined && c !== "");

    let html = `
        <div style="margin-bottom:20px; display:flex; gap:15px; align-items:center;">
            <div>
                <label>तारीख: </label>
                <input type="date" id="attDate" value="${new Date().toISOString().split('T')[0]}">
            </div>
            <div>
                <label>कक्षा चुनें: </label>
                <select id="classFilter" onchange="filterStudentsByClass()">
                    <option value="">-- कक्षा चुनें --</option>
                    ${classes.map(cls => `<option value="${cls}">${cls}</option>`).join('')}
                </select>
            </div>
        </div>
        <div id="attendanceTableContainer"></div>
    `;
    document.getElementById('contentArea').innerHTML = html;
}

// 2. क्लास के हिसाब से टेबल फिल्टर करना
function filterStudentsByClass() {
    let selectedClass = document.getElementById('classFilter').value;
    if (!selectedClass) {
        document.getElementById('attendanceTableContainer').innerHTML = "";
        return;
    }

    // डेटा को फिल्टर करें (स्पेलिंग की किसी भी गलती को हैंडल करने के लिए)
    let filteredStudents = window.lastData.filter(s => {
        let cls = s['Class'] || s['class'] || s['CLASS'] || "";
        return cls == selectedClass;
    });

    let html = `
        <table id="attTable">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Father Name</th>
                    <th>Medium</th>
                    <th>Class</th>
                    <th>Status (P/A)</th>
                </tr>
            </thead>
            <tbody>
                ${filteredStudents.map(s => {
                    // डेटा सुरक्षित रूप से निकालने के लिए (Fallback logic)
                    let id = s['Student ID'] || s['ID'] || s['id'] || '-';
                    let name = s['Student Name'] || s['Name'] || s['name'] || '-';
                    let father = s['Father Name'] || s['FatherName'] || s['father'] || '-';
                    let medium = s['Medium'] || s['medium'] || '-';
                    let cls = s['Class'] || s['class'] || '-';

                    return `
                    <tr>
                        <td>${id}</td>
                        <td>${name}</td>
                        <td>${father}</td>
                        <td>${medium}</td>
                        <td>${cls}</td>
                        <td>
                            <select class="attStatus">
                                <option value="P">Present (P)</option>
                                <option value="A">Absent (A)</option>
                            </select>
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
     <button onclick="saveAttendance(event)" class="btn-action" style="margin-top:20px; background:#1e3a8a; color:white;">सबमिट उपस्थिति</button>
  `;
    document.getElementById('attendanceTableContainer').innerHTML = html;
}
       
// 3. डेटा सेव करना (इसे अपने पुराने फंक्शन से बदलें)
function saveAttendance(event) {
    let btn = event.target; // अब यहाँ बटन की सही पहचान होगी
    let date = document.getElementById("attDate").value;
    let rows = document.querySelectorAll("#attTable tbody tr");
    
    if (!date) { alert("कृपया तारीख चुनें!"); return; }

    let attendance = [];
    rows.forEach(row => {
        attendance.push({
            date: date,
            "Student ID": row.cells[0].innerText.trim(),
            "Student Name": row.cells[1].innerText.trim(),
            "Father Name": row.cells[2].innerText.trim(),
            "Medium": row.cells[3].innerText.trim(),
            "Class": row.cells[4].innerText.trim(),
            "Status": row.querySelector('.attStatus').value
        });
    });

    // अपना सही वेब ऐप URL यहाँ डालें
    const url = "https://script.google.com/macros/s/AKfycbxZJYBYZKp4iaAqiTeSlEJ-iR6J43kEDUH6COhy_jxm8eqvxBmybdmedyxqbYD8DI6y/exec";

    btn.innerText = "सेव हो रहा है...";
    btn.disabled = true;

    fetch(url, {
        method: 'POST',
        mode: 'no-cors', // इसे जरूर जोड़ें
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(attendance)
    })
    .then(() => {
        alert("उपस्थिति सफलतापूर्वक दर्ज हो गई!");
        btn.innerText = "सबमिट उपस्थिति";
        btn.disabled = false;
    })
    .catch(err => {
        alert("त्रुटि: " + err);
        btn.innerText = "सबमिट उपस्थिति";
        btn.disabled = false;
    });
}
    
function showDashboard() {

    document.getElementById('pageTitle').innerText =
        translations[currentLang]['डैशबोर्ड'];

    document.getElementById('contentArea').innerHTML = `
            <div id="dashboardResults">

                <i class="fa-solid fa-spinner fa-spin"></i>
                डेटा लोड हो रहा है...
            </div>
        </div>
    `;

    fetch(sheetUrls['Database'] + "?action=getDashboard")
        .then(response => {
            if (!response.ok) {
                throw new Error("Server Response Error");
            }
            return response.json();
        })
        .then(data => {

            if (!Array.isArray(data) || data.length === 0) {

            document.getElementById('dashboardResults').innerHTML = `
                <div style="color:red; padding:20px;">

}
       
         function showClassList(cls) {
        let filtered = window.lastData.filter(item => (item['class'] || 'N/A') === cls);
        let headers = Object.keys(filtered[0]);
        let html = `<button onclick="showDashboard()" class="btn-action">← वापस</button><table><tr>` 
                    + headers.map(h => `<th>${h}</th>`).join('') + `</tr>`;
        filtered.forEach(row => {
            html += "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join('') + "</tr>";
        });
        document.getElementById('contentArea').innerHTML = html + "</table>";
    }

function submitNewStudent() {
    const studentId = document.getElementById('sid').value;
    const sname = document.getElementById('sname').value;
    const fname = document.getElementById('fname').value;
    const med = document.getElementById('med').value;
    const cls = document.getElementById('cls').value;

    // वैलिडेशन: क्या ID खाली है?
    if (!studentId) {
        alert("कृपया Student ID दर्ज करें!");
        return;
    }

    const studentData = {
    action: "saveToStudentData",
    studentId: studentId,
    name: sname,
    father: fname,
    medium: med,
    class: cls
};

    const url = "https://script.google.com/macros/s/AKfycbxZJYBYZKp4iaAqiTeSlEJ-iR6J43kEDUH6COhy_jxm8eqvxBmybdmedyxqbYD8DI6y/exec";

    fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(studentData)
    })
    .then(() => {
        alert("छात्र (ID: " + studentId + ") सफलतापूर्वक जुड़ गया!");
        showDashboard(); 
    })
    .catch(err => alert("त्रुटि: " + err));
}

async function searchStudentById() {

    let searchId = document.getElementById('searchInput').value.trim();

    if (!searchId) {
        alert("कृपया Student ID डालें!");
        return;
    }

    try {

        const response = await fetch(
            sheetUrls['Database'] +
            "?action=searchById&studentId=" +
            encodeURIComponent(searchId)
        );

        const student = await response.json();

        if (student.status === "found") {

            document.getElementById('sid').value = student.studentId || '';
            document.getElementById('sname').value = student.name || '';
            document.getElementById('fname').value = student.father || '';
            document.getElementById('med').value = student.medium || '';
            document.getElementById('cls').value = student.class || '';

            alert("छात्र का विवरण मिल गया!");

        } else {

            document.getElementById('sid').value = '';
            document.getElementById('sname').value = '';
            document.getElementById('fname').value = '';
            document.getElementById('med').value = '';
            document.getElementById('cls').value = '';

            alert(student.message || "छात्र नहीं मिला");
        }

    } catch (err) {
        console.error(err);
        alert("डेटा प्राप्त करने में त्रुटि हुई");
    }
}
function showDeleteStudentList(){

    let cls =
        document.getElementById("deleteClassFilter").value;

    let students =
        window.studentDataList.filter(s =>
            (s.Class || s.class) == cls
        );

    let html = `
        <table>
            <tr>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Father Name</th>
                <th>Medium</th>
                <th>Class</th>
                <th>Action</th>
            </tr>
    `;

    students.forEach(stu => {

        html += `
        <tr>
            <td>${stu["Student ID"] || ""}</td>
            <td>${stu["Student Name"] || ""}</td>
            <td>${stu["Father Name"] || ""}</td>
            <td>${stu["Medium"] || ""}</td>
            <td>${stu["Class"] || ""}</td>
            <td>
                <button
                    style="background:red;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;"
                    onclick="deleteStudent('${stu["Student ID"]}')">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });

    html += "</table>";

    document.getElementById(
        "deleteStudentContainer"
    ).innerHTML = html;
}   
async function deleteStudent(studentId){

    if(!confirm(studentId + " को Delete करना चाहते हैं?")){
        return;
    }

    try{

        const response = await fetch(
            sheetUrls['StudentData'],
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    action:"deleteStudent",
                    studentId: studentId
                })
            }
        );

        const result = await response.json();

        alert(result.message);

        if(result.status === "success"){
            showContent("छात्र (Student) का नाम हटाए या डिलीट करें");
        }

    }catch(err){

        alert("Delete Error");

        console.log(err);

    }
}
