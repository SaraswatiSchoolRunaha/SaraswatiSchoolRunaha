<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; height: 100vh; background: #f4f6f9; font-family: sans-serif; margin: 0; }
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #ddd; }
        .sidebar-brand { padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
        .school-logo { font-size: 2rem; color: #1e3a8a; display: block; margin-bottom: 5px; }
        .school-name { font-weight: bold; color: #1e3a8a; font-size: 1.1rem; }
        .sidebar-menu { list-style: none; padding: 15px 0; }
        .module-btn { padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; color: #64748b; cursor: pointer; }
        .module-btn:hover { background: #f1f5f9; }
        .sub-menu { display: none; background: #f8fafc; }
        .sub-menu a { padding: 10px 25px 10px 50px; display: block; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 70px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .user-profile { font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .btn-action { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; }
        .page-body { padding: 30px; }
        .role-badge { padding: 4px 10px; background: #e0e7ff; color: #1e3a8a; border-radius: 12px; font-size: 0.85rem; }
        .lang-btn { cursor: pointer; padding: 5px 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .class-card { padding: 15px; border: 1px solid #ddd; margin: 10px 0; cursor: pointer; background: #fff; border-radius: 5px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-graduation-cap school-logo"></i>
            <div class="school-name">आदर्श पब्लिक स्कूल</div>
        </div>
        <ul class="sidebar-menu" id="sideMenuContainer"></ul>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <div id="pageTitle" style="font-size: 1.2rem; font-weight: bold;">डैशबोर्ड</div>
            <div class="user-profile">
                <button class="lang-btn" onclick="setLang('EN')">EN</button>
                <button class="lang-btn" onclick="setLang('HN')">HN</button>
                <span id="userRoleBadge" class="role-badge"></span>
                <button onclick="logout()" class="btn-action">लॉगआउट</button>
            </div>
        </header>

        <div class="page-body">
            <div id="contentArea" style="background:#fff; padding:20px; border:1px solid #ddd;">
                पोर्टल पर आपका स्वागत है।
            </div>
        </div>
    </main>

    <script>
        let currentLang = 'HN';
        const urlParams = new URLSearchParams(window.location.search);
        const currentUserRole = urlParams.get('role') || 'teacher'; 

        // नया: क्लास का डेटा
        const classData = {
            'Class 1': ['राहुल', 'प्रिया', 'अमित'],
            'Class 2': ['नेहा', 'रोहित', 'सोनू'],
            'Class 3': ['कविता', 'विकास', 'अंजली']
        };

        const translations = {
            'HN': { 'डैशबोर्ड': 'डैशबोर्ड', 'छात्र प्रोफाइल': 'छात्र प्रोफाइल', 'उपस्थिति': 'उपस्थिति', 'फीस अपडेट': 'फीस अपडेट', 'TC अपडेट': 'TC अपडेट', 'रिजल्ट': 'रिजल्ट', 'स्वागत': 'पोर्टल पर आपका स्वागत है।', 'सभी छात्र': 'सभी छात्र', 'नया प्रवेश': 'नया प्रवेश', 'डेटा एडिट': 'डेटा एडिट', 'डिलीट': 'डिलीट', 'दैनिक उपस्थिति': 'दैनिक उपस्थिति', 'रिपोर्ट': 'रिपोर्ट', 'रसीद': 'रसीद', 'बकाया लिस्ट': 'बकाया लिस्ट', 'जारी करें': 'जारी करें', 'प्रिंट': 'प्रिंट', 'रिपोर्ट्स': 'रिपोर्ट्स', 'पूरे स्कूल की रिपोर्ट': 'पूरे स्कूल की रिपोर्ट', 'कुल आय': 'कुल आय', 'बकाया': 'बकाया', 'एनालिसिस': 'एनालिसिस', 'पब्लिश': 'पब्लिश' },
            'EN': { 'डैशबोर्ड': 'Dashboard', 'छात्र प्रोफाइल': 'Student Profile', 'उपस्थिति': 'Attendance', 'फीस अपडेट': 'Fee Update', 'TC अपडेट': 'TC Update', 'रिजल्ट': 'Result', 'स्वागत': 'Welcome to the Portal.', 'सभी छात्र': 'All Students', 'नया प्रवेश': 'New Admission', 'डेटा एडिट': 'Data Edit', 'डिलीट': 'Delete', 'दैनिक उपस्थिति': 'Daily Attendance', 'रिपोर्ट': 'Report', 'रसीद': 'Receipt', 'बकाया लिस्ट': 'Pending List', 'जारी करें': 'Issue', 'प्रिंट': 'Print', 'रिपोर्ट्स': 'Reports', 'पूरे स्कूल की रिपोर्ट': 'School Report', 'कुल आय': 'Total Income', 'बकाया': 'Due', 'एनालिसिस': 'Analysis', 'पब्लिश': 'Publish' }
        };

        const icons = { 'डैशबोर्ड': 'fa-house', 'छात्र प्रोफाइल': 'fa-user-graduate', 'उपस्थिति': 'fa-clipboard-user', 'फीस अपडेट': 'fa-money-bill-wave', 'TC अपडेट': 'fa-file-contract', 'रिजल्ट': 'fa-poll' };

        const permissions = {
            'admin': { 'डैशबोर्ड': [], 'छात्र प्रोफाइल': ['सभी छात्र', 'नया प्रवेश', 'डेटा एडिट', 'डिलीट'], 'उपस्थिति': ['दैनिक उपस्थिति', 'रिपोर्ट'], 'फीस अपडेट': ['रसीद', 'बकाया लिस्ट'], 'TC अपडेट': ['जारी करें', 'प्रिंट'] },
            'teacher': { 'डैशबोर्ड': [], 'छात्र प्रोफाइल': ['सभी छात्र'], 'उपस्थिति': ['दैनिक उपस्थिति'], 'फीस अपडेट': ['बकाया लिस्ट'] },
            'principal': { 'डैशबोर्ड': [], 'छात्र प्रोफाइल': ['सभी छात्र', 'रिपोर्ट्स'], 'उपस्थिति': ['पूरे स्कूल की रिपोर्ट'], 'फीस अपडेट': ['कुल आय', 'बकाया'], 'रिजल्ट': ['एनालिसिस', 'पब्लिश'] }
        };

        function buildMenu() {
            const container = document.getElementById('sideMenuContainer');
            container.innerHTML = "";
            const roleData = permissions[currentUserRole];
            document.getElementById('userRoleBadge').innerText = currentUserRole.toUpperCase();

            for (const [module, options] of Object.entries(roleData)) {
                const iconClass = icons[module] || 'fa-bars';
                const li = document.createElement('li');
                if (options.length === 0) {
                    li.innerHTML = `<div class="module-btn" onclick="showContent('${module}')"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span></div>`;
                } else {
                    li.innerHTML = `<div class="module-btn" onclick="toggleSubMenu(this)"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span><i class="fa-solid fa-chevron-down fa-xs"></i></div>
                        <div class="sub-menu">${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${translations[currentLang][opt]}</a>`).join('')}</div>`;
                }
                container.appendChild(li);
            }
        }

        function toggleSubMenu(element) {
            const subMenu = element.nextElementSibling;
            subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block";
        }

        function showContent(title) {
            document.getElementById('pageTitle').innerText = translations[currentLang][title] || title;
            if (title === 'डैशबोर्ड') {
                let html = `<h3>${translations[currentLang]['डैशबोर्ड']}</h3><p>कक्षाएं चुनें:</p>`;
                for (const className in classData) {
                    html += `<div class="class-card" onclick="showClassStudents('${className}')">${className}</div>`;
                }
                document.getElementById('contentArea').innerHTML = html;
            } else {
                document.getElementById('contentArea').innerHTML = `<h3>${translations[currentLang][title] || title}</h3><p>यहाँ डेटा मैनेज करने का फॉर्म आएगा...</p>`;
            }
        }

        function showClassStudents(className) {
            const students = classData[className];
            let html = `<h3>${className} के छात्र</h3><button onclick="showContent('डैशबोर्ड')">वापस</button><ul>`;
            students.forEach(s => html += `<li>${s}</li>`);
            html += `</ul>`;
            document.getElementById('contentArea').innerHTML = html;
        }

        function setLang(lang) {
            currentLang = lang;
            buildMenu();
            showContent('डैशबोर्ड');
        }

        function logout() {
            if(confirm(currentLang === 'HN' ? "क्या आप वाकई लॉगआउट करना चाहते हैं?" : "Are you sure you want to logout?")) {
                window.location.href = 'index.html';
            }
        }

        buildMenu();
    </script>
</body>
</html>
