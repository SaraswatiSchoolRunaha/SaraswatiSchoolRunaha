<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्कूल मैनेजमेंट - लॉगिन</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo-icon {
            font-size: 3rem;
            color: #2563eb;
            margin-bottom: 15px;
        }

        .login-card h2 {
            font-size: 1.6rem;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .login-select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #334155;
            background-color: #f8fafc;
            cursor: pointer;
            appearance: none; /* डिफ़ॉल्ट एरो हटाने के लिए */
            -webkit-appearance: none;
            transition: all 0.2s ease;
        }

        .login-select:focus {
            outline: none;
            border-color: #2563eb;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* कस्टम एरो के लिए */
        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.2s ease;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }

        .login-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h2>विद्या मंदिर पोर्टल लॉगिन</h2>
        <p>कृपया अपना सही रोल चुनकर आगे बढ़ें</p>

        <!-- रोल सिलेक्शन ग्रुप -->
        <div class="input-group">
            <label for="userRole">लॉगिन रोल (Select Role)</label>
            <div class="select-wrapper">
                <i class="fa-solid fa-user-shield"></i>
                <select id="userRole" class="login-select">
                    <option value="admin">मास्टर एडमिन (Admin)</option>
                    <option value="teacher">शिक्षक (Teacher Panel)</option>
                    <option value="principal">प्रिंसिपल (Principal Desk)</option>
                </select>
            </div>
        </div>

        <!-- सबमिट बटन -->
        <button class="login-btn" onclick="loginToPortal()">
            पोर्टल में प्रवेश करें <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script>
    function loginToPortal() {
        // 1. चुना हुआ रोल प्राप्त करें
        const selectedRole = document.getElementById('userRole').value;
        
        // 2. यूजर को WebPortal.html पर सही रोल पैरामीटर के साथ भेजें
        window.location.href = "WebPortal.html?role=" + selectedRole;
    }
    </script>

</body>
</html>
