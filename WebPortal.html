<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; height: 100vh; background: #f4f6f9; font-family: sans-serif; margin: 0; }
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #ddd; }
        .sidebar-brand { padding: 20px; font-weight: bold; color: #1e3a8a; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .sidebar-menu { list-style: none; padding: 15px 0; }
        .module-btn { padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; color: #64748b; cursor: pointer; }
        .sub-menu { display: none; background: #f8fafc; }
        .sub-menu a { padding: 10px 25px 10px 50px; display: block; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 70px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .user-profile { font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .btn-action { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; }
        .page-body { padding: 30px; }
        .role-badge { padding: 4px 10px; background: #e0e7ff; color: #1e3a8a; border-radius: 12px; font-size: 0.85rem; }
        .lang-btn { cursor: pointer; padding: 5px 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8fafc; }

     /* Newscast Ticker CSS */
.news-ticker { 
    background: #1e3a8a; 
    color: white; 
    padding: 10px; 
    overflow: hidden; 
    white-space: nowrap; 
    border-radius: 4px; 
    margin-bottom: 20px; 
    position: sticky; 
    top: 0; 
    z-index: 100;
}
.news-ticker span { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 20s linear infinite; 
}
@keyframes ticker { 
    0% { transform: translate(0, 0); } 
    100% { transform: translate(-100%, 0); } 
}
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand" onclick="showDashboard()">
            <i class="fa-solid fa-graduation-cap"></i> सरस्वती बाल विद्या मंदिर स्कूल शिक्षा पोर्टल
        </div>
        <ul class="sidebar-menu" id="sideMenuContainer"></ul>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <div id="pageTitle" style="font-size: 1.2rem; font-weight: bold;">डैशबोर्ड</div>
            <div class="user-profile">
                <button class="lang-btn" onclick="setLang('EN')">EN</button>
                <button class="lang-btn" onclick="setLang('HN')">HN</button>
                <span id="userRoleBadge" class="role-badge"></span>
                <button onclick="logout()" class="btn-action">लॉगआउट</button>
            </div>
        </header>
        
    <div class="page-body">
    <div class="news-ticker">
        <span>📢 नवीनतम सूचना: स्कूल की वार्षिक परीक्षा 10 जून से शुरू होगी। | फीस जमा करने की अंतिम तिथि 30 मई है।</span>
    </div>

    <div id="contentArea" style="background:#fff; padding:20px; border:1px solid #ddd;">डेटा लोड हो रहा है...</div>
</div>
    </main>
   <script>
    let currentLang = 'HN';
    const urlParams = new URLSearchParams(window.location.search);
    const currentUserRole = urlParams.get('role') || 'teacher';

    const translations = {
        'HN': { 'डैशबोर्ड': 'डैशबोर्ड', 'छात्र प्रोफाइल': 'छात्र प्रोफाइल', 'उपस्थिति': 'उपस्थिति', 'फीस अपडेट': 'फीस अपडेट', 'TC अपडेट': 'TC अपडेट', 'रिजल्ट': 'रिजल्ट', 'सभी छात्र': 'सभी छात्र', 'नया प्रवेश': 'नया प्रवेश', 'दैनिक उपस्थिति': 'दैनिक उपस्थिति', 'रिपोर्ट': 'रिपोर्ट', 'रसीद': 'रसीद', 'बकाया लिस्ट': 'बकाया लिस्ट', 'जारी करें': 'जारी करें', 'प्रिंट': 'प्रिंट' },
        'EN': { 'डैशबोर्ड': 'Dashboard', 'छात्र प्रोफाइल': 'Student Profile', 'उपस्थिति': 'Attendance', 'फीस अपडेट': 'Fee Update', 'TC अपडेट': 'TC Update', 'रिजल्ट': 'Result', 'सभी छात्र': 'All Students', 'नया प्रवेश': 'New Admission', 'दैनिक उपस्थिति': 'Daily Attendance', 'रिपोर्ट': 'Report', 'रसीद': 'Receipt', 'बकाया लिस्ट': 'Pending List', 'जारी करें': 'Issue', 'प्रिंट': 'Print' }
    };

    const icons = { 'डैशबोर्ड': 'fa-house', 'छात्र प्रोफाइल': 'fa-user-graduate', 'उपस्थिति': 'fa-clipboard-user', 'फीस अपडेट': 'fa-money-bill-wave', 'TC अपडेट': 'fa-file-contract', 'रिजल्ट': 'fa-poll' };

    const permissions = {
        'admin': { 'डैशबोर्ड': [], 
                  'छात्र प्रोफाइल': ['छात्र प्रमोट', 'छात्र प्रोफ़ाइल', 'छात्र फोटो अपडेट', 'छात्र समग्र अपडेट' ,'छात्र आधार अपडेट', 'छात्र बैंक खाता'], 
                  'उपस्थिति': ['दैनिक उपस्थिति', 'रिपोर्ट'], 
                  'फीस अपडेट': ['रसीद', 'बकाया लिस्ट'], 
                  'TC अपडेट': ['जारी करें', 'प्रिंट'],
                 },
        'teacher': { 'डैशबोर्ड': [], 
                    'छात्र प्रोफाइल': ['सभी छात्र'], 
                    'उपस्थिति': ['दैनिक उपस्थिति'], 
                    'फीस अपडेट': ['बकाया लिस्ट'],
                   },
        'principal': { 'डैशबोर्ड': [], 
                      'छात्र प्रोफाइल': ['सभी छात्र'], 
                      'उपस्थिति': ['रिपोर्ट'], 
                      'फीस अपडेट': ['बकाया लिस्ट'],
                     }
    };

    // 1. यहाँ अपनी सभी अलग-अलग फाइलों के Web App URL डालें
    const sheetUrls = {
        'Database': 'https://script.google.com/macros/s/AKfycbxEQpFakRt3gJ5z8i1yQbGTfKTRUpRqc5xhJoviGiWhHFX3N3eIzviFQVEgaRNoxRhh/exec',
        'बकाया लिस्ट': 'https://script.google.com/macros/s/FEES_ID/exec',
        'दैनिक उपस्थिति': 'https://script.google.com/macros/s/ATTENDANCE_ID/exec',
        'जारी करें': 'https://script.google.com/macros/s/TC_ID/exec'
    };

    // 2. डेटा लाने वाला नया फंक्शन
    async function fetchSheetData(title) {
        const url = sheetUrls[title];
        if (!url) {
            document.getElementById('contentArea').innerHTML = `<h3>${title}</h3><p>डेटा सोर्स कॉन्फ़िगर नहीं है।</p>`;
            return;
        }

        document.getElementById('contentArea').innerHTML = "डेटा लोड हो रहा है...";
        try {
            const response = await fetch(url);
            const data = await response.json();
            renderTable(data);
        } catch (e) {
            document.getElementById('contentArea').innerHTML = "डेटा लाने में त्रुटि हुई। (Google Web App पब्लिशिंग चेक करें)";
        }
    }

    // 3. टेबल रेंडर करने वाला फंक्शन
    function renderTable(data) {
        if (!data || data.length === 0) {
            document.getElementById('contentArea').innerHTML = "कोई डेटा नहीं मिला।";
            return;
        }
        let headers = Object.keys(data[0]);
        let html = "<table><tr>" + headers.map(h => `<th>${h}</th>`).join('') + "</tr>";
        data.forEach(row => {
            html += "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join('') + "</tr>";
        });
        document.getElementById('contentArea').innerHTML = html + "</table>";
    }

    // 4. मेनू बनाने का फंक्शन
  function buildMenu() {
        const container = document.getElementById('sideMenuContainer');
        container.innerHTML = "";
        const roleData = permissions[currentUserRole];
        document.getElementById('userRoleBadge').innerText = currentUserRole.toUpperCase();
        
        for (const [module, options] of Object.entries(roleData)) {
            const iconClass = icons[module] || 'fa-bars';
            const li = document.createElement('li');
            
            // अगर ऑप्शंस खाली हैं, तो डैशबोर्ड जैसा साधारण बटन
            if (options.length === 0) {
                li.innerHTML = `<div class="module-btn" onclick="showDashboard()"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span></div>`;
            } 
            // अगर ऑप्शंस हैं, तो सब-मेनू वाला बटन
            else {
                li.innerHTML = `<div class="module-btn" onclick="toggleSubMenu(this)">
                                    <span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span>
                                    <i class="fa-solid fa-chevron-down fa-xs"></i>
                                </div>
                                <div class="sub-menu">
                                    ${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${translations[currentLang][opt]}</a>`).join('')}
                                </div>`;
            }
            container.appendChild(li);
        }
    }
       
 function showDashboard() {

    document.getElementById('pageTitle').innerText =
        translations[currentLang]['डैशबोर्ड'];

    document.getElementById('contentArea').innerHTML = `
        <div style="
            text-align:center;
            padding:40px;
            font-size:18px;
            color:#1e3a8a;
        ">
            <i class="fa-solid fa-spinner fa-spin"></i>
            डेटा लोड हो रहा है...
        </div>
    `;

    fetch(sheetUrls['Database'] + "?action=getDashboard")

    .then(response => {

        if (!response.ok) {
            throw new Error("Server Response Error");
        }

        return response.json();
    })

    .then(data => {

        console.log("Dashboard Data:", data);

        if (!data || data.length === 0) {

            document.getElementById('contentArea').innerHTML = `
                <div style="padding:20px;color:red;">
                    कोई डेटा नहीं मिला।
                </div>
            `;

            return;
        }

        window.lastData = data;

        let classCount = {};

        data.forEach(student => {

            // IMPORTANT
            // Sheet header के अनुसार class/Class बदलें

            let cls =
                student['class'] ||
                student['Class'] ||
                'N/A';

            classCount[cls] =
                (classCount[cls] || 0) + 1;
        });

        let totalStudents = data.length;

        let html = `

        <div style="
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:25px;
        ">

            <div style="
                background:#1e3a8a;
                color:white;
                padding:20px;
                border-radius:10px;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            ">

                <h3>कुल छात्र</h3>

                <p style="
                    font-size:35px;
                    font-weight:bold;
                    margin-top:10px;
                ">
                    ${totalStudents}
                </p>

            </div>

            <div style="
                background:#2563eb;
                color:white;
                padding:20px;
                border-radius:10px;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            ">

                <h3>कुल कक्षाएं</h3>

                <p style="
                    font-size:35px;
                    font-weight:bold;
                    margin-top:10px;
                ">
                    ${Object.keys(classCount).length}
                </p>

            </div>

        </div>

        <div style="
            background:white;
            border-radius:10px;
            overflow:hidden;
            border:1px solid #ddd;
        ">

            <div style="
                padding:15px;
                background:#f8fafc;
                font-weight:bold;
                border-bottom:1px solid #ddd;
            ">
                कक्षा अनुसार छात्र संख्या
            </div>

            <table>

                <thead>
                    <tr>
                        <th>कक्षा</th>
                        <th>कुल छात्र</th>
                    </tr>
                </thead>

                <tbody>
        `;

        for (let cls in classCount) {

            html += `
                <tr
                    style="
                        cursor:pointer;
                    "

                    onclick="showClassList('${cls}')"
                >
                    <td>${cls}</td>

                    <td>${classCount[cls]}</td>
                </tr>
            `;
        }

        html += `
                </tbody>
            </table>

        </div>
        `;

        document.getElementById('contentArea').innerHTML =
            html;
    })

    .catch(error => {

        console.error("Dashboard Error:", error);

        document.getElementById('contentArea').innerHTML = `
            <div style="
                color:red;
                padding:20px;
                background:#fff;
                border-radius:10px;
            ">
                <h3>Dashboard डेटा लोड नहीं हुआ</h3>

                <p>
                    Google Apps Script URL चेक करें
                </p>

                <p style="margin-top:10px;">
                    ${error.message}
                </p>
            </div>
        `;
    });
}
       
    function showClassList(cls) {
        let filtered = window.lastData.filter(item => (item['class'] || 'N/A') === cls);
        let headers = Object.keys(filtered[0]);
        let html = `<button onclick="showDashboard()" class="btn-action">← वापस</button><table><tr>` 
                    + headers.map(h => `<th>${h}</th>`).join('') + `</tr>`;
        filtered.forEach(row => {
            html += "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join('') + "</tr>";
        });
        document.getElementById('contentArea').innerHTML = html + "</table>";
    }

    function showContent(title) {
        document.getElementById('pageTitle').innerText = translations[currentLang][title];
        fetchSheetData(title);
    }

    function toggleSubMenu(element) { const subMenu = element.nextElementSibling; subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block"; }
    function setLang(lang) { currentLang = lang; buildMenu(); showDashboard(); }
    function logout() { if(confirm("क्या आप लॉग आउट होना चाहते हैं?")) window.location.href = 'index.html'; }

    buildMenu();
    showDashboard();
</script>
</body>
</html>
