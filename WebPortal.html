<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; height: 100vh; background: #f4f6f9; font-family: 'Inter', sans-serif; margin: 0; }
        .sidebar { width: 280px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 25px; font-weight: 800; color: #1e3a8a; border-bottom: 1px solid #f1f5f9; }
        .sidebar-menu { list-style: none; padding: 10px 0; }
        .module-btn { padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; color: #64748b; cursor: pointer; }
        .module-btn:hover { background: #f8fafc; color: #1e3a8a; }
        .sub-menu { display: none; background: #f8fafc; padding: 5px 0; }
        .sub-menu a { padding: 10px 25px 10px 50px; display: block; color: #64748b; text-decoration: none; font-size: 0.85rem; }
        .sub-menu a:hover { color: #2563eb; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 70px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .data-card { background: #fff; padding: 24px; border-radius: 8px; border: 1px solid #e2e8f0; margin: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">SchoolPortal</div>
        <ul class="sidebar-menu" id="sideMenuContainer"></ul>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <h3 id="pageTitle">स्वागत है</h3>
            <div id="userRoleBadge" style="background:#e0e7ff; padding:5px 15px; border-radius:20px; font-size:0.8rem;"></div>
        </header>
        <div class="data-card">
            <h2 id="cardTitle">डैशबोर्ड</h2>
            <div id="contentArea">पोर्टल लोड हो रहा है...</div>
        </div>
    </main>

    <script>
        // यहाँ आप अपना रोल बदलें: 'admin', 'teacher', या 'principal'
        const currentUserRole = 'principal'; 

        const permissions = {
            'admin': {
                'छात्र प्रोफाइल': ['सभी छात्र', 'नया प्रवेश', 'डेटा एडिट', 'डिलीट'],
                'उपस्थिति': ['दैनिक उपस्थिति', 'रिपोर्ट'],
                'फीस अपडेट': ['रसीद', 'बकाया लिस्ट'],
                'TC अपडेट': ['जारी करें', 'प्रिंट']
            },
            'teacher': {
                'छात्र प्रोफाइल': ['सभी छात्र'],
                'उपस्थिति': ['दैनिक उपस्थिति'],
                'फीस अपडेट': ['बकाया लिस्ट']
            },
            'principal': {
                'छात्र प्रोफाइल': ['सभी छात्र', 'रिपोर्ट्स'],
                'उपस्थिति': ['पूरे स्कूल की रिपोर्ट'],
                'फीस अपडेट': ['कुल आय रिपोर्ट', 'बकाया लिस्ट'],
                'TC अपडेट': ['वेरिफिकेशन', 'जारी रिकॉर्ड'],
                'रिजल्ट अपडेट': ['रिजल्ट एनालिसिस', 'पब्लिश']
            }
        };

        function buildMenu() {
            const container = document.getElementById('sideMenuContainer');
            const roleData = permissions[currentUserRole];
            document.getElementById('userRoleBadge').innerText = "Role: " + currentUserRole.toUpperCase();

            for (const [module, options] of Object.entries(roleData)) {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="module-btn" onclick="toggleSubMenu(this)">
                        <span>${module}</span>
                        <i class="fa-solid fa-chevron-down fa-xs"></i>
                    </div>
                    <div class="sub-menu">
                        ${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${opt}</a>`).join('')}
                    </div>
                `;
                container.appendChild(li);
            }
        }

        function toggleSubMenu(element) {
            const subMenu = element.nextElementSibling;
            subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block";
        }

        function showContent(title) {
            document.getElementById('pageTitle').innerText = title;
            document.getElementById('cardTitle').innerText = title;
            document.getElementById('contentArea').innerHTML = `यहाँ ${title} की विस्तृत जानकारी और रिपोर्ट्स उपलब्ध हैं।`;
        }

        buildMenu();
    </script>
</body>
</html>
