<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; }
        .header { background: #1e3a8a; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .school-info { display: flex; align-items: center; gap: 10px; }
        .container { padding: 30px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8fafc; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="school-info">
            <span>🎓 आदर्श पब्लिक स्कूल</span>
        </div>
        <div>
            <button class="btn" onclick="logout()">लॉगआउट</button>
        </div>
    </header>

    <div class="container">
        <div id="contentArea">डेटा लोड हो रहा है...</div>
    </div>

    <script>
        let classData = {}; 
        const currentUserRole = 'admin'; // आप यहाँ रोल बदल सकते हैं

        // किसे क्या दिखेगा
        const columnPermissions = {
            'admin': ['SH', 'School No', 'Name', 'Father', 'Mother', 'DOB', 'Medium', 'Gender', 'Action'],
            'teacher': ['SH', 'Name', 'Father', 'Medium']
        };

        async function loadData() {
            const url = "YOUR_WEB_APP_URL"; // अपना Google Script URL यहाँ डालें
            try {
                const response = await fetch(url);
                const rawData = await response.json();
                classData = {};
                rawData.forEach(s => {
                    let cls = "Class " + s.class;
                    if (!classData[cls]) classData[cls] = [];
                    classData[cls].push(s);
                });
                renderDashboard();
            } catch (e) { document.getElementById('contentArea').innerHTML = "डेटा लोड करने में त्रुटि।"; }
        }

        function renderDashboard() {
            let html = `<h3>कक्षाएं (1-12)</h3><table><tr><th>कक्षा</th><th>कुल छात्र</th></tr>`;
            for (let cls in classData) {
                html += `<tr style="cursor:pointer" onclick="renderStudents('${cls}')"><td>${cls}</td><td>${classData[cls].length}</td></tr>`;
            }
            html += `</table>`;
            document.getElementById('contentArea').innerHTML = html;
        }

        function renderStudents(cls) {
            const allowed = columnPermissions[currentUserRole] || ['SH', 'Name'];
            let html = `<h3>${cls} - छात्र सूची</h3><button class="btn" onclick="renderDashboard()">वापस जाएं</button><table><tr>`;
            allowed.forEach(c => html += `<th>${c}</th>`);
            html += `</tr>`;
            
            classData[cls].forEach((s, i) => {
                html += `<tr>`;
                allowed.forEach(col => {
                    if(col === 'SH') html += `<td>${i+1}</td>`;
                    else if(col === 'Action') html += `<td><button>Edit</button><button>Delete</button></td>`;
                    else html += `<td>${s[col.toLowerCase().replace(' ', '')] || '-'}</td>`;
                });
                html += `</tr>`;
            });
            html += `</table>`;
            document.getElementById('contentArea').innerHTML = html;
        }

        function logout() { if(confirm("लॉगआउट?")) window.location.href='index.html'; }
        
        loadData();
    </script>
</body>
</html>
