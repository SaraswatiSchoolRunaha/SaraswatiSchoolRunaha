<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; height: 100vh; background: #f4f6f9; font-family: sans-serif; margin: 0; }
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #ddd; }
        .sidebar-brand { padding: 20px; font-weight: bold; color: #1e3a8a; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .sidebar-menu { list-style: none; padding: 15px 0; }
        .module-btn { padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; color: #64748b; cursor: pointer; }
        .sub-menu { display: none; background: #f8fafc; }
        .sub-menu a { padding: 10px 25px 10px 50px; display: block; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 70px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .user-profile { font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .btn-action { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; }
        .page-body { padding: 30px; }
        .role-badge { padding: 4px 10px; background: #e0e7ff; color: #1e3a8a; border-radius: 12px; font-size: 0.85rem; }
        .lang-btn { cursor: pointer; padding: 5px 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8fafc; }

     /* Newscast Ticker CSS */
.news-ticker { 
    background: #1e3a8a; 
    color: white; 
    padding: 10px; 
    overflow: hidden; 
    white-space: nowrap; 
    border-radius: 4px; 
    margin-bottom: 20px; 
    position: sticky; 
    top: 0; 
    z-index: 100;
}
.news-ticker span { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 20s linear infinite; 
}
@keyframes ticker { 
    0% { transform: translate(0, 0); } 
    100% { transform: translate(-100%, 0); } 
}
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand" onclick="showDashboard()">
            <i class="fa-solid fa-graduation-cap"></i> स्कूल शिक्षा पोर्टल
        </div>
        <ul class="sidebar-menu" id="sideMenuContainer"></ul>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <div id="pageTitle" style="font-size: 1.2rem; font-weight: bold;">डैशबोर्ड</div>
            <div class="user-profile">
                <button class="lang-btn" onclick="setLang('EN')">EN</button>
                <button class="lang-btn" onclick="setLang('HN')">HN</button>
                <span id="userRoleBadge" class="role-badge"></span>
                <button onclick="logout()" class="btn-action">लॉगआउट</button>
            </div>
        </header>

    <div class="page-body">
    <div class="news-ticker">
        <span>📢 नवीनतम सूचना: स्कूल की वार्षिक परीक्षा 10 जून से शुरू होगी। | फीस जमा करने की अंतिम तिथि 30 मई है।</span>
    </div>

    <div id="contentArea" style="background:#fff; padding:20px; border:1px solid #ddd;">डेटा लोड हो रहा है...</div>
</div>
    </main>
    <script>
        let currentLang = 'HN';
        let classData = {};
        const urlParams = new URLSearchParams(window.location.search);
        const currentUserRole = urlParams.get('role') || 'teacher'; 

        const translations = {
            'HN': { 'डैशबोर्ड': 'डैशबोर्ड', 'छात्र प्रोफाइल': 'छात्र प्रोफाइल', 'उपस्थिति': 'उपस्थिति', 'फीस अपडेट': 'फीस अपडेट', 'TC अपडेट': 'TC अपडेट', 'रिजल्ट': 'रिजल्ट', 'सभी छात्र': 'सभी छात्र', 'नया प्रवेश': 'नया प्रवेश', 'दैनिक उपस्थिति': 'दैनिक उपस्थिति', 'रिपोर्ट': 'रिपोर्ट', 'रसीद': 'रसीद', 'बकाया लिस्ट': 'बकाया लिस्ट', 'जारी करें': 'जारी करें', 'प्रिंट': 'प्रिंट' },
            'EN': { 'डैशबोर्ड': 'Dashboard', 'छात्र प्रोफाइल': 'Student Profile', 'उपस्थिति': 'Attendance', 'फीस अपडेट': 'Fee Update', 'TC अपडेट': 'TC Update', 'रिजल्ट': 'Result', 'सभी छात्र': 'All Students', 'नया प्रवेश': 'New Admission', 'दैनिक उपस्थिति': 'Daily Attendance', 'रिपोर्ट': 'Report', 'रसीद': 'Receipt', 'बकाया लिस्ट': 'Pending List', 'जारी करें': 'Issue', 'प्रिंट': 'Print' }
        };

        const icons = { 'डैशबोर्ड': 'fa-house', 'छात्र प्रोफाइल': 'fa-user-graduate', 'उपस्थिति': 'fa-clipboard-user', 'फीस अपडेट': 'fa-money-bill-wave', 'TC अपडेट': 'fa-file-contract', 'रिजल्ट': 'fa-poll' };
        
        // डैशबोर्ड को सबसे ऊपर रखने के लिए यहाँ व्यवस्थित किया गया है
        const permissions = {
            'admin': { 'डैशबोर्ड': [], 'छात्र प्रोफाइल': ['सभी छात्र', 'नया प्रवेश'], 'उपस्थिति': ['दैनिक उपस्थिति', 'रिपोर्ट'], 'फीस अपडेट': ['रसीद', 'बकाया लिस्ट'], 'TC अपडेट': ['जारी करें', 'प्रिंट'] },
            'teacher': { 'डैशबोर्ड': [], 'छात्र प्रोफाइल': ['सभी छात्र'], 'उपस्थिति': ['दैनिक उपस्थिति'], 'फीस अपडेट': ['बकाया लिस्ट'] },
            'principal': { 'डैशबोर्ड': [], 'छात्र प्रोफाइल': ['सभी छात्र'], 'उपस्थिति': ['रिपोर्ट'], 'फीस अपडेट': ['बकाया लिस्ट'] }
        };

        async function loadData() {
            const url = "YOUR_WEB_APP_URL"; 
            try {
                const response = await fetch(url);
                const rawData = await response.json();
                classData = {};
                rawData.forEach(s => {
                    let cls = "Class " + s.class;
                    if (!classData[cls]) classData[cls] = [];
                    classData[cls].push(s);
                });
                showDashboard();
            } catch (e) { document.getElementById('contentArea').innerHTML = "डेटा लोड करने में त्रुटि।"; }
        }

        function buildMenu() {
            const container = document.getElementById('sideMenuContainer');
            container.innerHTML = "";
            const roleData = permissions[currentUserRole];
            document.getElementById('userRoleBadge').innerText = currentUserRole.toUpperCase();
            
            for (const [module, options] of Object.entries(roleData)) {
                const iconClass = icons[module] || 'fa-bars';
                const li = document.createElement('li');
                if (options.length === 0) {
                    li.innerHTML = `<div class="module-btn" onclick="showDashboard()"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span></div>`;
                } else {
                    li.innerHTML = `<div class="module-btn" onclick="toggleSubMenu(this)"><span><i class="fa-solid ${iconClass}" style="margin-right:10px;"></i> ${translations[currentLang][module]}</span><i class="fa-solid fa-chevron-down fa-xs"></i></div>
                        <div class="sub-menu">${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${translations[currentLang][opt]}</a>`).join('')}</div>`;
                }
                container.appendChild(li);
            }
        }

        function showDashboard() {
            document.getElementById('pageTitle').innerText = translations[currentLang]['डैशबोर्ड'];
            let html = `<h3>कक्षाएं (Class-wise)</h3><table><tr><th>कक्षा</th><th>कुल छात्र</th></tr>`;
            for (let cls in classData) {
                html += `<tr style="cursor:pointer" onclick="showClassStudents('${cls}')"><td>${cls}</td><td>${classData[cls].length}</td></tr>`;
            }
            document.getElementById('contentArea').innerHTML = html + `</table>`;
        }

        function toggleSubMenu(element) { const subMenu = element.nextElementSibling; subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block"; }
        function showContent(title) { document.getElementById('pageTitle').innerText = title; document.getElementById('contentArea').innerHTML = `<h3>${title}</h3><p>यहाँ डेटा फॉर्म आएगा...</p>`; }
        function setLang(lang) { currentLang = lang; buildMenu(); showDashboard(); }
        function logout() { if(confirm("लॉगआउट?")) window.location.href = 'index.html'; }

        buildMenu();
        loadData();
    </script>
</body>
</html>
