<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS डिज़ाइन */
        body { display: flex; height: 100vh; background: #f4f6f9; font-family: 'Inter', sans-serif; margin: 0; }
        .sidebar { width: 280px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 25px; font-weight: 800; color: #1e3a8a; border-bottom: 1px solid #f1f5f9; }
        
        /* सब-मेनू स्टाइल */
        .sidebar-menu { list-style: none; padding: 10px 0; }
        .module-btn { padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; color: #64748b; cursor: pointer; border-left: 4px solid transparent; }
        .module-btn:hover { background: #f8fafc; color: #1e3a8a; }
        .sub-menu { display: none; background: #f8fafc; padding: 5px 0; }
        .sub-menu a { padding: 10px 25px 10px 50px; display: block; color: #64748b; text-decoration: none; font-size: 0.85rem; }
        .sub-menu a:hover { color: #2563eb; }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 70px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .data-card { background: #fff; padding: 24px; border-radius: 8px; border: 1px solid #e2e8f0; margin: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">SchoolPortal</div>
        <ul class="sidebar-menu">
            
            <!-- छात्र प्रोफाइल मॉड्यूल -->
            <li>
                <div class="module-btn" onclick="toggleSubMenu(this)">
                    <span><i class="fa-solid fa-user"></i> छात्र प्रोफाइल</span>
                    <i class="fa-solid fa-chevron-down fa-xs"></i>
                </div>
                <div class="sub-menu">
                    <a href="#" onclick="showContent('छात्र सूची')">सभी छात्र देखें</a>
                    <a href="#" onclick="showContent('नया प्रवेश')">नया छात्र जोड़ें</a>
                    <a href="#" onclick="showContent('प्रोफाइल एडिट')">डेटा एडिट करें</a>
                </div>
            </li>

            <!-- उपस्थिति मॉड्यूल -->
            <li>
                <div class="module-btn" onclick="toggleSubMenu(this)">
                    <span><i class="fa-solid fa-clipboard-check"></i> उपस्थिति</span>
                    <i class="fa-solid fa-chevron-down fa-xs"></i>
                </div>
                <div class="sub-menu">
                    <a href="#" onclick="showContent('दैनिक उपस्थिति')">दैनिक उपस्थिति</a>
                    <a href="#" onclick="showContent('महीने की रिपोर्ट')">महीने की रिपोर्ट</a>
                </div>
            </li>

            <!-- फीस मॉड्यूल -->
            <li>
                <div class="module-btn" onclick="toggleSubMenu(this)">
                    <span><i class="fa-solid fa-indian-rupee-sign"></i> फीस अपडेट</span>
                    <i class="fa-solid fa-chevron-down fa-xs"></i>
                </div>
                <div class="sub-menu">
                    <a href="#" onclick="showContent('फीस भुगतान')">फीस भुगतान रसीद</a>
                    <a href="#" onclick="showContent('बकाया लिस्ट')">बकाया फीस लिस्ट</a>
                </div>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <h3 id="pageTitle">पोर्टल डैशबोर्ड</h3>
            <div class="user-profile">Rakesh Gupta</div>
        </header>

        <div class="data-card">
            <h2 id="cardTitle">मेनू चुनें</h2>
            <div id="contentArea">यहाँ आपका कंटेंट दिखाई देगा।</div>
        </div>
    </main>

    <script>
        // सब-मेनू खोलने/बंद करने का फंक्शन
        function toggleSubMenu(element) {
            const subMenu = element.nextElementSibling;
            subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block";
        }

        // कंटेंट दिखाने का फंक्शन
        function showContent(title) {
            document.getElementById('pageTitle').innerText = title;
            document.getElementById('cardTitle').innerText = title;
            document.getElementById('contentArea').innerHTML = `<p>${title} से संबंधित डेटा यहाँ लोड होगा...</p>`;
        }
    </script>
</body>
</html>
