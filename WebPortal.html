<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>स्कूल मैनेजमेंट पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* आपका पुराना लेआउट */
        body { display: flex; height: 100vh; background: #f4f6f9; font-family: sans-serif; margin: 0; }
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #ddd; }
        .sidebar-brand { padding: 25px; font-weight: bold; color: #1e3a8a; border-bottom: 1px solid #ddd; }
        .sidebar-menu { list-style: none; padding: 15px 0; }
        .module-btn { padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; color: #64748b; cursor: pointer; }
        .sub-menu { display: none; background: #f8fafc; }
        .sub-menu a { padding: 10px 25px 10px 50px; display: block; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        
        /* आपका पुराना हेडर डिज़ाइन */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 70px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .user-profile { font-weight: 500; }
        .btn-action { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; }
        .page-body { padding: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">स्कूल शिक्षा पोर्टल</div>
        <ul class="sidebar-menu" id="sideMenuContainer"></ul>
    </aside>

    <main class="main-content">
        <!-- पुराना हेडर -->
        <header class="top-navbar">
            <div id="pageTitle" style="font-size: 1.2rem; font-weight: bold;">डैशबोर्ड</div>
            <div class="user-profile">
                <span id="userRoleBadge" style="margin-right:15px; color:#2563eb;"></span>
                <button onclick="logout()" class="btn-action">लॉगआउट</button>
            </div>
        </header>

        <div class="page-body">
            <div id="contentArea" style="background:#fff; padding:20px; border:1px solid #ddd;">
                पोर्टल पर आपका स्वागत है।
            </div>
        </div>
    </main>

    <script>
       // 1. URL से डायनामिक रोल लें
const urlParams = new URLSearchParams(window.location.search);
const currentUserRole = urlParams.get('role') || 'teacher'; 

// 2. परमिशन डेटा (यह वही रहेगा)
const permissions = {
    'admin': {
        'छात्र प्रोफाइल': ['सभी छात्र', 'नया प्रवेश', 'डेटा एडिट', 'डिलीट'],
        'उपस्थिति': ['दैनिक उपस्थिति', 'रिपोर्ट'],
        'फीस अपडेट': ['रसीद', 'बकाया लिस्ट'],
        'TC अपडेट': ['जारी करें', 'प्रिंट']
    },
    'teacher': {
        'छात्र प्रोफाइल': ['सभी छात्र'],
        'उपस्थिति': ['दैनिक उपस्थिति'],
        'फीस अपडेट': ['बकाया लिस्ट']
    },
    'principal': {
        'छात्र प्रोफाइल': ['सभी छात्र', 'रिपोर्ट्स'],
        'उपस्थिति': ['पूरे स्कूल की रिपोर्ट'],
        'फीस अपडेट': ['कुल आय', 'बकाया'],
        'रिजल्ट': ['एनालिसिस', 'पब्लिश']
    }
};

// 3. रोल के हिसाब से मेनू बनाएं
function buildMenu() {
    const container = document.getElementById('sideMenuContainer');
    container.innerHTML = ""; // पुराना मेनू साफ़ करें
    
    const roleData = permissions[currentUserRole];
    
    // अगर कोई गलत रोल डाले, तो उसे 'teacher' मान लें
    if(!roleData) {
        alert("अमान्य रोल!");
        return;
    }

    document.getElementById('userRoleBadge').innerText = "Role: " + currentUserRole.toUpperCase();

    for (const [module, options] of Object.entries(roleData)) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="module-btn" onclick="toggleSubMenu(this)">
                <span>${module}</span>
                <i class="fa-solid fa-chevron-down fa-xs"></i>
            </div>
            <div class="sub-menu">
                ${options.map(opt => `<a href="#" onclick="showContent('${opt}')">${opt}</a>`).join('')}
            </div>
        `;
        container.appendChild(li);
    }
}

        function toggleSubMenu(element) {
            const subMenu = element.nextElementSibling;
            subMenu.style.display = (subMenu.style.display === "block") ? "none" : "block";
        }

        function showContent(title) {
            document.getElementById('pageTitle').innerText = title;
            document.getElementById('contentArea').innerHTML = `<h3>${title}</h3><p>यहाँ डेटा मैनेज करने का फॉर्म आएगा...</p>`;
        }

        function logout() { window.location.href='index.html'; }
        buildMenu();
    </script>
</body>
</html>
