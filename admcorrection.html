<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Receipt System</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 50px 20px; }
  
  /* Main Blue Border Container */
  .search-card {
    max-width: 750px;
    margin: 0 auto;
    background: #fff;
    border: 3px solid #0056b3; /* Image jaisa blue border */
    padding: 40px;
    box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
    text-align: center;
  }

  /* Header Section */
  .header-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 26px;
    font-weight: bold;
    color: #0056b3;
    margin-bottom: 30px;
  }

  /* Inputs Row */
  .input-group-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }
  .input-group-row input {
    flex: 1;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
    color: #555;
  }

  /* Captcha Section */
  .captcha-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
  }
  .captcha-box {
    border: 2px solid #000;
    border-radius: 8px;
    padding: 5px 25px;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 5px;
    background: #fff;
    color: #000;
    min-width: 120px;
  }
  .refresh-btn {
    background-color: #ff9800; /* Orange color */
    color: white;
    border: none;
    border-radius: 5px;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .captcha-input-full {
    width: 60%;
    padding: 12px;
    border: 1px solid #0056b3;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 25px;
    font-size: 16px;
  }

  /* Submit Button */
  .submit-btn {
    background-color: #4caf50; /* Green color */
    color: white;
    border: none;
    padding: 12px 60px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .submit-btn:hover { background-color: #45a049; }

</style>
</head>
<body>

<div class="search-card">
  <div class="header-title">
    <span>🎓</span> Application Correction System
  </div>

  <div class="input-group-row">
    <input type="text" id="appNo" placeholder="Application Number">
    <input type="text" id="mobNo" placeholder="Mobile Number">
  </div>

  <div class="captcha-wrapper">
    <div class="captcha-box" id="captchaCode">CKHFTJ</div>
    <button class="refresh-btn" onclick="refreshCaptcha()">
      <span style="border: 1px solid white; padding: 1px 3px; font-size: 10px;">Q</span> Refresh
    </button>
  </div>

  <input type="text" id="captchaInp" class="captcha-input-full" placeholder="Enter Captcha">
  <br>

  <button class="submit-btn" onclick="handleSearch()">Submit</button>
</div>

<script>
  function refreshCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaCode").innerText = code;
  }

  function handleSearch() {
    // Aapka search logic yahan aayega
    alert("Searching Student...");
  }
</script>

</body>
</html>
