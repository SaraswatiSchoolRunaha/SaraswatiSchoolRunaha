<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal - Student Information</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #e6f0ff; margin:0; padding:20px; }
  .form-container { max-width:900px; margin:20px auto; background:#fff; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.15); padding:35px; border:2px solid #002366; }
  
  h2 {
    text-align: center; font-family: 'Luckiest Guy', cursive; font-size: 38px; 
    background: linear-gradient(45deg, #ffcc00, #ff0066, #00ccff); 
    background-clip: text; -webkit-background-clip: text; color: transparent;
    padding: 10px 0; border-bottom: 4px solid #004080; display: block; margin-bottom: 30px;
  }

  .edit-heading {
    text-align: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 26px;
    color: #002366; position: relative; margin: 40px 0 25px 0; padding-bottom: 12px;
    letter-spacing: 1px;
  }
  .edit-heading::after {
    content: ''; width: 100px; height: 5px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px;
  }

  h3 { background:#002366; color:#fff; padding:14px; border-radius:8px; margin-top:35px; font-weight:600; font-size: 17px; }
  label { font-weight:500; margin-top:15px; display:block; color: #444; font-size: 14.5px; }
  
  input, select, textarea { width:100%; padding:13px; margin-top:8px; border-radius:8px; border:1px solid #ccc; font-family:inherit; transition: 0.3s; background: #fafafa; }
  input:focus, select:focus { border-color:#004080; box-shadow:0 0 10px rgba(0,64,128,0.2); outline:none; background: #fff; }
  
  /* Yahan maine gap badha di hai */
  .row { display:flex; gap:30px; flex-wrap:wrap; margin-bottom: 10px; }
  .row > div { flex:1; min-width: 250px; }

  .btn-search { background: linear-gradient(to right, #007bff, #0056b3); color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 25px; transition: 0.3s; }
  .btn-update { background: linear-gradient(to right, #28a745, #1e7e34); color: white; padding: 20px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 19px; margin-top: 40px; transition: 0.3s; letter-spacing: 1px; }
  .btn-update:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(40,167,69,0.3); }

  .hidden { display: none; }
  
  .photo-container { display: flex; align-items: center; gap: 30px; background: #f8fbff; padding: 20px; border-radius: 12px; border: 1px solid #ddecff; margin-top: 15px; }
  .preview-img { width: 115px; height: 140px; border: 3px solid #002366; object-fit: cover; border-radius: 8px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

  .declaration-box { background: #fffdf2; padding: 20px; border-radius: 10px; border: 1px solid #ffe58f; margin: 35px 0; }
  .declaration-label { display: flex; align-items: flex-start; gap: 15px; cursor: pointer; font-size: 14.5px; line-height: 1.6; }
  .declaration-label input { width: 24px; height: 24px; accent-color: #002366; margin-top: 2px; cursor: pointer; flex-shrink: 0; }

  .captcha-box { display: flex; align-items: center; gap: 20px; margin: 20px 0; justify-content: center; }
  .captcha-code { background: #222; color: #fff; padding: 10px 25px; font-weight: bold; border-radius: 8px; letter-spacing: 6px; font-size: 26px; font-family: 'Courier New', monospace; box-shadow: inset 0 0 10px rgba(255,255,255,0.2); }
  .search-card { background: #ffffff; padding: 30px; border-radius: 15px; border: 2px dashed #004080; }
  .loading-spinner { border: 5px solid #f3f3f3; border-top: 5px solid #004080; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 15px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="form-container">
  <div id="searchBox" class="search-card">
    <h2>Correction Portal</h2>
    <div class="row">
      <div>
        <label>Application Number</label>
        <input type="text" id="appNoSearch" placeholder="Enter App No.">
      </div>
      <div>
        <label>Registered Mobile Number</label>
        <input type="tel" id="mobSearch" placeholder="Enter Mobile No.">
      </div>
    </div>

    <div style="text-align:center; margin-top:25px;">
      <label>Verify Captcha</label>
      <div class="captcha-box">
        <div class="captcha-code" id="captchaDisplay">XXXXXX</div>
        <button type="button" onclick="generateCaptcha()" style="background:none; border:none; color:#004080; cursor:pointer; text-decoration:underline; font-weight:600; font-size: 14px;">Refresh Code</button>
      </div>
      <input type="text" id="captchaInput" placeholder="Type Captcha Here" style="max-width:220px; text-align:center; font-weight:600; letter-spacing: 2px;">
    </div>

    <button class="btn-search" id="mainSearchBtn" onclick="verifyAndSearch()">Verify & Unlock Form</button>
    <div id="loader" class="hidden"><div class="loading-spinner"></div><p style="text-align:center; color:#004080; font-weight: 500;">Searching Student Records...</p></div>
  </div>

  <div id="editForm" class="hidden">
    <div class="edit-heading">✏️ UPDATE STUDENT PROFILE</div>
    
    <form id="correctionForm">
      <h3>👤 Personal Information</h3>
      <div class="row">
        <div>
          <label>Academic Session</label>
          <select id="session">
            <option value="2026-27">2026-27</option>
            <option value="2027-28">2027-28</option>
          </select>
        </div>
        <div>
          <label>Class for Admission</label>
          <select id="stuClass">
            <option value="">Select Class</option>
            <script>
              const classes = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th", "11th", "12th"];
              classes.forEach((c, i) => document.write(`<option value="${i+1}">${c}</option>`));
            </script>
          </select>
        </div>
      </div>

      <label>Full Name of Student</label>
      <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">

      <div class="row">
        <div><label>Father's Name</label><input type="text" id="fName" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Mother's Name</label><input type="text" id="mName" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date" id="stuDob"></div>
        <div>
          <label>Gender</label>
          <select id="stuGender">
            <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
          </select>
        </div>
      </div>

      <h3>📸 Identity Photo</h3>
      <div class="photo-container">
        <div>
          <img id="photoPreview" class="preview-img" src="https://via.placeholder.com/115x140?text=Photo" alt="Preview">
        </div>
        <div style="flex:1;">
          <label>Update Photo (Optional)</label>
          <input type="file" id="photoUpload" accept="image/*" onchange="previewImage(this)">
          <p style="font-size: 12px; color: #ff0066; margin-top: 8px; font-weight: 500;">*Nayi photo chunne par purani badal jayegi.</p>
        </div>
      </div>

      <h3>📍 Residential Address & ID</h3>
      <div class="row">
        <div><label>Village / Town</label><input type="text" id="stuVillage" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Tehsil</label><input type="text" id="stuTehsil" oninput="this.value = this.value.toUpperCase()"></div>
      </div>
      
      <label>Complete Mailing Address</label>
      <textarea id="stuAddress" rows="3" oninput="this.value = this.value.toUpperCase()"></textarea>

      <div class="row">
        <div><label>Aadhaar Number (12 Digit)</label><input type="text" id="stuAdhar" maxlength="12"></div>
        <div><label>Primary Mobile (Non-Editable)</label><input type="text" id="stuMobile1" readonly style="background:#f0f0f0; color:#777; cursor:not-allowed;"></div>
      </div>

      <div class="declaration-box">
        <label class="declaration-label">
          <input type="checkbox" id="declarationCheck">
          <span>
            <b>घोषणा पत्र:</b> मैं यह घोषणा करता/करती हूँ कि मेरे द्वारा दी गई समस्त जानकारी मेरे ज्ञान के अनुसार पूर्णतः सत्य है। यदि भविष्य में कोई भी जानकारी गलत पाई जाती है, तो मेरे बालक/बालिका का प्रवेश निरस्त किया जा सकता है।
          </span>
        </label>
      </div>

      <button type="button" class="btn-update" id="updateBtn" onclick="processUpdate()">Submit Corrections 🚀</button>
      <div id="updateLoader" class="hidden"><div class="loading-spinner"></div><p style="text-align:center; font-weight: 600;">Saving Changes to Database...</p></div>
    </form>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec";
  var currentCaptcha = "";
  var savedAppNo = "";

  window.onload = generateCaptcha;

  function generateCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    currentCaptcha = "";
    for (let i = 0; i < 6; i++) {
      currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaDisplay").innerText = currentCaptcha;
  }

  function previewImage(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById('photoPreview').src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function verifyAndSearch() {
    const app = document.getElementById('appNoSearch').value.trim();
    const mob = document.getElementById('mobSearch').value.trim();
    const cap = document.getElementById('captchaInput').value.trim();

    if(!app || !mob) { alert("Please enter App No & Mobile!"); return; }
    if(cap.toUpperCase() !== currentCaptcha) { alert("Invalid Captcha!"); generateCaptcha(); return; }

    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('mainSearchBtn').disabled = true;

    fetch(`${SCRIPT_URL}?appNo=${app}&mob=${mob}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('mainSearchBtn').disabled = false;
        if(data.status === "found") {
          savedAppNo = data.appNo;
          document.getElementById('searchBox').classList.add('hidden');
          document.getElementById('editForm').classList.remove('hidden');
          
          document.getElementById('stuName').value = data.studentName || "";
          document.getElementById('fName').value = data.fatherName || "";
          document.getElementById('mName').value = data.motherName || "";
          document.getElementById('stuClass').value = data.class || "";
          document.getElementById('stuDob').value = data.dob || "";
          document.getElementById('stuVillage').value = data.village || "";
          document.getElementById('stuAddress').value = data.address || "";
          document.getElementById('stuAdhar').value = data.adhar || "";
          document.getElementById('stuMobile1').value = data.mobile1 || "";
          document.getElementById('session').value = data.session || "2026-27";
          document.getElementById('stuTehsil').value = data.tehsil || "";
          if(data.photoUrl) document.getElementById('photoPreview').src = data.photoUrl;
        } else {
          alert("Record not found!");
          generateCaptcha();
        }
      })
      .catch(err => {
        alert("Server Error!");
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('mainSearchBtn').disabled = false;
      });
  }

  function processUpdate() {
    if(!document.getElementById('declarationCheck').checked) {
      alert("⚠️ कृपया घोषणा पत्र को स्वीकार करें!");
      return;
    }
    if(!confirm("Submit these corrections?")) return;

    document.getElementById('updateLoader').classList.remove('hidden');
    document.getElementById('updateBtn').disabled = true;

    const photoFile = document.getElementById('photoUpload').files[0];
    if (photoFile) {
      const reader = new FileReader();
      reader.readAsDataURL(photoFile);
      reader.onload = function() { sendData(reader.result); };
    } else {
      sendData(null);
    }
  }

  function sendData(photoBase64) {
    const updateObj = {
      action: "update",
      appNo: savedAppNo,
      studentName: document.getElementById('stuName').value,
      fatherName: document.getElementById('fName').value,
      motherName: document.getElementById('mName').value,
      class: document.getElementById('stuClass').value,
      dob: document.getElementById('stuDob').value,
      address: document.getElementById('stuAddress').value,
      village: document.getElementById('stuVillage').value,
      tehsil: document.getElementById('stuTehsil').value,
      adhar: document.getElementById('stuAdhar').value,
      photo: photoBase64
    };

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(updateObj)
    }).then(() => {
      alert("✅ Data Updated Successfully!");
      location.reload();
    }).catch(err => {
      alert("Error: " + err);
      document.getElementById('updateBtn').disabled = false;
      document.getElementById('updateLoader').classList.add('hidden');
    });
  }
</script>

</body>
</html>
