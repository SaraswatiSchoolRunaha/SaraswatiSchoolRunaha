<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #e6f0ff; margin:0; padding:20px; }
  .form-container { max-width:900px; margin:10px auto; background:#fff; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15); padding:25px; border:2px solid #0056b3; }
  
  /* Bahar wala Search Header */
  .search-header { text-align: center; color: #0056b3; font-size: 26px; font-weight: bold; padding: 15px 0; border-bottom: 2px solid #0056b3; margin-bottom: 20px; }
  
  /* Edit Details Heading with Line */
  .edit-heading {
    text-align: center; font-weight: 700; font-size: 24px; color: #002366; 
    position: relative; margin: 25px 0; padding-bottom: 10px;
  }
  .edit-heading::after {
    content: ''; width: 120px; height: 3px; background: #ff0066; 
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px;
  }

  h3 { background:#002366; color:#fff; padding:8px 12px; border-radius:6px; margin-top:20px; font-size: 16px; }
  label { font-weight:500; margin-top:8px; display:block; color: #333; font-size: 13px; }
  
  input, select, textarea { width:100%; padding:8px; margin-top:4px; border-radius:6px; border:1px solid #ccc; font-family:inherit; box-sizing: border-box; }
  
  /* Row spacing kam rakhi hai */
  .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 2px; }
  .row > div { flex:1; min-width: 180px; }

  /* Photo Box (Niche ke liye) */
  .photo-footer-section { 
    display: flex; flex-direction: column; align-items: center; 
    background: #f1f7ff; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #c2d9ff;
  }
  .photo-box { width: 120px; height: 140px; border: 2px solid #0056b3; background: #fff; margin-bottom: 10px; border-radius: 4px; overflow: hidden; }
  .photo-box img { width: 100%; height: 100%; object-fit: cover; }

  /* Captcha Box (Submit se theek upar) */
  .captcha-footer { text-align: center; margin: 15px 0; padding: 10px; background: #fafafa; border: 1px solid #ddd; border-radius: 8px; }
  .captcha-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .captcha-code { border: 2px solid #333; padding: 4px 20px; font-weight: bold; font-size: 22px; background: #fff; letter-spacing: 4px; border-radius: 5px; }
  
  .btn-refresh { background: #ff9800; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn-submit { background: #28a745; color: white; border: none; padding: 12px 60px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; display: block; margin: 10px auto; }

  .hidden { display: none; }
  .declaration { font-size: 12px; margin-top: 15px; display: flex; gap: 8px; align-items: flex-start; }
</style>
</head>
<body>

<div class="form-container">
  
  <div id="searchBox">
    <div class="search-header">🎓 Application Receipt System</div>
    <div class="row">
      <div><label>Application Number</label><input type="text" id="appNoSearch" placeholder="Enter ID"></div>
      <div><label>Mobile Number</label><input type="tel" id="mobSearch" placeholder="Enter Mobile"></div>
    </div>
    <button class="btn-submit" style="background:#0056b3;" onclick="openCorrectionForm()">Search Student</button>
  </div>

  <div id="editForm" class="hidden">
    <div class="edit-heading">EDIT STUDENT DETAILS</div>
    
    <form id="correctionForm">
      <h3>Student Details</h3>
      <div class="row">
        <div><label>Session</label><select><option>2026-27</option></select></div>
        <div><label>Class</label><select id="stuClass"><option>10th</option></select></div>
      </div>
      
      <label>Student Name</label>
      <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">

      <div class="row">
        <div><label>Father Name</label><input type="text" id="fName"></div>
        <div><label>Mother Name</label><input type="text" id="mName"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date"></div>
        <div><label>Gender</label><select><option>Male</option><option>Female</option></select></div>
        <div><label>Category</label><select><option>OBC</option><option>General</option></select></div>
      </div>

      <h3>Address & Bank Information</h3>
      <div class="row">
        <div><label>Village</label><input type="text"></div>
        <div><label>Tehsil</label><input type="text"></div>
        <div><label>District</label><input type="text" value="Rajgarh"></div>
      </div>
      <div class="row">
        <div><label>Samagra ID</label><input type="text" maxlength="9"></div>
        <div><label>Bank Name</label><input type="text"></div>
        <div><label>Account No.</label><input type="text"></div>
      </div>

      <h3>Upload Student Photo</h3>
      <div class="photo-footer-section">
        <div class="photo-box">
          <img id="photoPreview" src="https://via.placeholder.com/120x140?text=PHOTO">
        </div>
        <input type="file" accept="image/*" onchange="previewImage(this)">
      </div>

      <div class="declaration">
        <input type="checkbox" id="confirm"> 
        <span>मैं घोषणा करता हूँ कि सुधारी गई समस्त जानकारी सत्य है।</span>
      </div>

      <div class="captcha-footer">
        <label>Verification Code</label>
        <div class="captcha-row">
          <div class="captcha-code" id="captchaDisp">XXXXXX</div>
          <button type="button" class="btn-refresh" onclick="newCaptcha()">🔄</button>
        </div>
        <center><input type="text" id="capInput" placeholder="Enter Code" style="max-width:200px; text-align:center;"></center>
      </div>

      <button type="button" class="btn-submit" onclick="submitCorrection()">Update Admission 🚀</button>
    </form>
  </div>
</div>

<script>
  let currentCap = "";

  function newCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    currentCap = "";
    for (let i = 0; i < 6; i++) { currentCap += chars.charAt(Math.floor(Math.random() * chars.length)); }
    document.getElementById("captchaDisp").innerText = currentCap;
  }

  function previewImage(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById('photoPreview').src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function openCorrectionForm() {
    // Search logic ke baad ye chalega
    document.getElementById('searchBox').classList.add('hidden');
    document.getElementById('editForm').classList.remove('hidden');
    newCaptcha();
  }

  function submitCorrection() {
    let userInp = document.getElementById('capInput').value.trim().toUpperCase();
    if(userInp !== currentCap) {
      alert("Invalid Captcha!");
      newCaptcha();
      return;
    }
    alert("Data Updated Successfully!");
  }
</script>

</body>
</html>
