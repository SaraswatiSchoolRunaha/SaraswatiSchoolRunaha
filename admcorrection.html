<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; padding: 20px; }
    .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; border: 2px solid #007bff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h3 { text-align: center; color: #333; background: #eef; padding: 10px; border-radius: 8px; }
    label { font-weight: bold; font-size: 13px; color: #555; display: block; margin-top: 10px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .row { display: flex; gap: 15px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 200px; }
    .btn-search { background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    .btn-update { background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
    .hidden { display: none; }
    #captchaDisplay { font-weight: bold; background: #333; color: #fff; padding: 8px 15px; letter-spacing: 4px; border-radius: 4px; display: inline-block; }
    .loading { color: #007bff; font-weight: bold; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div id="searchBox">
    <h3>Admission Correction Portal</h3>
    <label>Application Number:</label>
    <input type="text" id="appNo" placeholder="Enter Application Number">

    <div style="text-align: center; margin: 15px 0;">
      <span id="captchaDisplay"></span> 
      <button onclick="generateCaptcha()" style="width:auto; cursor:pointer;">Refresh</button>
    </div>
    <input type="text" id="captchaInput" placeholder="Enter Captcha Above">
    
    <button class="btn-search" id="searchBtn" onclick="searchData()">Search & Edit Record</button>
    <div id="loader" class="hidden loading">Searching Database...</div>
  </div>

  <div id="editForm" class="hidden">
    <h3 style="color: #28a745;">Edit Student Information</h3>
    
    <div class="row">
      <div>
        <label>Session</label>
        <select id="session">
          <option value="2026-27">2026-27</option>
          <option value="2027-28">2027-28</option>
        </select>
      </div>
      <div>
        <label>Class</label>
        <input type="text" id="stuClass">
      </div>
    </div>

    <label>Student Name</label>
    <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">

    <div class="row">
      <div><label>Father's Name</label><input type="text" id="fName" oninput="this.value = this.value.toUpperCase()"></div>
      <div><label>Mother's Name</label><input type="text" id="mName" oninput="this.value = this.value.toUpperCase()"></div>
    </div>

    <div class="row">
      <div><label>Date of Birth</label><input type="date" id="stuDob"></div>
      <div><label>Gender</label><input type="text" id="stuGender"></div>
    </div>

    <div class="row">
      <div><label>Medium</label><input type="text" id="stuMedium"></div>
      <div><label>Category</label><input type="text" id="stuCategory"></div>
    </div>

    <label>Subject (for 11th/12th)</label>
    <input type="text" id="stuSubject">

    <h3>Address Details</h3>
    <div class="row">
      <div><label>Village</label><input type="text" id="stuVillage" oninput="this.value = this.value.toUpperCase()"></div>
      <div><label>Tehsil</label><input type="text" id="stuTehsil" oninput="this.value = this.value.toUpperCase()"></div>
    </div>
    <label>Full Address</label>
    <textarea id="stuAddress" rows="2" oninput="this.value = this.value.toUpperCase()"></textarea>

    <h3>ID & Bank Details</h3>
    <div class="row">
      <div><label>Aadhaar Number</label><input type="text" id="stuAdhar"></div>
      <div><label>Samagra ID</label><input type="text" id="stuSamagra"></div>
    </div>
    <div class="row">
      <div><label>Bank Name</label><input type="text" id="stuBank" oninput="this.value = this.value.toUpperCase()"></div>
      <div><label>Account Number</label><input type="text" id="stuAccNo"></div>
    </div>
    <label>IFSC Code</label>
    <input type="text" id="stuIfsc" oninput="this.value = this.value.toUpperCase()">

    <label>Mobile Number 1</label>
    <input type="text" id="stuMobile1">

    <button class="btn-update" id="updateBtn" onclick="updateRecord()">Update & Save to Sheet</button>
    <div id="updateLoader" class="hidden loading">Updating Database... Please Wait.</div>
  </div>
</div>

<script>
  window.onload = generateCaptcha;
  var currentCaptcha = "";
  var savedAppNo = ""; 

  function generateCaptcha() {
    var chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    currentCaptcha = "";
    for (var i = 0; i < 5; i++) {
      currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaDisplay").innerText = currentCaptcha;
  }

  function searchData() { 
    console.log("Searching...");
    var app = document.getElementById('appNo').value.trim();
    var cap = document.getElementById('captchaInput').value.trim();

    if(!app) { alert("कृपया एप्लीकेशन नंबर भरें!"); return; }
    if(cap.toUpperCase() !== currentCaptcha) { 
      alert("कैप्चा गलत है!"); 
      generateCaptcha(); 
      return; 
    }

    console.log("Searching App No:", app);

    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('searchBtn').disabled = true;

    google.script.run
      .withSuccessHandler(fillForm)
      .withFailureHandler(function(err){ 
          document.getElementById('loader').classList.add('hidden');
          document.getElementById('searchBtn').disabled = false;
          alert("Server Error: " + err.message); 
      })
      .fetchRecordForEdit(app);  
  }

  function fillForm(data) { 
    console.log("Full Data:", data);

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('searchBtn').disabled = false;

    if(data && (data.status === "found" || data.appNo || data.name)) {

      // 🔥 FIXED LINE
      savedAppNo = data.appNo || data.appno || data.applicationNumber || document.getElementById('appNo').value;

      console.log("Saved AppNo:", savedAppNo);

      document.getElementById('editForm').classList.remove('hidden');
      // document.getElementById('searchBox').classList.add('hidden'); // optional

      document.getElementById('session').value = data.session || "2026-27";
      document.getElementById('stuName').value = data.studentName || data.name || "";
      document.getElementById('fName').value = data.fatherName || data.father || "";
      document.getElementById('mName').value = data.motherName || data.mother || "";
      document.getElementById('stuClass').value = data.class || "";
      document.getElementById('stuGender').value = data.gender || "";
      document.getElementById('stuMedium').value = data.medium || "";
      document.getElementById('stuCategory').value = data.category || "";
      document.getElementById('stuSubject').value = data.subject || "";
      document.getElementById('stuVillage').value = data.village || "";
      document.getElementById('stuTehsil').value = data.tehsil || "";
      document.getElementById('stuAddress').value = data.address || "";
      document.getElementById('stuAdhar').value = data.adhar || "";
      document.getElementById('stuSamagra').value = data.samagra || "";
      document.getElementById('stuBank').value = data.bank || "";
      document.getElementById('stuAccNo').value = data.accountnumber || "";
      document.getElementById('stuIfsc').value = data.ifsc || "";
      document.getElementById('stuMobile1').value = data.mobile1 || "";

      // DOB FIX
      if(data.dob){
        let d = new Date(data.dob);
        if(!isNaN(d)){
          document.getElementById('stuDob').value = d.toISOString().split('T')[0];
        }
      }

    } else {
      alert("रिकॉर्ड नहीं मिला! कृपया एप्लीकेशन नंबर चेक करें।");
      generateCaptcha();
    }
  }

  function updateRecord() {

    // 🔥 VALIDATION FIX
    if(!savedAppNo){
      alert("Application Number missing! दुबारा search करें");
      return;
    }

    var obj = {
      appNo: savedAppNo, 
      session: document.getElementById('session').value,
      studentName: document.getElementById('stuName').value,
      fatherName: document.getElementById('fName').value,
      motherName: document.getElementById('mName').value,
      dob: document.getElementById('stuDob').value,
      class: document.getElementById('stuClass').value,
      gender: document.getElementById('stuGender').value,
      medium: document.getElementById('stuMedium').value,
      category: document.getElementById('stuCategory').value,
      subject: document.getElementById('stuSubject').value,
      village: document.getElementById('stuVillage').value,
      tehsil: document.getElementById('stuTehsil').value,
      address: document.getElementById('stuAddress').value,
      adhar: document.getElementById('stuAdhar').value,
      samagra: document.getElementById('stuSamagra').value,
      bank: document.getElementById('stuBank').value,
      accountnumber: document.getElementById('stuAccNo').value,
      ifsc: document.getElementById('stuIfsc').value,
      mobile1: document.getElementById('stuMobile1').value
    };

    document.getElementById('updateLoader').classList.remove('hidden');
    document.getElementById('updateBtn').disabled = true;

    google.script.run
      .withSuccessHandler(function(msg) {
        document.getElementById('updateLoader').classList.add('hidden');
        alert(msg);
        location.reload();
      })
      .withFailureHandler(function(err) {
        document.getElementById('updateLoader').classList.add('hidden');
        document.getElementById('updateBtn').disabled = false;
        alert("Update Failed: " + err.message);
      })
      .updateStudentData(obj);
  }
</script>

</body>
</html>
