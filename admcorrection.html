<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal - Student Information</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #e6f0ff; margin:0; padding:20px; }
  .form-container { max-width:950px; margin:10px auto; background:#fff; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.15); padding:25px; border:2px solid #002366; }
  
  h2 {
    text-align: center; font-family: 'Luckiest Guy', cursive; font-size: 34px; 
    background: linear-gradient(45deg, #ffcc00, #ff0066, #00ccff); 
    background-clip: text; -webkit-background-clip: text; color: transparent;
    padding: 5px 0; border-bottom: 4px solid #004080; display: block; margin-bottom: 20px;
  }

  .edit-heading {
    text-align: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 24px;
    color: #002366; position: relative; margin: 25px 0 15px 0; padding-bottom: 8px;
  }
  .edit-heading::after {
    content: ''; width: 80px; height: 4px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px;
  }

  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-weight:600; font-size: 16px; }
  label { font-weight:600; margin-top:12px; display:block; color: #333; font-size: 13px; text-transform: uppercase; }
  
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; font-family:inherit; transition: 0.3s; background: #fafafa; box-sizing: border-box; }
  input:focus, select:focus { border-color:#004080; box-shadow:0 0 8px rgba(0,64,128,0.2); outline:none; background: #fff; }
  
  .row { display:flex; gap:15px; flex-wrap:wrap; margin-bottom: 5px; }
  .row > div { flex:1; min-width: 200px; }

  /* Photo Box Styling */
  .photo-section {
    display: flex; gap: 20px; align-items: flex-start; margin-top: 15px;
  }
  .photo-box-container {
    width: 130px; height: 160px; border: 2px dashed #002366; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; background: #f8fbff;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .preview-img { width: 100%; height: 100%; object-fit: cover; }
  .photo-label { font-size: 11px; color: #002366; font-weight: bold; text-align: center; position: absolute; bottom: 5px; background: rgba(255,255,255,0.8); width: 100%; }

  /* Other Styles */
  .btn-search { background: linear-gradient(to right, #007bff, #0056b3); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
  .btn-update { background: linear-gradient(to right, #28a745, #1e7e34); color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 18px; margin-top: 30px; }
  .hidden { display: none; }
  .declaration-box { background: #fffdf2; padding: 15px; border-radius: 8px; border: 1px solid #ffe58f; margin: 25px 0; }
  .declaration-label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 13.5px; line-height: 1.5; }
  .declaration-label input { width: 18px; height: 18px; accent-color: #002366; margin-top: 2px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="form-container">
  <div id="searchBox" class="search-card">
    <h2>Correction Portal</h2>
    <div class="row">
      <div><label>Application Number</label><input type="text" id="appNoSearch" placeholder="Ex: 2026001"></div>
      <div><label>Mobile Number</label><input type="tel" id="mobSearch" placeholder="10 Digit Number"></div>
    </div>
    <button class="btn-search" id="mainSearchBtn" onclick="verifyAndSearch()">Search Application</button>
  </div>

  <div id="editForm" class="hidden">
    <div class="edit-heading">✏️ EDIT STUDENT APPLICATION</div>
    
    <form id="correctionForm">
      <h3>👤 Personal & Photo Information</h3>
      <div class="photo-section">
        <div class="photo-box-container">
          <img id="photoPreview" class="preview-img" src="https://via.placeholder.com/130x160?text=PHOTO" alt="Preview">
          <div class="photo-label">STUDENT PHOTO</div>
        </div>

        <div style="flex: 1;">
          <div class="row">
            <div><label>Academic Session</label><select id="session"><option value="2026-27">2026-27</option></select></div>
            <div><label>Class</label><select id="stuClass"><option value="1">1st</option><option value="10">10th</option><option value="12">12th</option></select></div>
          </div>
          <label>Full Student Name</label>
          <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">
          <label>Update Photo (Click to select)</label>
          <input type="file" id="photoUpload" accept="image/*" onchange="previewImage(this)">
        </div>
      </div>

      <div class="row">
        <div><label>Father's Name</label><input type="text" id="fName" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Mother's Name</label><input type="text" id="mName" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date" id="stuDob"></div>
        <div><label>Gender</label><select id="stuGender"><option value="Male">Male</option><option value="Female">Female</option></select></div>
        <div><label>Category</label><select id="stuCategory"><option value="GEN">General</option><option value="OBC">OBC</option><option value="SC">SC</option><option value="ST">ST</option></select></div>
      </div>

      <h3>📍 Contact & Address</h3>
      <div class="row">
        <div><label>Village/Town</label><input type="text" id="stuVillage" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Tehsil</label><input type="text" id="stuTehsil" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>District</label><input type="text" id="stuDistrict" value="RAJGARH" oninput="this.value = this.value.toUpperCase()"></div>
      </div>
      <label>Full Address</label>
      <textarea id="stuAddress" rows="2" oninput="this.value = this.value.toUpperCase()"></textarea>

      <div class="row">
        <div><label>Aadhaar Number</label><input type="text" id="stuAdhar" maxlength="12"></div>
        <div><label>Samagra ID</label><input type="text" id="stuSamagra" maxlength="9"></div>
        <div><label>Mobile (Read-only)</label><input type="text" id="stuMobile1" readonly style="background:#eee;"></div>
      </div>

      <h3>🏦 Bank Details</h3>
      <div class="row">
        <div><label>Bank Name</label><input type="text" id="stuBank" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Account Number</label><input type="text" id="stuAccNo"></div>
        <div><label>IFSC Code</label><input type="text" id="stuIfsc" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="declaration-box">
        <label class="declaration-label">
          <input type="checkbox" id="declarationCheck">
          <span>
            <b>घोषणा पत्र:</b> मैं यह घोषणा करता/करती हूँ कि मेरे द्वारा दी गई समस्त जानकारी मेरे ज्ञान के अनुसार पूर्णतः सत्य है। यदि भविष्य में कोई भी जानकारी गलत पाई जाती है, तो मेरे बालक/बालिका का प्रवेश निरस्त किया जा सकता है।
          </span>
        </label>
      </div>

      <button type="button" class="btn-update" id="updateBtn" onclick="processUpdate()">Submit Corrections 🚀</button>
    </form>
  </div>
</div>

<script>
  const SCRIPT_URL = "APNI_APPS_SCRIPT_URL_YAHAN_DALEIN";
  var savedAppNo = "";

  function previewImage(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById('photoPreview').src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function verifyAndSearch() {
    // Search logic wahi rahega...
    alert("Database search feature is connected to your Script URL.");
  }

  function processUpdate() {
    if(!document.getElementById('declarationCheck').checked) {
      alert("⚠️ कृपया घोषणा पत्र को स्वीकार करें!");
      return;
    }
    // Update logic...
  }
</script>

</body>
</html>
