<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal - Student Information</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #e6f0ff; margin:0; padding:20px; }
  .form-container { max-width:900px; margin:10px auto; background:#fff; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15); padding:25px; border:2px solid #0056b3; }
  
  /* Search Header (Image Style) */
  .search-header { text-align: center; color: #0056b3; font-size: 28px; font-weight: bold; padding: 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  
  /* Edit Heading with Bottom Line */
  .edit-heading {
    text-align: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 26px;
    color: #002366; position: relative; margin: 25px 0 20px 0; padding-bottom: 12px;
  }
  .edit-heading::after {
    content: ''; width: 150px; height: 4px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px;
  }

  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-weight:600; font-size: 16px; }
  label { font-weight:500; margin-top:10px; display:block; color: #333; font-size: 14px; }
  
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; font-family:inherit; box-sizing: border-box; }
  input:focus, select:focus { border-color:#004080; outline:none; box-shadow:0 0 8px rgba(0,64,128,0.2); }
  
  /* Row spacing */
  .row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 5px; }
  .row > div { flex:1; min-width: 200px; }

  /* Captcha Box (Image Style) */
  .captcha-container { text-align: center; margin: 15px 0; }
  .captcha-inner { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .captcha-code { border: 2px solid #000; border-radius: 10px; padding: 5px 25px; font-size: 22px; font-weight: bold; letter-spacing: 5px; background: #f9f9f9; font-family: monospace; }
  .btn-refresh { background: #ff9800; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

  /* Photo Box Styling */
  .photo-display-section { display: flex; gap: 20px; align-items: center; background: #f8fbff; padding: 15px; border-radius: 10px; border: 1px solid #ddecff; margin-bottom: 15px; }
  .photo-box { width: 130px; height: 160px; border: 2px solid #002366; border-radius: 5px; background: #fff; overflow: hidden; }
  .photo-box img { width: 100%; height: 100%; object-fit: cover; }

  /* Buttons */
  .btn-submit { background: #4caf50; color: white; border: none; padding: 12px 45px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; display: block; margin: 10px auto; }
  .btn-submit:hover { transform: scale(1.02); }
  .btn-update { background: #0056b3; }

  .hidden { display: none; }
  .declaration-box { background: #fff9e6; padding: 15px; border: 1px solid #ffcc00; margin-top: 15px; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>

<div class="form-container">
  
  <div id="searchBox">
    <div class="search-header">🎓 Application Receipt System</div>
    <div class="row">
      <div><input type="text" id="appNoSearch" placeholder="Application Number"></div>
      <div><input type="tel" id="mobSearch" placeholder="Mobile Number"></div>
    </div>
    <div class="captcha-container">
      <div class="captcha-inner">
        <div class="captcha-code" id="captchaDisplay">XXXXXX</div>
        <button class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
      </div>
      <center><input type="text" id="captchaInput" placeholder="Enter Captcha" style="max-width:350px; text-align:center; border: 1px solid #0056b3;"></center>
      <button class="btn-submit" onclick="verifyAndSearch()">Submit</button>
    </div>
  </div>

  <div id="editForm" class="hidden">
    <div class="edit-heading">EDIT STUDENT DETAILS</div>
    
    <form id="correctionForm">
      <h3>Student Details</h3>
      <div class="photo-display-section">
        <div class="photo-box">
          <img id="photoPreview" src="https://via.placeholder.com/130x160?text=PHOTO">
        </div>
        <div style="flex:1;">
          <label>Update Photo</label>
          <input type="file" id="photoUpload" accept="image/*" onchange="previewImage(this)">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Session (Year)</label>
          <select name="session" id="session">
            <option value="2026-27">2026-27</option>
            <option value="2027-28">2027-28</option>
          </select>
        </div>
        <div>
          <label>Class</label>
          <select name="class" id="stuClass">
            <option value="1">1st</option><option value="10">10th</option><option value="12">12th</option>
          </select>
        </div>
      </div>

      <label>Student Name</label>
      <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">

      <div class="row">
        <div><label>Father Name</label><input type="text" id="fName" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Mother Name</label><input type="text" id="mName" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date" id="dob"></div>
        <div><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
        <div><label>Category</label><select id="category"><option>General</option><option>OBC</option><option>SC</option><option>ST</option></select></div>
      </div>

      <h3>Address Details</h3>
      <div class="row">
        <div><label>State</label><input type="text" id="state" value="Madhya Pradesh" readonly></div>
        <div><label>District</label><input type="text" id="district" value="Rajgarh"></div>
        <div><label>Tehsil</label><input type="text" id="tehsil"></div>
      </div>
      <div class="row">
        <div><label>Village</label><input type="text" id="village" oninput="this.value = this.value.toUpperCase()"></div>
        <div style="flex:2;"><label>Full Address</label><textarea id="address" rows="2" oninput="this.value = this.value.toUpperCase()"></textarea></div>
      </div>

      <h3>ID & Bank Details</h3>
      <div class="row">
        <div><label>Aadhaar Number</label><input type="text" id="adhar" maxlength="12"></div>
        <div><label>Samagra ID</label><input type="text" id="samagra" maxlength="9"></div>
      </div>
      <div class="row">
        <div><label>Bank Name</label><input type="text" id="bank" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Account Number</label><input type="text" id="accNo"></div>
        <div><label>IFSC Code</label><input type="text" id="ifsc" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="declaration-box">
        <label style="display:flex; gap:10px; cursor:pointer;">
          <input type="checkbox" id="declarationCheck">
          <span>मैं यह घोषणा करता/करती हूँ कि मेरे द्वारा दी गई समस्त जानकारी पूर्णतः सत्य है।</span>
        </label>
      </div>

      <button type="button" class="btn-submit btn-update" onclick="processUpdate()">Update Admission 🚀</button>
    </form>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec";
  var currentCaptcha = "";

  window.onload = generateCaptcha;

  function generateCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    currentCaptcha = "";
    for (let i = 0; i < 6; i++) { currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length)); }
    document.getElementById("captchaDisplay").innerText = currentCaptcha;
  }

  function previewImage(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById('photoPreview').src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function verifyAndSearch() {
    const cap = document.getElementById('captchaInput').value.trim();
    if(cap.toUpperCase() !== currentCaptcha) { alert("Wrong Captcha!"); generateCaptcha(); return; }
    
    // Yahan fetch logic aayega (Google Sheets se data lane ke liye)
    // Abhi demo ke liye form show kar rahe hain:
    document.getElementById('searchBox').classList.add('hidden');
    document.getElementById('editForm').classList.remove('hidden');
  }

  function processUpdate() {
    if(!document.getElementById('declarationCheck').checked) { alert("Please accept declaration!"); return; }
    // Update logic same pichle codes jaisa rahega
    alert("Updating data to Google Sheets...");
  }
</script>

</body>
</html>
