<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Correction System</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
  .search-card { max-width: 750px; margin: 50px auto; background: #fff; border: 3px solid #1a73e8; padding: 40px; box-shadow: 10px 10px 20px rgba(0,0,0,0.1); text-align: center; }
  .header-title { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 26px; font-weight: bold; color: #1a73e8; margin-bottom: 30px; }
  .input-group-row { display: flex; gap: 15px; margin-bottom: 20px; }
  .input-group-row input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }

  /* --- केवल कैप्चा डिजाइन (Capture55_2.JPG के अनुसार) --- */
  .captcha-wrapper { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; }
  
  .captcha-box-simple { 
    border: 1px solid #000; border-radius: 5px; padding: 8px 30px; 
    font-size: 22px; font-weight: bold; letter-spacing: 5px; 
    background: #fff; color: #000; min-width: 140px; font-family: sans-serif; text-align: center;
  }

  .refresh-btn-simple { 
    background-color: #ff9800; color: white; border: none; border-radius: 5px; 
    padding: 10px 18px; cursor: pointer; font-weight: bold; font-size: 14px;
  }

  .captcha-input-simple { 
    width: 50%; padding: 12px; border: 1px solid #1a73e8; border-radius: 8px; 
    text-align: center; margin-bottom: 25px; font-size: 16px; 
  }
  /* -------------------------------------------------- */

  .submit-btn { background-color: #4caf50; color: white; border: none; padding: 12px 60px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  .form-container { max-width:900px; margin:20px auto; background:#fff; border-radius:12px; padding:25px; border:2px solid #0056b3; box-shadow:0 8px 25px rgba(0,0,0,0.1); }
  .edit-heading { text-align: center; font-weight: 700; font-size: 26px; color: #002366; position: relative; margin-bottom: 25px; padding-bottom: 12px; font-family: 'Poppins'; }
  .edit-heading::after { content: ''; width: 150px; height: 4px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px; }
  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-size: 16px; font-weight:600; }
  label { font-weight:600; margin-top:10px; display:block; font-size: 14px; color: #333; }
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; box-sizing: border-box; font-family: inherit; }
  .row { display:flex; gap:15px; flex-wrap:wrap; margin-bottom: 10px; }
  .row > div { flex:1; min-width: 200px; }
  .photo-upload-section { display: flex; flex-direction: column; align-items: flex-start; padding: 20px; background: #f9fbff; border: 1px dashed #0056b3; border-radius: 10px; margin-top: 15px; }
  .image-frame { width: 150px; height: 180px; border: 3px solid #002366; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .image-frame img { width: 100%; height: 100%; object-fit: cover; }
  
 .declaration-wrapper {
  background: #fff9e6;
  border-left: 5px solid #ffcc00;
  padding: 20px;
  margin: 25px 0;
  border-radius: 8px;
  border: 1px solid #ffeeba;
}
.declaration-title {
  color: #856404;
  font-weight: bold;
  margin-bottom: 10px;
  display: block;
  font-size: 16px;
}

.declaration-text {
  font-size: 14px;
  line-height: 1.6;
  color: #555;
  display: flex;
  gap: 10px;              /* थोड़ा कम gap */
  align-items: flex-start;
}

.declaration-text input {
  width: 20px;            /* थोड़ा छोटा */
  height: 20px;
  margin-top: 4px;        /* alignment ठीक */
  cursor: pointer;
  flex-shrink: 0;
}

.hidden {
  display: none;
}

.photo-preview {
  width: 150px;
  height: 180px;
  object-fit: cover;
  border: 2px solid #002366;
  margin-top: 10px;
  display: none;
}
.simple-captcha-box {
  text-align: center;
  margin-top: 20px;
}

.simple-captcha-label {
  font-weight: 600;
  color: #1a73e8;
  margin-bottom: 8px;
  display: block;
}

.simple-captcha-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 10px 0;
}

.simple-captcha-code {
  background: #f1f3f4;
  color: #333;
  padding: 6px 14px;
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 3px;
  border-radius: 5px;
}

.simple-refresh-btn {
  background: #1a73e8;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.simple-refresh-btn:hover {
  background: #0d5bd3;
}

.simple-captcha-input {
  margin-top: 10px;
  padding: 8px;
  width: 220px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 5px;
}
</style>
</head>

        <span style="font-weight: 600; color: #333; font-size: 14px;">Security Code:</span>
        
        <div id="finalCaptcha" style="background: #e1eafb; padding: 8px 15px; font-weight: bold; letter-spacing: 5px; font-family: monospace; font-size: 22px; border: 2px dashed #1a73e8; color: #1a73e8; user-select: none; border-radius: 5px;">
            XXXXXX
        </div>

        <button type="button" class="refresh-btn-simple" onclick="refreshCaptcha('finalCaptcha')" style="padding: 8px 12px; background: #ff9800; color: #fff; border: none; border-radius: 5px; cursor: pointer;">
            Refresh 
        </button>
    </div>

    <!-- इनपुट बॉक्स का लेबल और इनपुट -->
    <div style="margin-top: 15px; width: 100%; text-align: center;">
        <label for="finalCapInput" style="display: block; font-size: 13px; margin-bottom: 5px; color: #666;">Type the code shown above:</label>
        <input type="text" id="finalCapInput" placeholder="यहाँ कोड भरें" style="width: 200px; text-align: center; padding: 10px; border: 1px solid #1a73e8; border-radius: 5px; font-size: 16px;" required>
    </div>

</div>

<button type="submit" class="submit-btn" style="display:block; margin: 20px auto;">Update Admission 🚀</button>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbxEQpFakRt3gJ5z8i1yQbGTfKTRUpRqc5xhJoviGiWhHFX3N3eIzviFQVEgaRNoxRhh/exec";

  // पेज लोड होते ही कैप्चा सेटअप
  window.onload = function() {
    setupCaptcha('captchaCode');  // पहला पेज
    setupCaptcha('finalCaptcha'); // दूसरा पेज (Update)
  };

  function setupCaptcha(id) {
    let savedCode = localStorage.getItem('saved_' + id);
    if (savedCode && document.getElementById(id)) {
      document.getElementById(id).innerText = savedCode;
    } else {
      refreshCaptcha(id);
    }
  }

  function refreshCaptcha(id) {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    let target = document.getElementById(id);
    if (target) {
      target.innerText = code;
      localStorage.setItem('saved_' + id, code);
    }
  }

  function previewImg(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('photoPreview').src = e.target.result;
        document.getElementById('photoPreview').style.display = 'block';
        if (document.getElementById('placeholderText')) 
          document.getElementById('placeholderText').style.display = 'none';
      }
      reader.readAsDataURL(input.files[0]);
    }
  }

  function toggleSubjects() {
    const cls = document.getElementById('classSelect').value;
    const subSec = document.getElementById('subjectSection');
    if (subSec) subSec.style.display = (cls == "11" || cls == "12") ? "block" : "none";
  }

  // --- खोज (Search) फंक्शन ---
  function handleSearch() {
    const capInp = document.getElementById('captchaInp').value.toUpperCase();
    const capCode = document.getElementById('captchaCode').innerText;
    const appNo = document.getElementById('appNo').value.trim();
    const mobNo = document.getElementById('mobNo').value.trim();

    if (capInp !== capCode) {
      Swal.fire({ icon: 'error', title: 'गलती!', text: 'कैप्चा कोड गलत है।' });
      refreshCaptcha('captchaCode');
      return;
    }

    if (!appNo || !mobNo) {
      Swal.fire({ icon: 'warning', text: 'कृपया विवरण भरें।' });
      return;
    }

    Swal.fire({ title: 'खोज रहे हैं...', didOpen: () => { Swal.showLoading(); } });

    fetch(`${scriptURL}?action=search&appNo=${appNo}&mobNo=${mobNo}`)
      .then(res => res.json())
      .then(data => {
        Swal.close();
        if (data.status === "found") {
          document.getElementById('searchSection').classList.add('hidden');
          document.getElementById('correctionSection').classList.remove('hidden');
          refreshCaptcha('finalCaptcha');

          const form = document.getElementById('correctionForm');
          
          // डेटा मैपिंग (JSON Key और Form Name के आधार पर)
          const fields = ['studentName', 'fatherName', 'motherName', 'dob', 'gender', 'medium', 'category', 'state', 'district', 'tehsil', 'village', 'address', 'adhar', 'samgra', 'bank', 'accountnumber', 'ifsc', 'mobile1', 'mobile2'];
          
          fields.forEach(f => { if(form[f]) form[f].value = data[f] || ""; });
          
          // क्लास और सब्जेक्ट हैंडलिंग
          if(form.class) form.class.value = data.class || "";
          toggleSubjects();
          if (data.subject && form.subject) form.subject.value = data.subject;

          if (data.photo) {
            const photoImg = document.getElementById('photoPreview');
            photoImg.src = data.photo;
            photoImg.style.display = 'block';
            if (document.getElementById('placeholderText')) 
               document.getElementById('placeholderText').style.display = 'none';
          }
        } else {
          Swal.fire({ icon: 'error', title: 'रिकॉर्ड नहीं मिला', text: 'ऐप नंबर या मोबाइल नंबर गलत है।' });
          refreshCaptcha('captchaCode');
        }
      })
      .catch(err => {
        Swal.close();
        Swal.fire({ icon: 'error', title: 'त्रुटि', text: 'डेटा लोड करने में विफल।' });
      });
  }

  // --- अपडेट (Update) फंक्शन ---
  async function updateRecord(event) {
    if (event) event.preventDefault();

    const finalInp = document.getElementById('finalCapInput').value.toUpperCase();
    const finalCode = document.getElementById('finalCaptcha').innerText;

    if (finalInp !== finalCode) {
      Swal.fire({ icon: 'error', text: 'सिक्योरिटी कोड (कैप्चा) गलत है!' });
      refreshCaptcha('finalCaptcha');
      return;
    }

    const form = document.getElementById('correctionForm');
    const formData = new FormData(form);
    
    // फोटो को Base64 में कन्वर्ट करना
    const fileInput = document.getElementById('photoUpload');
    let base64Photo = "";
    if (fileInput.files.length > 0) {
      base64Photo = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      });
    }

    // डेटा ऑब्जेक्ट तैयार करना
    const obj = { action: "update" };
    formData.forEach((value, key) => obj[key] = value);
    if (base64Photo) obj.photoData = base64Photo;
    obj.appNo = document.getElementById('appNo').value; // आईडी ट्रैकिंग के लिए

    Swal.fire({ title: 'सुरक्षित किया जा रहा है...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(obj)
    })
    .then(res => res.json())
    .then(response => {
      Swal.close();
      if (response.status === "success") {
        Swal.fire({ icon: 'success', title: 'सफलता!', text: 'डेटा अपडेट कर दिया गया है।' })
        .then(() => {
          localStorage.clear();
          location.reload(); 
        });
      } else {
        Swal.fire({ icon: 'error', title: 'त्रुटि', text: response.message });
      }
    })
    .catch(err => {
      Swal.close();
      Swal.fire({ icon: 'error', title: 'सर्वर त्रुटि', text: 'अपडेट विफल रहा।' });
    });
  }
</script>
</body>
</html>
