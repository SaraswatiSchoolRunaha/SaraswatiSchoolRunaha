<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #f0f4f8; margin:0; padding:20px; }
  .form-container { max-width:900px; margin:20px auto; background:#fff; border: 2px solid #0056b3; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
  
  /* Image jaisa Header */
  .search-header { text-align: center; color: #0056b3; font-size: 28px; font-weight: bold; padding: 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .search-header img { width: 35px; }

  /* Compact Row Design */
  .row { display: flex; gap: 10px; margin-bottom: 10px; padding: 0 20px; }
  .row > div { flex: 1; }

  input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
  
  /* Captcha Section (Image Style) */
  .captcha-container { text-align: center; margin: 15px 0; }
  .captcha-inner { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .captcha-code { border: 1.5px solid #000; border-radius: 10px; padding: 5px 25px; font-size: 22px; font-weight: bold; letter-spacing: 4px; background: #f9f9f9; }
  .btn-refresh { background: #ff9800; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  .captcha-input { max-width: 400px; border-color: #0056b3; text-align: center; }

  /* Buttons */
  .btn-submit { background: #4caf50; color: white; border: none; padding: 12px 40px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
  .btn-submit:hover { background: #45a049; }

  /* Edit Form & Photo Box */
  #editForm { padding: 20px; border-top: 2px solid #0056b3; }
  .student-photo-box { width: 130px; height: 160px; border: 2px solid #0056b3; border-radius: 5px; background: #fff; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .student-photo-box img { width: 100%; height: 100%; object-fit: cover; }

  .hidden { display: none; }
  h3 { background: #0056b3; color: #fff; padding: 8px 15px; font-size: 16px; border-radius: 4px; margin-top: 20px; }
  .declaration-box { background: #fff9e6; padding: 15px; border: 1px solid #ffcc00; margin-top: 15px; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>

<div class="form-container">
  
  <div id="searchBox">
    <div class="search-header">
      <span>🎓</span> Application Receipt System
    </div>
    
    <div class="row">
      <div><input type="text" id="appNoSearch" placeholder="Application Number"></div>
      <div><input type="text" id="mobSearch" placeholder="Mobile Number"></div>
    </div>

    <div class="captcha-container">
      <div class="captcha-inner">
        <div class="captcha-code" id="captchaDisplay">CKHFTJ</div>
        <button class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
      </div>
      <center><input type="text" id="captchaInput" class="captcha-input" placeholder="Enter Captcha"></center>
      <br>
      <button class="btn-submit" onclick="verifyAndSearch()">Submit</button>
    </div>
  </div>

  <div id="editForm" class="hidden">
    <center><h2 style="color:#0056b3; margin-top:0;">EDIT STUDENT DETAILS</h2></center>
    
    <form id="correctionForm">
      <div class="row" style="align-items: flex-end;">
        <div>
          <label>Student Photo</label>
          <div class="student-photo-box">
            <img id="photoPreview" src="https://via.placeholder.com/130x160?text=PHOTO">
          </div>
          <input type="file" id="photoUpload" accept="image/*" onchange="previewImage(this)">
        </div>
        
        <div style="flex: 2;">
          <div class="row">
            <div><label>Academic Session</label><select id="session"><option>2026-27</option></select></div>
            <div><label>Class</label><select id="stuClass"><option>10th</option></select></div>
          </div>
          <label>Student Full Name</label>
          <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">
        </div>
      </div>

      <div class="row">
        <div><label>Father's Name</label><input type="text" id="fName"></div>
        <div><label>Mother's Name</label><input type="text" id="mName"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date" id="stuDob"></div>
        <div><label>Gender</label><select id="stuGender"><option>Male</option><option>Female</option></select></div>
        <div><label>Category</label><select id="stuCategory"><option>OBC</option><option>GEN</option></select></div>
      </div>

      <h3>📍 ADDRESS & IDS</h3>
      <div class="row">
        <div><label>Village</label><input type="text" id="stuVillage"></div>
        <div><label>Tehsil</label><input type="text" id="stuTehsil"></div>
        <div><label>Aadhaar No.</label><input type="text" id="stuAdhar" maxlength="12"></div>
      </div>

      <div class="row">
        <div><label>Samagra ID</label><input type="text" id="stuSamagra"></div>
        <div><label>Mobile Number</label><input type="text" id="stuMobile" readonly style="background:#eee;"></div>
      </div>

      <div class="declaration-box">
        <label style="display:flex; gap:10px; cursor:pointer;">
          <input type="checkbox" id="declarationCheck" style="width:20px; height:20px;">
          <span>मैं यह घोषणा करता/करती हूँ कि मेरे द्वारा दी गई समस्त जानकारी मेरे ज्ञान के अनुसार पूर्णतः सत्य है। यदि भविष्य में कोई भी जानकारी गलत पाई जाती है, तो मेरे बालक/बालिका का प्रवेश निरस्त किया जा सकता है।</span>
        </label>
      </div>

      <center><button type="button" class="btn-submit" style="margin-top:20px; background:#0056b3;" onclick="processUpdate()">Update Changes</button></center>
    </form>
  </div>
</div>

<script>
  // Captcha Logic
  function generateCaptcha() {
    let code = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('captchaDisplay').innerText = code;
  }

  function previewImage(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById('photoPreview').src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function verifyAndSearch() {
    // Yahan search logic aayega... abhi ke liye form show kar rahe hain
    document.getElementById('searchBox').classList.add('hidden');
    document.getElementById('editForm').classList.remove('hidden');
  }

  window.onload = generateCaptcha;
</script>

</body>
</html>
