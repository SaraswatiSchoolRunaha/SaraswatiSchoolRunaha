<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal - Student Information</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  /* Aapke naye Admission Form ki Styling */
  body { font-family: 'Poppins', Arial, sans-serif; background: #e6f0ff; margin:0; padding:20px; }
  .form-container { max-width:900px; margin:20px auto; background:#fff; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.2); padding:30px; border:2px solid #002366; }
  
  h2 {
    text-align: center; font-family: 'Luckiest Guy', cursive; font-size: 32px; 
    background: linear-gradient(45deg, #ffcc00, #ff0066, #00ccff); 
    background-clip: text; -webkit-background-clip: text; color: transparent;
    padding: 10px 0; border-bottom: 4px solid #004080; display: block; margin: 0 auto 20px;
  }

  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-weight:600; }
  label { font-weight:500; margin-top:10px; display:block; color: #333; }
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; font-family:inherit; transition: 0.3s; }
  input:focus, select:focus { border-color:#004080; box-shadow:0 0 8px rgba(0,64,128,0.3); outline:none; }
  
  .row { display:flex; gap:15px; flex-wrap:wrap; }
  .row > div { flex:1; min-width: 200px; }

  /* Buttons */
  .btn-search { background: #007bff; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 15px; }
  .btn-update { background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 18px; margin-top: 30px; }
  
  .hidden { display: none; }
  .captcha-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; justify-content: center; }
  .captcha-code { background: #333; color: #fff; padding: 10px 20px; font-weight: bold; border-radius: 6px; letter-spacing: 4px; font-size: 20px; }
  .search-card { background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px dashed #004080; }
  .loading { color: #004080; text-align: center; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<div class="form-container">
  <div id="searchBox" class="search-card">
    <h2>Correction Portal</h2>
    <div class="row">
      <div>
        <label>Application Number</label>
        <input type="text" id="appNoSearch" placeholder="Enter App No.">
      </div>
      <div>
        <label>Registered Mobile Number</label>
        <input type="tel" id="mobSearch" placeholder="Enter Mobile No.">
      </div>
    </div>

    <div style="text-align:center; margin-top:15px;">
      <label>Verify Captcha</label>
      <div class="captcha-box">
        <div class="captcha-code" id="captchaDisplay">XXXXXX</div>
        <button type="button" onclick="generateCaptcha()" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline;">Refresh</button>
      </div>
      <input type="text" id="captchaInput" placeholder="Enter Code Here" style="max-width:200px; text-align:center;">
    </div>

    <button class="btn-search" onclick="verifyAndSearch()">Verify & Edit Application</button>
    <div id="loader" class="hidden loading">Searching Database... ⏳</div>
  </div>

  <div id="editForm" class="hidden">
    <h2>Edit Student Details</h2>
    <form id="correctionForm">
      
      <h3>Student Details</h3>
      <div class="row">
        <div>
          <label>Session</label>
          <select id="session" name="session">
            <option value="2026-27">2026-27</option>
            <option value="2027-28">2027-28</option>
          </select>
        </div>
        <div>
          <label>Class</label>
          <select id="stuClass" name="class">
            <option value="">Select Class</option>
            <option value="1">1st</option><option value="10">10th</option><option value="12">12th</option>
          </select>
        </div>
      </div>

      <label>Student Name</label>
      <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">

      <div class="row">
        <div><label>Father Name</label><input type="text" id="fName" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Mother Name</label><input type="text" id="mName" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date" id="stuDob"></div>
        <div>
          <label>Gender</label>
          <select id="stuGender">
            <option value="Male">Male</option><option value="Female">Female</option>
          </select>
        </div>
      </div>

      <h3>Address & Contact</h3>
      <div class="row">
        <div><label>Village</label><input type="text" id="stuVillage" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Tehsil</label><input type="text" id="stuTehsil" oninput="this.value = this.value.toUpperCase()"></div>
      </div>
      <label>Full Address</label>
      <textarea id="stuAddress" oninput="this.value = this.value.toUpperCase()"></textarea>

      <div class="row">
        <div><label>Aadhaar Number</label><input type="text" id="stuAdhar" maxlength="12"></div>
        <div><label>Mobile Number</label><input type="text" id="stuMobile1" readonly style="background:#eee;"></div>
      </div>

      <button type="button" class="btn-update" onclick="updateData()">Save Correction to Database 🚀</button>
      <div id="updateLoader" class="hidden loading">Updating Record... Please Wait.</div>
    </form>
  </div>
</div>

<script>
  // 1. ZAROORI: Apna Backend URL yahan dalein
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec";

  var currentCaptcha = "";
  var savedAppNo = "";

  window.onload = generateCaptcha;

  function generateCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    currentCaptcha = "";
    for (let i = 0; i < 6; i++) {
      currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaDisplay").innerText = currentCaptcha;
  }

  function verifyAndSearch() {
    let app = document.getElementById('appNoSearch').value.trim();
    let mob = document.getElementById('mobSearch').value.trim();
    let cap = document.getElementById('captchaInput').value.trim();

    if(!app || !mob) { alert("ID aur Mobile number dalein!"); return; }
    if(cap.toUpperCase() !== currentCaptcha) { alert("Captcha galat hai!"); generateCaptcha(); return; }

    document.getElementById('loader').classList.remove('hidden');

    // Apps Script Backend se data mangna
    fetch(`${SCRIPT_URL}?appNo=${app}&mob=${mob}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loader').classList.add('hidden');
        if(data.status === "found") {
          showForm(data);
        } else {
          alert("Record nahi mila! Check details.");
        }
      })
      .catch(err => {
        alert("Server Error!");
        document.getElementById('loader').classList.add('hidden');
      });
  }

  function showForm(data) {
    savedAppNo = data.appNo;
    document.getElementById('searchBox').classList.add('hidden');
    document.getElementById('editForm').classList.remove('hidden');

    // Data Mapping
    document.getElementById('stuName').value = data.studentName || "";
    document.getElementById('fName').value = data.fatherName || "";
    document.getElementById('mName').value = data.motherName || "";
    document.getElementById('stuClass').value = data.class || "";
    document.getElementById('stuVillage').value = data.village || "";
    document.getElementById('stuAddress').value = data.address || "";
    document.getElementById('stuAdhar').value = data.adhar || "";
    document.getElementById('stuMobile1').value = data.mobile1 || "";
    document.getElementById('session').value = data.session || "2026-27";
    document.getElementById('stuDob').value = data.dob || "";
  }

  function updateData() {
    if(!confirm("Kya aap badlav save karna chahte hain?")) return;
    
    document.getElementById('updateLoader').classList.remove('hidden');
    
    let updateObj = {
      action: "update",
      appNo: savedAppNo,
      studentName: document.getElementById('stuName').value,
      fatherName: document.getElementById('fName').value,
      motherName: document.getElementById('mName').value,
      class: document.getElementById('stuClass').value,
      address: document.getElementById('stuAddress').value,
      village: document.getElementById('stuVillage').value,
      adhar: document.getElementById('stuAdhar').value,
      dob: document.getElementById('stuDob').value
    };

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(updateObj)
    }).then(() => {
      alert("Success! Data update ho gaya.");
      location.reload();
    }).catch(() => {
      alert("Error updating data.");
    });
  }
</script>

</body>
</html>
