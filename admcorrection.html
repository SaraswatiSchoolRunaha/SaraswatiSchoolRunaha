<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correction Portal - Student Information</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #e6f0ff; margin:0; padding:20px; }
  .form-container { max-width:900px; margin:10px auto; background:#fff; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15); padding:25px; border:2px solid #0056b3; }
  
  /* Image jaisa Search Header */
  .search-header { text-align: center; color: #0056b3; font-size: 28px; font-weight: bold; padding: 20px 0; border-bottom: 2px solid #0056b3; margin-bottom: 20px; }
  
  /* Edit Heading with Stylish Line */
  .edit-heading {
    text-align: center; font-weight: 700; font-size: 26px;
    color: #002366; position: relative; margin: 25px 0 25px 0; padding-bottom: 12px;
  }
  .edit-heading::after {
    content: ''; width: 150px; height: 4px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px;
  }

  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-weight:600; font-size: 16px; }
  label { font-weight:500; margin-top:8px; display:block; color: #333; font-size: 14px; }
  
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; font-family:inherit; box-sizing: border-box; }
  input:focus { border-color:#004080; outline:none; box-shadow:0 0 8px rgba(0,64,128,0.2); }
  
  /* Row spacing kam rakhi gayi hai */
  .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 5px; }
  .row > div { flex:1; min-width: 200px; }

  /* Photo Box Styling (Now at Bottom) */
  .photo-upload-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; background: #f8fbff; padding: 15px; border: 1px solid #ddecff; border-radius: 10px; }
  .photo-box { width: 130px; height: 160px; border: 2px solid #002366; border-radius: 5px; background: #fff; overflow: hidden; margin-bottom: 10px; }
  .photo-box img { width: 100%; height: 100%; object-fit: cover; }

  /* Captcha System */
  .captcha-container { text-align: center; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 10px; border: 1px dashed #0056b3; }
  .captcha-inner { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .captcha-code { border: 2px solid #000; padding: 5px 25px; font-weight: bold; border-radius: 8px; font-size: 24px; letter-spacing: 5px; background: #fff; font-family: monospace; }
  .btn-refresh { background: #ff9800; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

  .btn-submit { background: #4caf50; color: white; border: none; padding: 12px 50px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; display: block; margin: 15px auto; }
  .hidden { display: none; }
  .declaration-box { background: #fff9e6; padding: 15px; border: 1px solid #ffcc00; margin-top: 15px; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>

<div class="form-container">
  
  <div id="searchBox">
    <div class="search-header">🎓 Application Receipt System</div>
    <div class="row">
      <div><input type="text" id="appNoSearch" placeholder="Application Number"></div>
      <div><input type="tel" id="mobSearch" placeholder="Mobile Number"></div>
    </div>
    <button class="btn-submit" style="background:#0056b3;" onclick="verifyAndSearch()">Open Form</button>
  </div>

  <div id="editForm" class="hidden">
    <div class="edit-heading">EDIT STUDENT DETAILS</div>
    
    <form id="correctionForm">
      <h3>Personal Details</h3>
      <div class="row">
        <div><label>Session</label><select id="session"><option>2026-27</option></select></div>
        <div><label>Class</label><select id="stuClass"><option>10th</option></select></div>
      </div>
      <label>Student Name</label>
      <input type="text" id="stuName" oninput="this.value = this.value.toUpperCase()">

      <div class="row">
        <div><label>Father's Name</label><input type="text" id="fName" oninput="this.value = this.value.toUpperCase()"></div>
        <div><label>Mother's Name</label><input type="text" id="mName" oninput="this.value = this.value.toUpperCase()"></div>
      </div>

      <div class="row">
        <div><label>Date of Birth</label><input type="date" id="dob"></div>
        <div><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
        <div><label>Category</label><select id="category"><option>OBC</option><option>General</option></select></div>
      </div>

      <h3>Address & Bank Details</h3>
      <div class="row">
        <div><label>Village</label><input type="text" id="village"></div>
        <div><label>Tehsil</label><input type="text" id="tehsil"></div>
        <div><label>Aadhaar No.</label><input type="text" id="adhar" maxlength="12"></div>
      </div>
      <div class="row">
        <div><label>Samagra ID</label><input type="text" id="samagra" maxlength="9"></div>
        <div><label>Bank Name</label><input type="text" id="bank"></div>
        <div><label>IFSC Code</label><input type="text" id="ifsc"></div>
      </div>

      <h3>Upload Photo & Verify</h3>
      <div class="photo-upload-section">
        <div class="photo-box">
          <img id="photoPreview" src="https://via.placeholder.com/130x160?text=PHOTO">
        </div>
        <input type="file" id="photoUpload" accept="image/*" onchange="previewImage(this)">
      </div>

      <div class="declaration-box">
        <label style="display:flex; gap:10px; cursor:pointer;">
          <input type="checkbox" id="declarationCheck">
          <span>मैं यह घोषणा करता हूँ कि ऊपर दी गई जानकारी सत्य है।</span>
        </label>
      </div>

      <div class="captcha-container">
        <label>Verification Code</label>
        <div class="captcha-inner">
          <div class="captcha-code" id="captchaDisplay">XXXXXX</div>
          <button type="button" class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
        </div>
        <center><input type="text" id="captchaInput" placeholder="Type Captcha Here" style="max-width:250px; text-align:center; border: 2px solid #0056b3;"></center>
      </div>

      <button type="button" class="btn-submit" onclick="processUpdate()">Save & Update 🚀</button>
    </form>
  </div>
</div>

<script>
  var currentCaptcha = "";

  function generateCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    currentCaptcha = "";
    for (let i = 0; i < 6; i++) { currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length)); }
    document.getElementById("captchaDisplay").innerText = currentCaptcha;
  }

  function previewImage(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById('photoPreview').src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function verifyAndSearch() {
    // Demo ke liye form show kar rahe hain
    document.getElementById('searchBox').classList.add('hidden');
    document.getElementById('editForm').classList.remove('hidden');
    generateCaptcha();
  }

  function processUpdate() {
    const userCap = document.getElementById('captchaInput').value.trim();
    if(userCap.toUpperCase() !== currentCaptcha) {
      alert("❌ Invalid Captcha! Please try again.");
      generateCaptcha();
      return;
    }
    if(!document.getElementById('declarationCheck').checked) {
      alert("⚠️ Please check the declaration box.");
      return;
    }
    alert("✅ Updates saved successfully!");
  }
</script>

</body>
</html>
