<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Correction System</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
  .search-card { max-width: 750px; margin: 50px auto; background: #fff; border: 3px solid #0056b3; padding: 40px; box-shadow: 10px 10px 20px rgba(0,0,0,0.1); text-align: center; }
  .header-title { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 26px; font-weight: bold; color: #0056b3; margin-bottom: 30px; }
  .input-group-row { display: flex; gap: 15px; margin-bottom: 20px; }
  .input-group-row input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
 /* कैप्चा का मुख्य कंटेनर */
.captcha-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f8faff;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #d1d9e6;
  margin: 20px 0;
}

.captcha-box-wrapper {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 15px;
}

/* स्टाइलिश कैप्चा कोड बॉक्स */
.captcha-box {
  background: linear-gradient(135deg, #002366, #004080);
  color: #ffffff;
  padding: 12px 25px;
  font-family: 'Courier New', monospace;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 8px;
  border-radius: 8px;
  text-shadow: 3px 3px 5px rgba(0,0,0,0.3);
  user-select: none;
  border: 2px dashed rgba(255,255,255,0.2);
  min-width: 150px;
  text-align: center;
}

/* रिफ्रेश बटन (घूमने वाला इफेक्ट) */
.refresh-btn {
  background: #ff9800;
  color: white;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: transform 0.4s ease;
  box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
}

.refresh-btn:hover {
  transform: rotate(180deg);
  background: #e68a00;
}

/* इनपुट फील्ड जहाँ यूजर टाइप करेगा */
.captcha-input-full {
  width: 80%;
  max-width: 300px;
  padding: 12px;
  border: 2px solid #0056b3;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all 0.3s;
}

.captcha-input-full:focus {
  border-color: #ff0066;
  box-shadow: 0 0 10px rgba(255, 0, 102, 0.2);
  outline: none;
}
  .submit-btn { background-color: #4caf50; color: white; border: none; padding: 12px 60px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }

  /* CORRECTION FORM */
  .form-container { max-width:900px; margin:20px auto; background:#fff; border-radius:12px; padding:25px; border:2px solid #0056b3; box-shadow:0 8px 25px rgba(0,0,0,0.1); }
  .edit-heading { text-align: center; font-weight: 700; font-size: 26px; color: #002366; position: relative; margin-bottom: 25px; padding-bottom: 12px; font-family: 'Poppins'; }
  .edit-heading::after { content: ''; width: 150px; height: 4px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px; }
  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-size: 16px; font-weight:600; }
  label { font-weight:600; margin-top:10px; display:block; font-size: 14px; color: #333; }
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; box-sizing: border-box; font-family: inherit; }
  .row { display:flex; gap:15px; flex-wrap:wrap; margin-bottom: 10px; }
  .row > div { flex:1; min-width: 200px; }

  .photo-upload-section { display: flex; flex-direction: column; align-items: flex-start; padding: 20px; background: #f9fbff; border: 1px dashed #0056b3; border-radius: 10px; margin-top: 15px; }
  .image-frame { width: 150px; height: 180px; border: 3px solid #002366; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .image-frame img { width: 100%; height: 100%; object-fit: cover; }

  .declaration-wrapper { background: #fff9e6; border-left: 5px solid #ffcc00; padding: 20px; margin: 25px 0; border-radius: 5px; border: 1px solid #ffeeba; }
  .declaration-title { color: #856404; font-weight: bold; margin-bottom: 10px; display: block; font-size: 16px; }
  .declaration-text { font-size: 14px; line-height: 1.6; color: #555; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; }
  .declaration-text input { width: 22px; height: 22px; margin-top: 2px; cursor: pointer; flex-shrink: 0; }
  .hidden { display: none; } 
</style>
</head>
<body>

<div id="searchSection" class="search-card">
  <div class="header-title"><span>🎓</span> Correction Of Application</div>
  <div class="input-group-row">
    <input type="text" id="appNo" placeholder="Application Number">
    <input type="text" id="mobNo" placeholder="Mobile Number">
  </div>
  <div class="captcha-wrapper">
    <div class="captcha-box" id="captchaCode">CKHFTJ</div>
    <button class="refresh-btn" onclick="refreshCaptcha('captchaCode')">Refresh</button>
  </div>
  <input type="text" id="captchaInp" class="captcha-input-full" placeholder="Enter Captcha">
  <br>
  <button class="submit-btn" onclick="handleSearch()">Submit</button>
</div>

<div id="correctionSection" class="form-container hidden">
  <div class="edit-heading">EDIT STUDENT DETAILS</div>
  <form id="correctionForm" onsubmit="updateRecord(event)">
    
    <h3>Student Details</h3>
    <label>Student Name</label>
    <input type="text" name="studentName" oninput="this.value = this.value.toUpperCase()" required>

    <div class="row">
      <div><label>Father Name</label><input type="text" name="fatherName" oninput="this.value = this.value.toUpperCase()" required></div>
      <div><label>Mother Name</label><input type="text" name="motherName" oninput="this.value = this.value.toUpperCase()" required></div>
    </div>

    <div class="row">
      <div><label>Date of Birth</label><input type="date" name="dob" required></div>
      <div>
        <label>Class</label>
        <select name="class" id="classSelect" required onchange="toggleSubjects()">
          <option value="">Select Class</option>
          <option value="1">1st to 12th...</option>
          <!-- (Aapne jo options likhe the wahi rahenge) -->
          <option value="10">10th</option>
          <option value="11">11th</option>
          <option value="12">12th</option>
        </select>
      </div>
      <div id="subjectSection" style="display:none;">
        <label>Select Subject</label>
        <select name="subject" id="subject">
          <option value="">Select Subject</option>
          <option value="Maths">Maths</option>
          <option value="Biology">Biology</option>
          <option value="Commerce">Commerce</option>
          <option value="Arts">Arts</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Gender</label>
        <select name="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      <div>
        <label>Medium</label>
        <select name="medium" required>
          <option value="">Select</option>
          <option value="Hindi">Hindi</option>
          <option value="English">English</option>
        </select>
      </div>
      <div>
        <label>Category</label>
        <select name="category" required>
          <option value="">Select</option>
          <option value="General">General</option>
          <option value="OBC">OBC</option>
          <option value="SC">SC</option>
          <option value="ST">ST</option>
        </select>
      </div>
    </div>

    <h3>Address Details</h3>
    <div class="row">
      <div>
        <label>State</label>
        <select name="state" required>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
        </select>
      </div>
      <div>
        <label>District</label>
        <select name="district" required>
          <option value="Rajgarh">Rajgarh</option>
          <!-- Baaki options -->
        </select>
      </div>
      <div>
        <label>Tehsil</label>
        <select name="tehsil" required>
           <option value="">Select Tehsil</option>
           <option>Biaora</option>
           <!-- Baaki options -->
        </select>
      </div>
    </div>

    <div class="row">
      <div><label>Village</label><input type="text" name="village" oninput="this.value = this.value.toUpperCase()" required></div>
      <div style="flex:2;"><label>Full Address</label><textarea name="address" oninput="this.value = this.value.toUpperCase()" required></textarea></div>
    </div>

    <h3>ID Details</h3>
    <div class="row">
      <div><label>Aadhaar Number</label><input type="text" name="adhar" maxlength="12" required></div>
      <div><label>Samgra ID</label><input type="text" name="samgra" maxlength="9" required></div>
    </div
  <h3> Bank Details</h3>
    <div class="row">
      <div><label>Bank Name</label><input type="text" name="bank" oninput="this.value = this.value.toUpperCase()" required></div>
      <div><label>Account Number</label><input type="text" name="accountnumber" required></div>
      <div><label>IFSC Code</label><input type="text" name="ifsc" oninput="this.value = this.value.toUpperCase()" required></div>
    </div>

    <h3>Contact Details</h3>
    <div class="row">
      <div><label>Mobile Number 1</label><input type="tel" name="mobile1" maxlength="10" required></div>
      <div><label>Mobile Number 2</label><input type="tel" name="mobile2" maxlength="10"></div>
    </div>

    <h3>Upload Photo</h3>
    <div class="photo-upload-section">
      <div class="image-frame">
        <img id="photoPreview" src="" style="display:none;">
        <span id="placeholderText">PHOTO<br>PREVIEW</span>
      </div>
      <input type="file" id="photoUpload" accept="image/*" onchange="previewImg(this)" style="width:auto">
    </div>

    <div class="declaration-wrapper">
      <span class="declaration-title">★ शपथ पत्र (Declaration)</span>
      <label class="declaration-text">
        <input type="checkbox" id="shapatCheck" required>
        <span> मैं यह घोषणा करता/करती हूँ कि मेरे द्वारा दी गई समस्त जानकारी मेरे ज्ञान के अनुसार पूर्णतः सत्य है। 
      यदि भविष्य में कोई भी जानकारी गलत पाई जाती है, तो मेरे बालक/बालिका का प्रवेश निरस्त किया जा सकता है।</span>
      </label>
    </div>

   <label style="font-weight: bold; color: #002366;">Security Verification</label>
<div class="captcha-container">
  <div class="captcha-box-wrapper">
    <!-- कैप्चा कोड -->
    <div class="captcha-box" id="captchaCode">XXXXXX</div>
    
    <!-- रिफ्रेश बटन -->
    <button type="button" class="refresh-btn" onclick="generateCaptcha()" title="Refresh Code">
      🔄
    </button>
  </div>
  
  <!-- टाइप करने वाला बॉक्स -->
  <input type="text" id="captchaInput" class="captcha-input-full" placeholder="Enter Code Here" required>
</div>

    <button type="submit" class="submit-btn" style="display:block; margin: 20px auto;">Update Admission 🚀</button>
  </form>
</div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec";

  function refreshCaptcha(id) {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
    document.getElementById(id).innerText = code;
  }

  function previewImg(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('photoPreview').src = e.target.result;
        document.getElementById('photoPreview').style.display = 'block';
        document.getElementById('placeholderText').style.display = 'none';
      }
      reader.readAsDataURL(input.files[0]);
    }
  }

  function toggleSubjects() {
    const cls = document.getElementById('classSelect').value;
    const subSec = document.getElementById('subjectSection');
    if(subSec) subSec.style.display = (cls == "11" || cls == "12") ? "block" : "none";
  }

  function handleSearch() {
    const capInp = document.getElementById('captchaInp').value.toUpperCase();
    const capCode = document.getElementById('captchaCode').innerText;
    const appNo = document.getElementById('appNo').value;

    if(capInp !== capCode) {
      Swal.fire({ icon: 'error', title: 'गलती!', text: 'कैप्चा गलत है।' });
      return;
    }
    Swal.fire({ title: 'खोज रहे हैं...', didOpen: () => { Swal.showLoading(); } });

    fetch(`${scriptURL}?appNo=${appNo}`)
      .then(res => res.json())
      .then(data => {
        Swal.close();
        if(data.status === "found") {
          document.getElementById('searchSection').classList.add('hidden');
          document.getElementById('correctionSection').classList.remove('hidden');
          refreshCaptcha('finalCaptcha');
          const form = document.getElementById('correctionForm');
          
          // Data filling logic
          form.studentName.value = data.name || "";
          form.fatherName.value = data.father || "";
          form.motherName.value = data.mother || "";
          form.dob.value = data.dob || "";
          form.class.value = data.class || "";
          toggleSubjects();
          form.gender.value = data.gender || "";
          form.medium.value = data.medium || "";
          form.category.value = data.category || "";
          form.village.value = data.village || "";
          form.address.value = data.address || "";
          form.adhar.value = data.adhar || "";
          form.samgra.value = data.samgra || "";
          form.accountnumber.value = data.accountnumber || "";
          form.ifsc.value = data.ifsc || "";
          form.mobile1.value = data.mobile1 || "";

          if(data.photo) {
            document.getElementById('photoPreview').src = data.photo;
            document.getElementById('photoPreview').style.display = 'block';
            document.getElementById('placeholderText').style.display = 'none';
          }
        } else {
          Swal.fire({ icon: 'error', text: 'रिकॉर्ड नहीं मिला।' });
        }
      });
  }

function updateRecord(event) {
    event.preventDefault();
    
    // 1. कैप्चा चेक
    const capInp = document.getElementById('finalCapInput').value.toUpperCase();
    const capCode = document.getElementById('finalCaptcha').innerText;
    if(capInp !== capCode) { 
      Swal.fire({ icon: 'error', text: 'कैप्चा गलत है।' }); 
      return; 
    }

    // 2. लोडिंग दिखाना
    Swal.fire({ 
      title: 'अपडेट हो रहा है...', 
      text: 'कृपया प्रतीक्षा करें',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); } 
    });

    // 3. डेटा तैयार करना
    const form = document.getElementById('correctionForm');
    const formData = new FormData(form);
    
    // URLSearchParams का उपयोग करके डेटा भेजना (ताकि Apps Script आसानी से पढ़ सके)
    const searchParams = new URLSearchParams();
    formData.forEach((value, key) => {
      searchParams.append(key, value);
    });
    searchParams.append("appNo", document.getElementById('appNo').value);

    // 4. सर्वर पर भेजना
    fetch(scriptURL, { 
      method: 'POST', 
      body: searchParams 
    })
    .then(res => res.text())
    .then(result => {
      Swal.close(); // लोडिंग बंद करें
      
      // 5. सफलता का मैसेज
      // हम मान रहे हैं कि सर्वर से 'Success' आ रहा है
      if(result.trim() === "Success") {
        Swal.fire({ 
          icon: 'success', 
          title: 'सफलतापूर्वक अपडेट हुआ!', 
          text: 'छात्र का रिकॉर्ड सफलतापूर्वक सुधारा गया है।',
          confirmButtonText: 'ठीक है',
          confirmButtonColor: '#28a745'
        }).then(() => {
          location.reload(); // पेज रिफ्रेश
        });
      } else {
        // अगर सर्वर ने 'Success' के अलावा कुछ और भेजा (जैसे Error)
        Swal.fire({ icon: 'info', text: 'सर्वर रिस्पॉन्स: ' + result });
      }
    })
    .catch(err => {
      Swal.close();
      Swal.fire({ icon: 'error', title: 'नेटवर्क समस्या', text: err.message });
    });
  }

  window.onload = () => refreshCaptcha('captchaCode');
</script>
</body>
</html>
