<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Receipt System</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
  .search-card { max-width: 750px; margin: 50px auto; background: #fff; border: 3px solid #0056b3; padding: 40px; box-shadow: 10px 10px 20px rgba(0,0,0,0.1); text-align: center; }
  .header-title { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 26px; font-weight: bold; color: #0056b3; margin-bottom: 30px; }
  .input-group-row { display: flex; gap: 15px; margin-bottom: 20px; }
  .input-group-row input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
  .captcha-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
  .captcha-box { border: 2px solid #000; border-radius: 8px; padding: 5px 25px; font-size: 24px; font-weight: bold; letter-spacing: 5px; background: #fff; color: #000; min-width: 120px; }
  .refresh-btn { background-color: #ff9800; color: white; border: none; border-radius: 5px; padding: 10px 15px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  .captcha-input-full { width: 60%; padding: 12px; border: 1px solid #0056b3; border-radius: 8px; text-align: center; margin-bottom: 25px; font-size: 16px; }
  .submit-btn { background-color: #4caf50; color: white; border: none; padding: 12px 60px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }

  /* CORRECTION FORM */
  .form-container { max-width:900px; margin:20px auto; background:#fff; border-radius:12px; padding:25px; border:2px solid #0056b3; box-shadow:0 8px 25px rgba(0,0,0,0.1); }
  .edit-heading { text-align: center; font-weight: 700; font-size: 26px; color: #002366; position: relative; margin-bottom: 25px; padding-bottom: 12px; font-family: 'Poppins'; }
  .edit-heading::after { content: ''; width: 150px; height: 4px; background: #ff0066; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 10px; }
  h3 { background:#002366; color:#fff; padding:10px; border-radius:8px; margin-top:20px; font-size: 16px; font-weight:600; }
  label { font-weight:600; margin-top:10px; display:block; font-size: 14px; color: #333; }
  input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; box-sizing: border-box; font-family: inherit; }
  .row { display:flex; gap:15px; flex-wrap:wrap; margin-bottom: 10px; }
  .row > div { flex:1; min-width: 200px; }

  .photo-upload-section { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f9fbff; border: 1px dashed #0056b3; border-radius: 10px; margin-top: 15px; }
  .image-frame { width: 150px; height: 180px; border: 3px solid #002366; background: #fff; display: flex; align-items: left; justify-content: center; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .image-frame img { width: 100%; height: 100%; object-fit: cover; }

  /* SHAPAT PATRA STAR BOX */
  .declaration-wrapper { background: #fff9e6; border-left: 5px solid #ffcc00; padding: 20px; margin: 25px 0; border-radius: 5px; border: 1px solid #ffeeba; }
  .declaration-title { color: #856404; font-weight: bold; margin-bottom: 10px; display: block; font-size: 16px; }
  .declaration-text { font-size: 14px; line-height: 1.6; color: #555; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; }
  .declaration-text input { width: 22px; height: 22px; margin-top: 2px; cursor: pointer; flex-shrink: 0; }

  .hidden { display: none; } 
</style>
</head>
<body>

<div id="searchSection" class="search-card">
  <div class="header-title"><span>🎓</span> Application Correction System</div>
  <div class="input-group-row">
    <input type="text" id="appNo" placeholder="Application Number">
    <input type="text" id="mobNo" placeholder="Mobile Number">
  </div>
  <div class="captcha-wrapper">
    <div class="captcha-box" id="captchaCode">CKHFTJ</div>
    <button class="refresh-btn" onclick="refreshCaptcha('captchaCode')">Refresh</button>
  </div>
  <input type="text" id="captchaInp" class="captcha-input-full" placeholder="Enter Captcha">
  <br>
  <button class="submit-btn" onclick="handleSearch()">Submit</button>
</div>

<div id="correctionSection" class="form-container hidden">
  <div class="edit-heading">EDIT STUDENT DETAILS</div>
  <form id="correctionForm" onsubmit="updateRecord(event)">
    
    <h3>Student Details</h3>
    <label>Student Name</label>
    <input type="text" name="studentName" oninput="this.value = this.value.toUpperCase()" required>

    <div class="row">
      <div><label>Father Name</label><input type="text" name="fatherName" oninput="this.value = this.value.toUpperCase()" required></div>
      <div><label>Mother Name</label><input type="text" name="motherName" oninput="this.value = this.value.toUpperCase()" required></div>
    </div>

    <div class="row">
      <div><label>Date of Birth</label><input type="date" name="dob" required></div>
      <div>
        <label>Class</label>
        <select name="class" id="classSelect" required onchange="toggleSubjects()">
          <option value="">Select Class</option>
          <option value="10">10th</option>
          <option value="11">11th</option>
          <option value="12">12th</option>
        </select>
      </div>
      <div id="subjectSection" style="display:none;">
        <label>Select Subject</label>
        <select name="subject" id="subject">
          <option value="">Select Subject</option>
          <option value="Maths">Maths</option>
          <option value="Biology">Biology</option>
          <option value="Commerce">Commerce</option>
          <option value="Arts">Arts</option>
        </select>
      </div>
    </div>

    <h3>Address Details</h3>
    <div class="row">
      <div><label>State</label><input type="text" name="state" value="Madhya Pradesh" readonly></div>
      <div><label>District</label><input type="text" name="district" value="Rajgarh" readonly></div>
    </div>
    <div class="row">
      <div><label>Village</label><input type="text" name="village" oninput="this.value = this.value.toUpperCase()" required></div>
      <div style="flex:2;"><label>Full Address</label><textarea name="address" oninput="this.value = this.value.toUpperCase()" required></textarea></div>
    </div>

    <h3>ID & Bank Details</h3>
    <div class="row">
      <div><label>Aadhaar Number</label><input type="text" name="adhar" maxlength="12" placeholder="[Aadhaar Redacted]" required></div>
      <div><label>Samgra ID</label><input type="text" name="samgra" maxlength="9" required></div>
    </div>
    <div class="row">
      <div><label>Account Number</label><input type="text" name="accountnumber" required></div>
      <div><label>IFSC Code</label><input type="text" name="ifsc" oninput="this.value = this.value.toUpperCase()" required></div>
    </div>

    <h3>Upload Photo</h3>
    <div class="photo-upload-section">
      <div class="image-frame">
        <img id="photoPreview" src="" style="display:none;">
        <span id="placeholderText">PHOTO<br>PREVIEW</span>
      </div>
      <input type="file" name="photo" id="photoUpload" accept="image/*" onchange="previewImg(this)">
    </div>

    <div class="declaration-wrapper">
      <span class="declaration-title">★ शपथ पत्र (Declaration)</span>
      <label class="declaration-text">
        <input type="checkbox" id="shapatCheck" required>
        <span>मैं यह शपथ पूर्वक घोषणा करता/करती हूँ कि आवेदन में दी गई उपरोक्त समस्त जानकारी मेरे ज्ञान और विश्वास के अनुसार सत्य है। यदि कोई जानकारी गलत पाई जाती है, तो मेरा आवेदन निरस्त किया जा सकता है।</span>
      </label>
    </div>

    <label>Final Verification Code</label>
    <div class="captcha-wrapper">
      <div class="captcha-box" id="finalCaptcha">XXXXXX</div>
      <button type="button" class="refresh-btn" onclick="refreshCaptcha('finalCaptcha')">Refresh</button>
    </div>
    <center><input type="text" id="finalCapInput" class="captcha-input-full" style="width:50%" placeholder="Enter Code" required></center>

    <button type="submit" class="submit-btn" style="display:block; margin: 20px auto;">Update Admission 🚀</button>
  </form>
</div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec";

  function refreshCaptcha(id) {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
    document.getElementById(id).innerText = code;
  }

  function toggleSubjects() {
    const cls = document.getElementById('classSelect').value;
    document.getElementById('subjectSection').style.display = (cls == "11" || cls == "12") ? "block" : "none";
  }

  function previewImg(input) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { 
        const img = document.getElementById('photoPreview');
        img.src = e.target.result; 
        img.style.display = 'block';
        document.getElementById('placeholderText').style.display = 'none';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

function handleSearch() {
  const capInp = document.getElementById('captchaInp').value.toUpperCase();
  const capCode = document.getElementById('captchaCode').innerText;
  const appNo = document.getElementById('appNo').value;
  const mobNo = document.getElementById('mobNo').value;

  // 1. Captcha Check
  if(capInp !== capCode) {
    Swal.fire({ icon: 'error', title: 'गलती!', text: 'कैप्चा गलत है।' });
    return;
  }

  // 2. Input Validation (Application No. ya Mobile No. hona zaroori hai)
  if(!appNo && !mobNo) {
    Swal.fire({ icon: 'warning', title: 'जानकारी अधूरी है', text: 'कृपया Application Number या Mobile Number दर्ज करें।' });
    return;
  }

  // 3. Loading Animation
  Swal.fire({
    title: 'डेटा खोजा जा रहा है...',
    text: 'कृपया प्रतीक्षा करें',
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });

  // 4. Backend se Data Fetch karna (Google Sheet ko request bhejna)
  // Yeh URL mein action=search parameter bhej raha hai
  const fetchUrl = `${scriptURL}?action=search&appNo=${encodeURIComponent(appNo)}&mobNo=${encodeURIComponent(mobNo)}`;

  fetch(fetchUrl)
    .then(response => response.json())
    .then(data => {
      Swal.close(); // Loading band karein

      if(data.success) {
        // 5. Agar data mil gaya, toh Search chhupayein aur Form dikhayein
        document.getElementById('searchSection').classList.add('hidden');
        document.getElementById('correctionSection').classList.remove('hidden');
        refreshCaptcha('finalCaptcha');

        // 6. Form inputs mein data fill (populate) karna
        document.querySelector('input[name="studentName"]').value = data.studentName || '';
        document.querySelector('input[name="fatherName"]').value = data.fatherName || '';
        document.querySelector('input[name="motherName"]').value = data.motherName || '';
        document.querySelector('input[name="dob"]').value = data.dob || '';
        
        // Class aur Subject set karna
        document.querySelector('select[name="class"]').value = data.class || '';
        toggleSubjects(); // Class ke hisab se subject list open karna
        document.querySelector('select[name="subject"]').value = data.subject || '';

        // Address & Bank Details
        document.querySelector('input[name="village"]').value = data.village || '';
        document.querySelector('textarea[name="address"]').value = data.address || '';
        document.querySelector('input[name="adhar"]').value = data.adhar || '';
        document.querySelector('input[name="samgra"]').value = data.samgra || '';
        document.querySelector('input[name="accountnumber"]').value = data.accountnumber || '';
        document.querySelector('input[name="ifsc"]').value = data.ifsc || '';

        // Photo Preview set karna
        if(data.photoUrl) {
          const img = document.getElementById('photoPreview');
          img.src = data.photoUrl;
          img.style.display = 'block';
          document.getElementById('placeholderText').style.display = 'none';
        }

      } else {
        // Agar record nahi mila
        Swal.fire({ icon: 'error', title: 'रिकॉर्ड नहीं मिला', text: 'दिए गए नंबर से कोई डेटा मौजूद नहीं है।' });
      }
    })
    .catch(error => {
      console.error(error);
      Swal.fire({ icon: 'error', title: 'सर्वर एरर', text: 'डेटा लाने में तकनीकी समस्या हुई।' });
    });
}
  // Page load hone par pehla captcha generate karna
  window.onload = () => {
    refreshCaptcha('captchaCode');
  };
</script>
