<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheet Correction Portal</title>
    <style>
        /* Background matching your image */
        body { 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f4f7f9;
        }

        /* The Main Card with Blue Border */
        .card { 
            background: #ffffff; 
            width: 100%;
            max-width: 450px; 
            padding: 40px; 
            border-radius: 8px; 
            /* Screenshot style blue border */
            border: 3px solid #0056b3; 
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* Logo and Heading Title */
        .card-header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .card-header img {
            width: 45px; /* Graduation cap icon size */
        }

        .card-header span {
            font-size: 22px;
            font-weight: 800;
            color: #1a4a8e; /* Blue shade from image */
            text-transform: uppercase;
        }

        /* Form Labels matching the screenshot */
        label { 
            font-size: 14px; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 8px; 
            color: #444; 
            text-transform: uppercase;
        }

        /* Input field with blue focus border */
        input[type="text"] { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            margin-bottom: 20px;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #0056b3;
            outline: none;
        }

        /* Class & Year Row */
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .row div { flex: 1; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f1f3f5;
            cursor: pointer;
        }

        /* Captcha Section matching the screenshot */
        .captcha-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .captcha-box { 
            background: #ffffff; 
            border: 1px solid #000;
            padding: 10px 25px; 
            font-style: italic;
            font-weight: bold; 
            letter-spacing: 8px; 
            font-size: 24px;
            color: #000;
            user-select: none;
        }

        .refresh-btn {
            background: #ff9800; /* Orange refresh button */
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Green Submit Button from Image */
        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            background-color: #5cb85c; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { 
            background-color: #4cae4c;
        }

        .footer-copy {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <span style="font-size: 25px;">🎓</span>
        <span>Marksheet Correction Status </span>
    </div>
    
    <div class="form-body">
        <div class="input-group">
            <label>Application Number</label>
            <input type="text" id="appNo" placeholder="Enter Application Number APP-2026-000">
        </div>
        
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" id="rollNo" placeholder="Enter Students Valid Roll No.">
        </div>
        
<label>Captcha Code</label>
        <div class="captcha-area">
            <div class="captcha-box" id="captchaVal">BFIPAW</div>
            <button type="button" class="refresh-btn" onclick="generateCaptcha()">
                🔄 Refresh
            </button>
        </div>

        <input type="text" id="userCaptcha" placeholder="Enter code">

        <button class="btn-submit" onclick="checkStatus()">Submit Request</button>
        
        <p id="result"></p>
    </div>

    <div class="footer-copy">
        © 2026 Marksheet Portal
    </div>
</div>
    
    <script>
    let generatedCaptcha = "";
    // अपनी Google Web App URL यहाँ पेस्ट करें
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4RgKYHBK6nJXlNrfdvlu4Gq4MWKbeV1YOkGi87RKkPzDQW9BeBMAKfBVO1IXVdLGThA/exec";

    function generateCaptcha() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code = "";
        for(let i=0; i<5; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        generatedCaptcha = code;
        document.getElementById("captchaVal").innerText = code;
    }

    window.onload = function() {
    generateCaptcha();
    const savedAppID = localStorage.getItem("lastAppID");
    if(savedAppID) {
        document.getElementById("appNo").value = savedAppID;
        // इसे भरने के बाद तुरंत हटा दें ताकि रिफ्रेश पर दोबारा न आए
        localStorage.removeItem("lastAppID"); 
    }
};
    
    async function checkStatus() {
        // Elements को variables में सेव करना
        const appField = document.getElementById('appNo');
        const rollField = document.getElementById('rollNo');
        const captchaField = document.getElementById('userCaptcha');
        const resultDiv = document.getElementById('result');

        const app = appField.value.trim();
        const roll = rollField.value.trim();
        const userCaptcha = captchaField.value.trim();

        // 1. खाली इनपुट चेक
        if(!app || !roll || !userCaptcha) {
            resultDiv.innerText = "⚠️ कृपया सभी जानकारी भरें!";
            resultDiv.style.color = "#e67e22";
            return;
        }

        // 2. रोल नंबर वैलिडेशन
        if (isNaN(roll)) {
            resultDiv.innerText = "⚠️ रोल नंबर सिर्फ अंकों (Numbers) में होना चाहिए!";
            resultDiv.style.color = "#e67e22";
            return;
        }

        // 3. कैप्चा चेक
        if(userCaptcha.toUpperCase() !== generatedCaptcha) {
            resultDiv.innerText = "❌ गलत कैप्चा कोड!";
            resultDiv.style.color = "#c0392b";
            generateCaptcha();
            captchaField.value = "";
            return;
        }

        resultDiv.innerText = "⏳ डेटा खोजा जा रहा है, कृपया प्रतीक्षा करें...";
        resultDiv.style.color = "#2980b9";

        try {
            const response = await fetch(`${WEB_APP_URL}?roll=${roll}&app=${app}`);
            const contentType = response.headers.get("content-type");
            
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("Server Error: Invalid Response Format");
            }

            const result = await response.json();

            if (result.status === "success") {
                resultDiv.innerText = "✅ रिकॉर्ड मिल गया!";
                resultDiv.style.color = "#27ae60";
                
                // रिपोर्ट विंडो खोलना
                openReport(result.data, result.data.appNo || app);

                // --- बदलाव यहाँ है ---
                localStorage.removeItem("lastAppID"); // पुरानी ID को मेमोरी से डिलीट करें
                appField.value = "";                  // अब यह बॉक्स पक्का खाली हो जाएगा
                rollField.value = "";
                captchaField.value = "";
                generateCaptcha();
                // ---------------------

            } else {
                resultDiv.innerText = "❌ " + (result.message || "डेटा नहीं मिला");
                resultDiv.style.color = "#c0392b";
                generateCaptcha();
                captchaField.value = "";
            }
            
        } catch (error) {
            resultDiv.innerText = "❌ सिस्टम एरर: " + error.message;
            resultDiv.style.color = "#c0392b";
            console.error("Fetch Error:", error);
            generateCaptcha();
        }
    }

    function openReport(s, appNo) {
        const reportWindow = window.open('', '_blank');
        
        let statusClass = "bg-yellow"; 
        const currentStatus = (s.appStatus || "Pending").trim();
        const statusLower = currentStatus.toLowerCase();

        if (statusLower === "approved") {
            statusClass = "bg-green";
        } else if (statusLower === "rejected") {
            statusClass = "bg-red";
        } else if (statusLower === "pending") {
            statusClass = "bg-yellow";
        }

        reportWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Verification Report - ${appNo}</title>
                <style>
                    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background: #fff; }
                    .header { background: #003366; color: white; padding: 15px; text-align: center; border-bottom: 4px solid #ff9933; }
                    table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: auto; }
                    th, td { border: 1px solid #444; padding: 6px; font-size: 11px; text-align: center; }
                    th { background: #f2f2f2; color: #333; text-transform: uppercase; font-size: 10px; }
                    .badge { padding: 3px 6px; border-radius: 3px; font-weight: bold; color: white; display: inline-block; }
                    .bg-red { background: #dc3545; }
                    .bg-green { background: #28a745; }
                    .bg-yellow { background: #ffc107; color: #000; }
                    .student-img { width: 50px; height: 50px; object-fit: cover; border: 1px solid #333; }
                    .print-btn { background: #003366; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 20px auto; display: block; }
                    @media print {
                        @page { size: A4 landscape; margin: 10mm; }
                        body { zoom: 90%; }
                        .print-btn { display: none; }
                        table { width: 100% !important; border: 1px solid #000; }
                        th, td { border: 1px solid #000 !important; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h2 style="margin:0;">MARKSHEET VERIFICATION OFFICIAL REPORT</h2>
                    <p style="margin:5px 0 0 0; font-size: 12px;">Generated on: ${new Date().toLocaleString('hi-IN')}</p>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>App No.</th><th>Roll No.</th><th>Mobile Number</th><th>Student Name</th><th>Father's Name</th><th>Mother's Name</th>
                            <th>DOB</th><th>Session</th><th>Class</th><th>Medium</th><th>Category</th><th>Photo</th>
                            <th>Status</th><th>Correction Info</th><th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>${appNo}</strong></td>
                            <td>${s.roll || '-'}</td><td>${s.mobile || '-'}</td><td>${s.name || '-'}</td><td>${s.father || '-'}</td><td>${s.mother || '-'}</td>
                            <td>${s.dob || '-'}</td><td>${s.session || '-'}</td><td>${s.class || '-'}</td><td>${s.medium || '-'}</td>
                            <td>${s.category || '-'}</td><td><img src="${s.photoUrl || ''}" class="student-img" onerror="this.src='https://via.placeholder.com/50?text=No+Photo'"></td>
                            <td><span class="badge ${statusClass}">${currentStatus}</span></td><td>${s.correction || '-'}</td><td style="color:red;">${s.rejectReason || '-'}</td>
                        </tr>
                    </tbody>
                </table>
                <button class="print-btn" onclick="window.print()">Print Full Report (Landscape)</button>
            </body>
            </html>
        `);
        reportWindow.document.close();
    }
</script>
</body>
</html>
