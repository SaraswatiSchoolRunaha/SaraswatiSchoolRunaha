<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheet Status Portal</title>
    <style>
        /* आपका सारा CSS यहाँ वैसा ही रहेगा */
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background-color: white; width: 350px; padding: 20px; border: 3px solid #007bff; border-radius: 15px; box-shadow: 0px 8px 20px rgba(0,0,0,0.15); }
        h3 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        label { font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .captcha-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .captcha-box { background: #e9ecef; padding: 10px; font-weight: bold; letter-spacing: 5px; border: 1px dashed #666; flex: 1; text-align: center; user-select: none; color: #d9534f; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>Check Status</h3>
    
    <label>Application Number</label>
    <input type="text" id="appNo" placeholder="Enter Application No.">
    
    <label>Roll Number</label>
    <input type="text" id="rollNo" placeholder="Enter Roll Number">
    
    <label>Captcha Code</label>
    <div class="captcha-container">
        <!-- डायनामिक कैप्चा यहाँ दिखेगा -->
        <div class="captcha-box" id="captchaVal">LOADING</div>
        <input type="text" id="userCaptcha" placeholder="Type Code" style="margin-bottom: 0; flex: 1;">
    </div>
    
    <button onclick="checkStatus()">Get Result</button>
    <p id="result"></p>
</div>

<script>
    let generatedCaptcha = "";
    // Apni Web App URL yahan dalein
    const WEB_APP_URL = "YOUR_DEPLOYED_WEB_APP_URL_HERE"; 

    function generateCaptcha() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code = "";
        for(let i=0; i<5; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        generatedCaptcha = code;
        document.getElementById("captchaVal").innerText = code;
    }

    window.onload = function() {
        generateCaptcha();
        const savedAppID = localStorage.getItem("lastAppID");
        if(savedAppID) {
            document.getElementById("appNo").value = savedAppID;
        }
    };

    async function checkStatus() {
        const app = document.getElementById('appNo').value.trim();
        const roll = document.getElementById('rollNo').value.trim();
        const userCaptcha = document.getElementById('userCaptcha').value.trim();
        const resultDiv = document.getElementById('result');

        if(!app || !roll || !userCaptcha) {
            resultDiv.innerText = "⚠️ Sabhi fields bharna zaroori hai!";
            resultDiv.style.color = "orange";
            return;
        }

        if(userCaptcha.toUpperCase() !== generatedCaptcha) {
            resultDiv.innerText = "❌ Galat Captcha!";
            resultDiv.style.color = "red";
            generateCaptcha();
            return;
        }

        resultDiv.innerText = "⏳ Verification chal rahi hai...";
        resultDiv.style.color = "blue";

        try {
            // Google Sheets se data lane ke liye API call
            // Note: Hum parameters bhej rahe hain search ke liye
            const response = await fetch(`${WEB_APP_URL}?roll=${roll}&app=${app}`);
            const result = await response.json();

            if (result.status === "success") {
                resultDiv.innerText = "✅ Record Mil Gaya!";
                resultDiv.style.color = "green";
                openReport(result.data, app);
            } else {
                resultDiv.innerText = "❌ " + (result.message || "Record nahi mila");
                resultDiv.style.color = "red";
            }
        } catch (error) {
            resultDiv.innerText = "❌ System Error: " + error.message;
            resultDiv.style.color = "red";
        }
    }

    function openReport(s, appNo) {
        const reportWindow = window.open('', '_blank');
        
        // Status color logic
        const statusClass = s.status === 'Rejected' ? 'bg-red' : 'bg-green';
        
        reportWindow.document.write(`
            <html>
            <head>
                <title>Report - ${appNo}</title>
                <style>
                    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
                    .header-line { height: 10px; background: #0056b3; border-radius: 5px 5px 0 0; }
                    .table-container { background: white; border-radius: 0 0 10px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow-x: auto; }
                    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
                    th { background: #f8f9fa; color: #333; padding: 12px; text-align: left; font-size: 12px; border-bottom: 2px solid #0056b3; white-space: nowrap; }
                    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; color: #444; }
                    .badge { padding: 5px 10px; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; text-transform: uppercase; }
                    .bg-red { background: #dc3545; }
                    .bg-green { background: #28a745; }
                    .student-img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; border: 1px solid #ddd; }
                    h2 { color: #003366; text-align: center; margin-bottom: 5px; }
                    .print-btn { background: #003366; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
                    @media print { .print-btn { display: none; } }
                </style>
            </head>
            <body>
                <h2>Application Verification Report</h2>
                <p style="text-align:center; color:#666;">Generated on: ${new Date().toLocaleString('hi-IN')}</p>
                <div class="header-line"></div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>App No.</th>
                                <th>Roll No.</th>
                                <th>Photo</th>
                                <th>Student Name</th>
                                <th>Father Name</th>
                                <th>Mother Name</th>
                                <th>Class</th>
                                <th>DOB</th>
                                <th>Medium</th>
                                <th>Status</th>
                                <th>Reason (If any)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><b>${appNo}</b></td>
                                <td>${s.roll || 'N/A'}</td>
                                <td><img src="${s.photoUrl || 'https://via.placeholder.com/50'}" class="student-img"></td>
                                <td>${s.name}</td>
                                <td>${s.father}</td>
                                <td>${s.mother}</td>
                                <td>${s.class || 'N/A'}</td>
                                <td>${s.dob}</td>
                                <td>${s.medium}</td>
                                <td><span class="badge ${statusClass}">${s.status || 'Pending'}</span></td>
                                <td style="color:red; font-size: 11px;">${s.rejectReason || '-'}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <center><button class="print-btn" onclick="window.print()">Download / Print Report</button></center>
            </body>
            </html>
        `);
    }
</script>
</body>
</html>
