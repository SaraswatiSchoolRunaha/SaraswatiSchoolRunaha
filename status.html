<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Marksheet Status Portal</title>
    <style>
        /* Modern Glassmorphism & Professional UI */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        }

        .card { 
            background: #ffffff; 
            width: 100%;
            max-width: 420px; 
            padding: 0; 
            border-radius: 16px; 
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.1); 
            overflow: hidden;
            border: none;
            position: relative;
        }

        /* 🎓 Official Top Bar */
        .card-header {
            background: #002e5d; /* Darker Navy Blue */
            color: #ffffff;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 5px solid #ff9933;
        }

        .card-header .topi-icon {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
        }

        .card-header span {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
        }

        .form-body {
            padding: 30px;
            background: #ffffff;
        }

        /* Input Styling */
        .input-group {
            margin-bottom: 20px;
        }

        label { 
            font-size: 12px; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 8px; 
            color: #4a5568; 
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #edf2f7; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px; 
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #2d3748;
        }

        input:focus {
            border-color: #002e5d;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 46, 93, 0.1);
        }

        /* 🔐 Security Captcha Styling */
        .captcha-container { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 25px; 
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .captcha-box { 
            background: #1a202c; 
            padding: 12px; 
            font-weight: bold; 
            letter-spacing: 5px; 
            border-radius: 8px;
            flex: 1.5; 
            text-align: center; 
            color: #38bdf8; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .refresh-btn {
            background: #4a5568;
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.4s ease;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            background: #2d3748;
            transform: rotate(180deg);
        }

        /* 🚀 Action Button */
        button[onclick="checkStatus()"] { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(39, 174, 96, 0.3);
        }

        button[onclick="checkStatus()"]:hover { 
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(39, 174, 96, 0.4);
            filter: brightness(1.1);
        }

        #result { 
            margin-top: 20px; 
            text-align: center; 
            font-size: 14px;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            padding: 20px;
            border-top: 1px solid #f1f5f9;
            background: #f8fafc;
        }

        /* Status Colors */
        .badge { padding: 4px 10px; border-radius: 20px; color: white; font-weight: bold; font-size: 11px; }
        .bg-red { background: #ef4444; }
        .bg-green { background: #10b981; }
        .bg-yellow { background: #f59e0b; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <span class="topi-icon">🎓</span>
        <span>Search Marksheet Status</span>
    </div>

    <div class="form-body">
        <div class="input-group">
            <label>Application Number</label>
            <input type="text" id="appNo" placeholder="Enter Students Valid Application Number APP-2026-000">
        </div>
        
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" id="rollNo" placeholder="Enter Students Valid Roll No.">
        </div>
        
        <label>Verification Code</label>
        <div class="captcha-container">
            <div class="captcha-box" id="captchaVal">LOADING</div>
            <button type="button" class="refresh-btn" onclick="generateCaptcha()">↻</button>
            <input type="text" id="userCaptcha" placeholder="Code" style="margin-bottom: 0; width: 100px; text-align: center;">
        </div>

        <button onclick="checkStatus()">🔍 View Status & Report</button>
        <p id="result"></p>
    </div>

    <div class="footer-text">
        © 2026 Examination Board | Official Verification Gateway <br>
        Designed for Secure Digital Access
    </div>
</div>
    <script>
    let generatedCaptcha = "";
    // अपनी Google Web App URL यहाँ पेस्ट करें
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4RgKYHBK6nJXlNrfdvlu4Gq4MWKbeV1YOkGi87RKkPzDQW9BeBMAKfBVO1IXVdLGThA/exec";

    function generateCaptcha() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code = "";
        for(let i=0; i<5; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        generatedCaptcha = code;
        document.getElementById("captchaVal").innerText = code;
    }

    window.onload = function() {
    generateCaptcha();
    const savedAppID = localStorage.getItem("lastAppID");
    if(savedAppID) {
        document.getElementById("appNo").value = savedAppID;
        // इसे भरने के बाद तुरंत हटा दें ताकि रिफ्रेश पर दोबारा न आए
        localStorage.removeItem("lastAppID"); 
    }
};
    
    async function checkStatus() {
        // Elements को variables में सेव करना
        const appField = document.getElementById('appNo');
        const rollField = document.getElementById('rollNo');
        const captchaField = document.getElementById('userCaptcha');
        const resultDiv = document.getElementById('result');

        const app = appField.value.trim();
        const roll = rollField.value.trim();
        const userCaptcha = captchaField.value.trim();

        // 1. खाली इनपुट चेक
        if(!app || !roll || !userCaptcha) {
            resultDiv.innerText = "⚠️ कृपया सभी जानकारी भरें!";
            resultDiv.style.color = "#e67e22";
            return;
        }

        // 2. रोल नंबर वैलिडेशन
        if (isNaN(roll)) {
            resultDiv.innerText = "⚠️ रोल नंबर सिर्फ अंकों (Numbers) में होना चाहिए!";
            resultDiv.style.color = "#e67e22";
            return;
        }

        // 3. कैप्चा चेक
        if(userCaptcha.toUpperCase() !== generatedCaptcha) {
            resultDiv.innerText = "❌ गलत कैप्चा कोड!";
            resultDiv.style.color = "#c0392b";
            generateCaptcha();
            captchaField.value = "";
            return;
        }

        resultDiv.innerText = "⏳ डेटा खोजा जा रहा है, कृपया प्रतीक्षा करें...";
        resultDiv.style.color = "#2980b9";

        try {
            const response = await fetch(`${WEB_APP_URL}?roll=${roll}&app=${app}`);
            const contentType = response.headers.get("content-type");
            
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("Server Error: Invalid Response Format");
            }

            const result = await response.json();

            if (result.status === "success") {
                resultDiv.innerText = "✅ रिकॉर्ड मिल गया!";
                resultDiv.style.color = "#27ae60";
                
                // रिपोर्ट विंडो खोलना
                openReport(result.data, result.data.appNo || app);

                // --- बदलाव यहाँ है ---
                localStorage.removeItem("lastAppID"); // पुरानी ID को मेमोरी से डिलीट करें
                appField.value = "";                  // अब यह बॉक्स पक्का खाली हो जाएगा
                rollField.value = "";
                captchaField.value = "";
                generateCaptcha();
                // ---------------------

            } else {
                resultDiv.innerText = "❌ " + (result.message || "डेटा नहीं मिला");
                resultDiv.style.color = "#c0392b";
                generateCaptcha();
                captchaField.value = "";
            }
            
        } catch (error) {
            resultDiv.innerText = "❌ सिस्टम एरर: " + error.message;
            resultDiv.style.color = "#c0392b";
            console.error("Fetch Error:", error);
            generateCaptcha();
        }
    }

    function openReport(s, appNo) {
        const reportWindow = window.open('', '_blank');
        
        let statusClass = "bg-yellow"; 
        const currentStatus = (s.appStatus || "Pending").trim();
        const statusLower = currentStatus.toLowerCase();

        if (statusLower === "approved") {
            statusClass = "bg-green";
        } else if (statusLower === "rejected") {
            statusClass = "bg-red";
        } else if (statusLower === "pending") {
            statusClass = "bg-yellow";
        }

        reportWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Verification Report - ${appNo}</title>
                <style>
                    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background: #fff; }
                    .header { background: #003366; color: white; padding: 15px; text-align: center; border-bottom: 4px solid #ff9933; }
                    table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: auto; }
                    th, td { border: 1px solid #444; padding: 6px; font-size: 11px; text-align: center; }
                    th { background: #f2f2f2; color: #333; text-transform: uppercase; font-size: 10px; }
                    .badge { padding: 3px 6px; border-radius: 3px; font-weight: bold; color: white; display: inline-block; }
                    .bg-red { background: #dc3545; }
                    .bg-green { background: #28a745; }
                    .bg-yellow { background: #ffc107; color: #000; }
                    .student-img { width: 50px; height: 50px; object-fit: cover; border: 1px solid #333; }
                    .print-btn { background: #003366; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 20px auto; display: block; }
                    @media print {
                        @page { size: A4 landscape; margin: 10mm; }
                        body { zoom: 90%; }
                        .print-btn { display: none; }
                        table { width: 100% !important; border: 1px solid #000; }
                        th, td { border: 1px solid #000 !important; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h2 style="margin:0;">MARKSHEET VERIFICATION OFFICIAL REPORT</h2>
                    <p style="margin:5px 0 0 0; font-size: 12px;">Generated on: ${new Date().toLocaleString('hi-IN')}</p>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>App No.</th><th>Roll No.</th><th>Mobile Number</th><th>Student Name</th><th>Father's Name</th><th>Mother's Name</th>
                            <th>DOB</th><th>Session</th><th>Class</th><th>Medium</th><th>Category</th><th>Photo</th>
                            <th>Status</th><th>Correction Info</th><th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>${appNo}</strong></td>
                            <td>${s.roll || '-'}</td><td>${s.mobile || '-'}</td><td>${s.name || '-'}</td><td>${s.father || '-'}</td><td>${s.mother || '-'}</td>
                            <td>${s.dob || '-'}</td><td>${s.session || '-'}</td><td>${s.class || '-'}</td><td>${s.medium || '-'}</td>
                            <td>${s.category || '-'}</td><td><img src="${s.photoUrl || ''}" class="student-img" onerror="this.src='https://via.placeholder.com/50?text=No+Photo'"></td>
                            <td><span class="badge ${statusClass}">${currentStatus}</span></td><td>${s.correction || '-'}</td><td style="color:red;">${s.rejectReason || '-'}</td>
                        </tr>
                    </tbody>
                </table>
                <button class="print-btn" onclick="window.print()">Print Full Report (Landscape)</button>
            </body>
            </html>
        `);
        reportWindow.document.close();
    }
</script>
</body>
</html>
