<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सरस्वती बाल विद्या मंदिर स्कूल शिक्षा पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <aside class="sidebar">
        <div class="sidebar-brand" id="brandLogo">
            <i class="fa-solid fa-graduation-cap"></i> सरस्वती बाल विद्या मंदिर स्कूल शिक्षा पोर्टल
        </div>
        <ul class="sidebar-menu" id="sideMenuContainer">
        </ul>
    </aside>

    <main class="main-content">
      <header class="top-navbar">
    <div class="navbar-row-top" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 8px;">
        <button id="menuToggleBtn" class="btn-action">
            <i class="fa-solid fa-bars"></i> मेन्यू
        </button>
        <div id="pageTitle" style="font-size: 1.1rem; font-weight: bold;">डैशबोर्ड</div>
    </div>

    <div class="navbar-row-middle" style="display: flex; justify-content: center; width: 100%; margin-bottom: 8px;">
        <div style="display: flex; align-items: center; background: #eff6ff; color: #1e40af; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; border: 1px solid #bfdbfe;">
            <i class="fa-solid fa-user-tie" style="margin-right: 5px;"></i>
            <span>प्रधानाचार्य: श्रीमान राकेश गुप्ता</span>
        </div>
    </div>

    <div class="navbar-row-bottom" style="display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%;">
        <div id="liveDateTime" class="datetime-container" style="font-size: 0.75rem; padding: 4px 10px;">
            <i class="fa-regular fa-clock"></i> <span id="clockDisplay">00:00:00 AM</span> | 
            <i class="fa-regular fa-calendar-days"></i> <span id="dateDisplay">00-00-2026</span>
        </div>
        <div class="user-profile" style="display: flex; gap: 4px; align-items: center;">
            <button class="lang-btn" id="btnLangEN">EN</button>
            <button class="lang-btn" id="btnLangHN">HN</button>
            <span id="userRoleBadge" class="role-badge"></span>
            <button id="btnLogout" class="btn-action" style="padding: 4px 8px; font-size: 0.8rem;">लॉगआउट</button>
        </div>
    </div>
</header>
        
        <div class="page-body">
            <div class="news-ticker">
                <span>📢 नवीनतम सूचना: स्कूल की वार्षिक परीक्षा 10 जून से शुरू होगी। | फीस जमा करने की अंतिम तिथि 30 मई है।</span>
            </div>
            <div id="contentArea" style="background:#fff; padding:20px; border:1px solid #ddd; min-height: 400px; border-radius: 8px;">
                डेटा लोड हो रहा है...
            </div>
        </div>
    </main>

    <script>
        function runLiveClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            const timeString = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
            const dateString = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()}`;
            
            const clockEl = document.getElementById('clockDisplay');
            const dateEl = document.getElementById('dateDisplay');
            if (clockEl) clockEl.textContent = timeString;
            if (dateEl) dateEl.textContent = dateString;
        }
        setInterval(runLiveClock, 1000);
        runLiveClock();
    </script>
    <script type="module" src="modules/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</body>
</html>
