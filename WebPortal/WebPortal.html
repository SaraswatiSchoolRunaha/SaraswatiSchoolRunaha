<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सरस्वती बाल विद्या मंदिर स्कूल शिक्षा पोर्टल</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    
    <aside class="sidebar">
        <div class="sidebar-brand" id="brandLogo">
            <i class="fa-solid fa-graduation-cap"></i> सरस्वती बाल विद्या मंदिर स्कूल शिक्षा पोर्टल
        </div>
        <ul class="sidebar-menu" id="sideMenuContainer">
            </ul>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <div id="pageTitle" style="font-size: 1.2rem; font-weight: bold;">डैशबोर्ड</div>
            <div class="user-profile">
                <div class="user-profile">
                    <!-- 🕒 लाइव डेट और टाइम बॉक्स यहाँ जुड़ गया है -->
                            <div id="liveDateTime" class="datetime-container">
                                <span class="time-box">
                                <i class="fa-regular fa-clock"></i> 
                                <span id="clockDisplay">00:00:00 AM</span>
                            </span>
                                <span class="divider">|</span>
                                <span class="date-box">
                                <i class="fa-regular fa-calendar-days"></i> 
                                <span id="dateDisplay">00-00-2026</span>
                            </span>
                        </div>

                <button class="lang-btn" id="btnLangEN">EN</button>
                <button class="lang-btn" id="btnLangHN">HN</button>
                <span id="userRoleBadge" class="role-badge"></span>
                <button id="btnLogout" class="btn-action">लॉगआउट</button>
            </div>
        </header>
        
        <div class="page-body">
            <div class="news-ticker">
                <span>📢 नवीनतम सूचना: स्कूल की वार्षिक परीक्षा 10 जून से शुरू होगी। | फीस जमा करने की अंतिम तिथि 30 मई है।</span>
            </div>
            <div id="contentArea" style="background:#fff; padding:20px; border:1px solid #ddd; min-height: 400px; border-radius: 8px;">
                डेटा लोड हो रहा है...
            </div>
        </div>
    </main>

    <script type="module" src="modules/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</body>
</html>
