<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Search Status Check - Saraswati School</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in { animation: fadeIn 0.35s ease-out forwards; }
</style>
</head>

<body class="bg-slate-100 p-4 md:p-8 flex flex-col items-center justify-center min-h-screen font-sans antialiased">

<div class="w-full max-w-5xl border-2 border-blue-600 bg-white p-6 md:p-10 shadow-lg animate-fade-in">

    <!-- TITLE -->
    <div class="text-center mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-700">
            🎓 Teacher Status Check
        </h1>
    </div>

    <!-- FORM -->
    <form id="statusForm" class="space-y-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <input type="text" id="appNoInput" required
                placeholder="Application Number"
                class="w-full px-4 py-2 border rounded-md">

            <input type="tel" id="mobileInput" required pattern="[0-9]{10}"
                placeholder="Mobile Number"
                class="w-full px-4 py-2 border rounded-md">

        </div>

        <!-- CAPTCHA -->
        <div class="flex items-center justify-center gap-3">
            <div id="captchaBox"
                class="font-mono text-xl font-bold border px-6 py-2 min-w-[140px] text-center">
                ------
            </div>

            <button type="button" onclick="generateCaptcha()"
                class="bg-orange-500 text-white px-4 py-2 rounded">
                Refresh
            </button>
        </div>

        <input type="text" id="captchaInput" required
            placeholder="Enter Captcha"
            class="w-full px-4 py-2 border rounded-md text-center">

        <!-- SUBMIT -->
        <div class="text-center">
            <button type="submit" id="submitBtn"
                class="bg-green-600 text-white px-10 py-2 rounded-md font-bold">
                Submit
            </button>
        </div>

    </form>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7oU8z9XmmEnyhLAWJFuzcIMzCOOg4VwmW-FWGaHb-Pe_XMi2vs81Rdn5poBSYuWwmXw/exec";

let currentCaptcha = "";

/* ================= CAPTCHA ================= */
function generateCaptcha() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let res = "";

    for (let i = 0; i < 6; i++) {
        res += chars[Math.floor(Math.random() * chars.length)];
    }

    currentCaptcha = res;
    document.getElementById("captchaBox").innerText = res;
}

/* ================= FORM SUBMIT ================= */
document.getElementById("statusForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const appNo = document.getElementById("appNoInput").value.trim().toUpperCase();
    const mobile = document.getElementById("mobileInput").value.trim();
    const captchaUser = document.getElementById("captchaInput").value.trim();
    const btn = document.getElementById("submitBtn");

    /* validation */
    if (captchaUser !== currentCaptcha) {
        alert("❌ गलत कैप्चा!");
        generateCaptcha();
        return;
    }

    if (!/^[0-9]{10}$/.test(mobile)) {
        alert("❌ Invalid mobile number");
        return;
    }

    /* UI lock */
    btn.disabled = true;
    btn.innerText = "Searching...";

    const callbackName = "handleSheetsResponse";

    window[callbackName] = function(response) {

        btn.disabled = false;
        btn.innerText = "Submit";

        if (response && response.found) {

            /* save data */
            Object.keys(response).forEach(key => {
                localStorage.setItem("saved_" + key, response[key]);
            });

            /* go to result page */
            window.location.href = "StatusCheck.html";

        } else {
            alert("❌ Record not found!");
        }

        /* cleanup */
        if (document.getElementById("jsonpScript")) {
            document.getElementById("jsonpScript").remove();
        }

        delete window[callbackName];
    };

    /* API CALL */
    const script = document.createElement("script");
    script.id = "jsonpScript";
    script.src = `${WEB_APP_URL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
    document.body.appendChild(script);
});

/* init */
window.onload = generateCaptcha;
</script>

</body>
</html>
