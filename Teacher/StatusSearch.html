<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Search Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex justify-center min-h-screen pt-20">
    <div class="w-full max-w-md bg-white p-8 shadow-xl border-2 border-blue-600">
        <h1 class="text-2xl font-bold text-blue-700 text-center mb-6">🎓 Teacher Search Status</h1>
        <form id="statusForm" class="space-y-4">
            <input type="text" id="appNoInput" required placeholder="Application Number" class="w-full px-4 py-2 border rounded">
            <input type="tel" id="mobileInput" required placeholder="Mobile Number" class="w-full px-4 py-2 border rounded">
            <div class="flex gap-2">
                <div id="captchaBox" class="font-mono text-xl font-bold border px-4 py-2 bg-gray-100 w-full text-center tracking-widest"></div>
                <button type="button" onclick="generateCaptcha()" class="bg-orange-500 text-white px-4 py-2 rounded">Refresh</button>
            </div>
            <input type="text" id="captchaInput" required placeholder="Enter Captcha" class="w-full px-4 py-2 border rounded">
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold">Submit</button>
        </form>
    </div>

<script>
let currentCaptcha = "";
function generateCaptcha() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    currentCaptcha = "";
    for (let i = 0; i < 6; i++) currentCaptcha += chars[Math.floor(Math.random() * chars.length)];
    document.getElementById("captchaBox").innerText = currentCaptcha;
}

document.getElementById("statusForm").addEventListener("submit", function(e) {
    e.preventDefault();
    if (document.getElementById("captchaInput").value.trim() !== currentCaptcha) {
        alert("❌ कैप्चा गलत है!");
        generateCaptcha();
        return;
    }
    const appNo = document.getElementById("appNoInput").value.trim().toUpperCase();
    const mobile = document.getElementById("mobileInput").value.trim();
    // सीधे URL से डेटा भेजें
    window.location.href = `StatusCheck.html?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobile)}`;
});

window.onload = generateCaptcha;
</script>
</body>
</html>
