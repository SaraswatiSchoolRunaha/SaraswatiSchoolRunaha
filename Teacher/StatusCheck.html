<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-2 md:p-8 pt-0 md:pt-2">
    <div class="w-full max-w-6xl border-4 border-blue-700 bg-white p-6 shadow-xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-xl font-bold text-blue-700">📋 Verification Result</h2>
            <a href="StatusSearch.html" class="bg-slate-600 text-white px-4 py-1 rounded text-sm">← Back</a>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-xs font-bold uppercase border-b text-center">
                        <th class="px-2 py-3">App No</th><th class="px-2 py-3">Session</th><th class="px-2 py-3">Mobile</th>
                        <th class="px-2 py-3">Name</th><th class="px-2 py-3">Father</th><th class="px-2 py-3">Sub 1</th>
                        <th class="px-2 py-3">Sub 2</th><th class="px-2 py-3">Skill</th><th class="px-2 py-3">Qual</th>
                        <th class="px-2 py-3">Grad</th><th class="px-2 py-3">PostGrad</th><th class="px-2 py-3">Prof</th>
                        <th class="px-2 py-3">Exp</th><th class="px-2 py-3">Salary</th><th class="px-2 py-3">Status</th>
                        <th class="px-2 py-3">Remarks</th>
                    </tr>
                </thead>
                <tbody id="tableDataBody"><tr id="statusRow"><td colspan="16" class="text-center py-10 font-bold">⏳ Searching...</td></tr></tbody>
            </table>
        </div>
    </div>

<script>
window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const appNo = params.get("appNo");
    const mobile = params.get("mobile");
    const tableBody = document.getElementById("tableDataBody");

    if (!appNo || !mobile) {
        tableBody.innerHTML = `<tr><td colspan="16" class="text-center py-10 text-red-600 font-bold">❌ Error: Invalid Access</td></tr>`;
        return;
    }

    // अपना Google Web App URL यहाँ डालें
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7oU8z9XmmEnyhLAWJFuzcIMzCOOg4VwmW-FWGaHb-Pe_XMi2vs81Rdn5poBSYuWwmXw/exec";
    const callbackName = "cb" + Math.floor(Math.random() * 10000);

    window[callbackName] = function (res) {
        if (res && res.found) {
            tableBody.innerHTML = `
            <tr class="text-xs border-b text-center">
                <td class="px-2 py-3">${res.appNo}</td><td class="px-2 py-3">${res.session}</td><td class="px-2 py-3">${res.mobile}</td>
                <td class="px-2 py-3 font-bold text-left">${res.studentName}</td><td class="px-2 py-3 text-left">${res.fatherName}</td>
                <td class="px-2 py-3">${res.mainSubject1}</td><td class="px-2 py-3">${res.mainSubject2}</td>
                <td class="px-2 py-3">${res.otherSkill}</td><td class="px-2 py-3">${res.highQual}</td>
                <td class="px-2 py-3">${res.graduation}</td><td class="px-2 py-3">${res.postGraduation}</td>
                <td class="px-2 py-3">${res.professionalDeg}</td><td class="px-2 py-3">${res.experience}</td>
                <td class="px-2 py-3">${res.expectedSalary}</td><td class="px-2 py-3 font-bold">${res.status}</td>
                <td class="px-2 py-3">${res.remarks}</td>
            </tr>`;
        } else {
            tableBody.innerHTML = `<tr><td colspan="16" class="text-center py-10 font-bold">❌ Record not found</td></tr>`;
        }
    };

    const script = document.createElement("script");
    script.src = `${WEB_APP_URL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
    document.body.appendChild(script);
};
</script>
</body>
</html>
