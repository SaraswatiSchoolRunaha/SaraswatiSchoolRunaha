<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Status Check Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 flex flex-col items-center min-h-screen font-sans">

<div class="w-full max-w-6xl border-4 border-blue-700 bg-white p-6 md:p-8 shadow-xl mt-10 animate-fade-in">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="text-xl font-bold text-blue-700">📋 Verification Result / सत्यापन परिणाम</h2>
        <a href="StatusSearch.html" class="bg-slate-600 text-white text-xs font-bold px-4 py-2 rounded hover:bg-slate-700">← Back</a>
    </div>

    <!-- TABLE -->
    <div class="overflow-x-auto border rounded-md shadow-sm">
        <table class="w-full text-left bg-white border-collapse">
            <thead>
                <tr class="bg-slate-50 text-xs font-bold uppercase border-b">
                    <th class="px-4 py-3">App No</th>
                    <th class="px-4 py-3">Session</th>
                    <th class="px-4 py-3">Mobile</th>
                    <th class="px-4 py-3">Name</th>
                    <th class="px-4 py-3">Father</th>
                    <th class="px-4 py-3 text-center">Sub 1</th>
                    <th class="px-4 py-3 text-center">Sub 2</th>
                    <th class="px-4 py-3 text-center">Skill</th>
                    <th class="px-4 py-3 text-center">Highest Qual</th>
                    <th class="px-4 py-3 text-center">Grad</th>
                    <th class="px-4 py-3 text-center">Post Grad</th>
                    <th class="px-4 py-3 text-center">Prof Deg</th>
                    <th class="px-4 py-3 text-center">Exp</th>
                    <th class="px-4 py-3 text-center">Salary</th>
                    <th class="px-4 py-3 text-center">Status</th>
                    <th class="px-4 py-3 text-center">Remarks</th>
                </tr>
            </thead>
            <tbody id="tableDataBody">
                <tr id="statusRow">
                    <td colspan="16" class="text-center py-10 text-blue-500 font-bold">⏳ Loading data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ERROR -->
    <div id="errorCard" class="hidden mt-4 p-4 bg-red-50 border border-red-200 text-red-700 text-center rounded">
        ❌ रिकॉर्ड नहीं मिला! कृपया सही जानकारी दर्ज करें।<br><br>
        <button onclick="location.href='StatusSearch.html'" class="bg-blue-600 text-white px-4 py-1 rounded mt-2">Try Again</button>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7oU8z9XmmEnyhLAWJFuzcIMzCOOg4VwmW-FWGaHb-Pe_XMi2vs81Rdn5poBSYuWwmXw/exec";

window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const appNo = params.get("appNo");
    const mobile = params.get("mobile");
    const tableBody = document.getElementById("tableDataBody");
    const statusRow = document.getElementById("statusRow");

    if (!appNo || !mobile) {
        statusRow.innerHTML = `<td colspan="16" class="text-center text-red-600 font-bold py-6">❌ Invalid Request</td>`;
        return;
    }

    const callbackName = "handleSheetsResponse";
    window[callbackName] = function (response) {
        if (document.getElementById("jsonpScript")) document.getElementById("jsonpScript").remove();
        delete window[callbackName];
        statusRow.remove();

        if (response && response.found) {
            const status = (response.status || "").toLowerCase();
            let statusBadge = status === "approved" 
                ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Approved</span>`
                : `<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold">Under Review</span>`;

            tableBody.innerHTML = `
            <tr class="hover:bg-slate-50 animate-fade-in text-sm">
                <td class="px-4 py-3 font-mono">${response.appNo || "-"}</td>
                <td class="px-4 py-3">${response.session || "-"}</td>
                <td class="px-4 py-3">${response.mobile || "-"}</td>
                <td class="px-4 py-3 font-bold">${response.studentName || "-"}</td>
                <td class="px-4 py-3">${response.fatherName || "-"}</td>
                <td class="px-4 py-3 text-center">${response.mainSubject1 || "-"}</td>
                <td class="px-4 py-3 text-center">${response.mainSubject2 || "-"}</td>
                <td class="px-4 py-3 text-center">${response.otherSkill || "-"}</td>
                <td class="px-4 py-3 text-center">${response.highQual || "-"}</td>
                <td class="px-4 py-3 text-center">${response.graduation || "-"}</td>
                <td class="px-4 py-3 text-center">${response.postGraduation || "-"}</td>
                <td class="px-4 py-3 text-center">${response.professionalDeg || "-"}</td>
                <td class="px-4 py-3 text-center">${response.experience || "-"}</td>
                <td class="px-4 py-3 text-center">${response.expectedSalary || "-"}</td>
                <td class="px-4 py-3 text-center">${statusBadge}</td>
                <td class="px-4 py-3">${response.remarks || "-"}</td>
            </tr>`;
        } else {
            tableBody.innerHTML = `<tr><td colspan="16" class="text-center py-6 text-gray-500">No data found</td></tr>`;
            document.getElementById("errorCard").classList.remove("hidden");
        }
    };

    const script = document.createElement("script");
    script.id = "jsonpScript";
    script.src = `${WEB_APP_URL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
    document.body.appendChild(script);
};
</script>
</body>
</html>
