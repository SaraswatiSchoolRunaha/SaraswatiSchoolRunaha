<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Search Teacher - Saraswati School</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.35s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 flex flex-col items-center justify-center min-h-screen font-sans antialiased">

    <div class="w-full max-w-5xl border-2 border-blue-600 bg-white rounded-none p-6 md:p-10 shadow-[0_4px_20px_rgba(0,0,0,0.08)] animate-fade-in min-h-[420px] flex flex-col justify-center">

        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-[#1e61c7] flex items-center justify-center gap-2">
                <span>🎓</span> Teacher Applaction Form Print Recipt 
            </h1>
        </div>

        <form id="statusForm" onsubmit="handleStatusCheck(event)" class="space-y-5 max-w-3xl mx-auto w-full mb-2">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <input type="text" id="appNoInput" required placeholder="Application Number" class="w-full px-4 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-slate-800 placeholder-slate-400 font-medium">
                </div>
                <div>
                    <input type="tel" id="mobileInput" required pattern="[0-9]{10}" placeholder="Mobile Number" class="w-full px-4 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-slate-800 placeholder-slate-400 font-medium">
                </div>
            </div>

            <div class="flex items-center justify-center gap-3">
                <div id="captchaBox" class="bg-white text-slate-900 font-mono text-xl tracking-widest font-bold px-6 py-1.5 rounded-md select-none border border-slate-900 shadow-sm min-w-[140px] text-center uppercase">XXXXXX</div>
                <button type="button" onclick="generateCaptcha()" class="bg-[#ff9800] hover:bg-orange-600 text-white text-xs font-semibold px-4 py-2 rounded-md transition-all shadow-sm">🔄 Refresh</button>
            </div>

            <div class="max-w-md mx-auto">
                <input type="text" id="captchaInput" required placeholder="Enter Captcha" class="w-full px-4 py-1.5 border border-blue-400 rounded-md text-sm text-center bg-white">
            </div>

            <div class="text-center pt-2">
                <button type="submit" id="submitBtn" class="bg-[#4caf50] hover:bg-green-600 text-white font-bold py-2 px-12 rounded-md shadow-md text-sm">Submit</button>
            </div>
        </form>

        <!-- Result Container -->
        <div id="resultContainer" class="hidden w-full mt-6 border-t border-slate-200 pt-6">
            <div class="overflow-x-auto w-full border border-slate-200 rounded-md shadow-sm hidden" id="tableWrapper">
                <table class="w-full text-left border-collapse bg-white">
                    <thead>
                        <tr class="bg-slate-50 text-slate-700 border-b border-slate-200 text-[11px] font-bold uppercase tracking-wider">
                            <th class="px-4 py-3.5">Student Name</th>
                            <th class="px-4 py-3.5">Father's Name</th>
                            <th class="px-4 py-3.5 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableDataBody" class="text-sm text-slate-700 divide-y divide-slate-100 font-medium"></tbody>
                </table>
            </div>
            <div id="errorCard" class="hidden p-4 rounded-md bg-red-50 border border-red-200 text-red-800 text-sm font-medium text-center">
                ❌ रिकॉर्ड नहीं मिला। कृपया सही जानकारी दर्ज करें।
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7oU8z9XmmEnyhLAWJFuzcIMzCOOg4VwmW-FWGaHb-Pe_XMi2vs81Rdn5poBSYuWwmXw/exec";
        let currentCaptcha = "";

        function generateCaptcha() {
            const chars = "ABCDEFGHJKLMNOPQRSTUVWXYZ23456789";
            let result = "";
            for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            currentCaptcha = result;
            document.getElementById("captchaBox").innerText = currentCaptcha;
        }

        function handleStatusCheck(e) {
            e.preventDefault();
            const appNo = document.getElementById("appNoInput").value.trim().toUpperCase();
            const mobile = document.getElementById("mobileInput").value.trim();
            const captchaUser = document.getElementById("captchaInput").value.trim();

            if (captchaUser !== currentCaptcha) {
                alert("❌ गलत कैप्चा!");
                generateCaptcha();
                return;
            }

            // सर्च शुरू होने से पहले टेबल साफ़ करें
            document.getElementById("tableDataBody").innerHTML = "";
            document.getElementById("submitBtn").innerText = "Searching...";
            const callbackName = "handleSheetsResponse";
            
           window[callbackName] = function(response) {
    document.getElementById("submitBtn").innerText = "Submit";
    
    if (response && response.found) {
        // 1. रिस्पॉन्स से सारा डेटा localStorage में डालें
        localStorage.setItem("savedAppNo", response.appNo);
        localStorage.setItem("savedFullName", response.studentName);
        localStorage.setItem("savedFatherName", response.fatherName);
        localStorage.setItem("savedStatus", response.status);
        localStorage.setItem("savedSession", response.session);
        localStorage.setItem("savedPostApplied", response.postApplied);
        localStorage.setItem("savedDob", response.dob);
        localStorage.setItem("savedGender", response.gender);
        localStorage.setItem("savedMobile", response.mobile);
        localStorage.setItem("savedWhatsapp", response.whatsapp);
        localStorage.setItem("savedEmail", response.email);
        localStorage.setItem("savedMedium", response.medium);
        localStorage.setItem("savedMainSubject1", response.mainSubject1);
        localStorage.setItem("savedMainSubject2", response.mainSubject2);
        localStorage.setItem("savedOtherSkill", response.otherSkill);
        localStorage.setItem("savedHighQual", response.highQual);
        localStorage.setItem("savedGraduation", response.graduation);
        localStorage.setItem("savedPostGraduation", response.postGraduation);
        localStorage.setItem("savedProfessionalDeg", response.professionalDeg);
        localStorage.setItem("savedTetDetails", response.tetDetails);
        localStorage.setItem("savedExperience", response.experience);
        localStorage.setItem("savedExpectedSalary", response.expectedSalary);
        localStorage.setItem("savedNoticePeriod", response.noticePeriod);

        // 2. रसीद पेज पर भेजें
        window.location.href = "ReceiptPrint.html";
    } else {
        // अगर रिकॉर्ड नहीं मिला, तो एरर दिखाएं
        document.getElementById("resultContainer").classList.remove("hidden");
        document.getElementById("tableWrapper").classList.add("hidden");
        document.getElementById("errorCard").classList.remove("hidden");
    }
    document.getElementById('jsonpScript').remove();
};

            const script = document.createElement('script');
            script.id = 'jsonpScript';
            script.src = `${WEB_APP_URL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
            document.body.appendChild(script);
        }
        window.onload = generateCaptcha;
    </script>
</body>
</html>
