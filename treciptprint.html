<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Saraswati Bal Vidhya Mandir - Receipt</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="bg-slate-100 p-2">

<div class="max-w-4xl mx-auto bg-white p-6 border-2 border-slate-800 shadow-xl">
    <div class="text-center border-b-2 border-slate-800 pb-4 mb-6">
        <h1 class="text-2xl font-black uppercase text-blue-900">सरस्वती बाल विद्या मंदिर, रूनाहा</h1>
        <p class="font-bold">शिक्षक भर्ती आवेदन रसीद (Teacher Application Receipt)</p>
    </div>

    <!-- पूरा डेटा यहाँ लोड होगा -->
    <div id="receiptContainer" class="grid grid-cols-2 md:grid-cols-3 gap-3 text-xs">
        <!-- JS के माध्यम से सभी एंट्रीज यहाँ भर दी जाएंगी -->
    </div>

    <div class="mt-8 no-print flex gap-4">
        <button onclick="window.print()" class="bg-blue-800 text-white px-6 py-2 rounded font-bold">प्रिंट रसीद</button>
        <button onclick="window.close()" class="bg-gray-500 text-white px-6 py-2 rounded font-bold">बंद करें</button>
    </div>
</div>

<script>
    const data = JSON.parse(localStorage.getItem("teacherReceipt"));
    
    // सभी fields का लेबल और वैल्यू मैपिंग
    const fields = [
        { label: "App No", value: data.appNo },
        { label: "Date", value: data.date },
        { label: "Full Name", value: data.fullName },
        { label: "Father Name", value: data.fatherName },
        { label: "DOB", value: data.dob },
        { label: "Gender", value: data.gender },
        { label: "Mobile", value: data.mobile },
        { label: "WhatsApp", value: data.whatsapp },
        { label: "Email", value: data.email },
        { label: "Post", value: data.post },
        { label: "Medium", value: data.medium },
        { label: "Subject", value: data.subject },
        { label: "High School", value: data.highSchool },
        { label: "Graduation", value: data.graduation },
        { label: "Post Graduation", value: data.postGraduation },
        { label: "Professional", value: data.professional },
        { label: "CTET/STET", value: data.ctet },
        { label: "Experience", value: data.experience },
        { label: "Expected Salary", value: data.salary },
        { label: "Notice Period", value: data.notice }
    ];

    const container = document.getElementById("receiptContainer");
    fields.forEach(field => {
        container.innerHTML += `
            <div class="border p-2">
                <p class="text-slate-500 font-bold uppercase text-[9px]">${field.label}</p>
                <p class="font-bold text-slate-900">${field.value || "-"}</p>
            </div>
        `;
    });
</script>
</body>
</html>
