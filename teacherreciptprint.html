<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Saraswati Bal Vidhya Mandir - Receipt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-8">

<div class="max-w-4xl mx-auto bg-white p-6 md:p-10 border-4 border-slate-900 shadow-2xl">
    <!-- Header -->
    <div class="text-center border-b-4 border-slate-900 pb-6 mb-8">
        <h1 class="text-3xl font-black uppercase text-blue-900">सरस्वती बाल विद्या मंदिर, रूनाहा</h1>
        <p class="font-bold text-lg text-slate-700 mt-2">शिक्षक भर्ती आवेदन रसीद (Teacher Application Receipt)</p>
    </div>

    <!-- Data Grid -->
    <div id="receiptContainer" class="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
        <!-- JS के माध्यम से डेटा यहाँ आएगा -->
    </div>

    <!-- Signature Section -->
    <div class="mt-12 flex justify-between items-end">
        <div class="text-xs text-slate-500 italic">
            <p>नोट: भविष्य के संदर्भ के लिए इसे सुरक्षित रखें।</p>
        </div>
        <div class="text-center">
            <div class="w-40 border-t border-slate-900 mt-10"></div>
            <p class="text-xs font-bold mt-1">प्राधिकृत हस्ताक्षर</p>
        </div>
    </div>

    <!-- Print Controls -->
    <div class="mt-10 no-print flex gap-4 justify-center">
        <button onclick="window.print()" class="bg-blue-800 text-white px-8 py-3 rounded font-bold hover:bg-blue-900 transition">प्रिंट रसीद</button>
        <button onclick="window.close()" class="bg-gray-500 text-white px-8 py-3 rounded font-bold hover:bg-gray-600 transition">बंद करें</button>
    </div>
</div>

<script>
    // डेटा को सुरक्षित रूप से लोड करें
    const rawData = localStorage.getItem("teacherReceipt");
    const data = rawData ? JSON.parse(rawData) : {};
    
    const fields = [
        { label: "App No", value: data.appNo || "N/A" },
        { label: "Date", value: data.date || new Date().toLocaleDateString() },
        { label: "Full Name", value: data.fullName },
        { label: "Father Name", value: data.fatherName },
        { label: "DOB", value: data.dob },
        { label: "Gender", value: data.gender },
        { label: "Mobile", value: data.mobile },
        { label: "WhatsApp", value: data.whatsapp },
        { label: "Email", value: data.email },
        { label: "Post", value: data.post },
        { label: "Medium", value: data.medium },
        { label: "Subject", value: data.subject },
        { label: "High School", value: data.highSchool },
        { label: "Graduation", value: data.graduation },
        { label: "Post Graduation", value: data.postGraduation },
        { label: "Professional", value: data.professional },
        { label: "CTET/STET", value: data.ctet },
        { label: "Experience", value: data.experience },
        { label: "Expected Salary", value: data.salary },
        { label: "Notice Period", value: data.notice }
    ];

    const container = document.getElementById("receiptContainer");
    fields.forEach(field => {
        container.innerHTML += `
            <div class="border border-slate-200 p-3 bg-slate-50">
                <p class="text-slate-500 font-bold uppercase text-[10px]">${field.label}</p>
                <p class="font-bold text-slate-900 text-sm">${field.value || "-"}</p>
            </div>
        `;
    });
</script>
</body>
</html>
