<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Receipt</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>

@media print{

    .print-hide{
        display:none !important;
    }

    body{
        background:white;
    }

    #receiptArea{
        box-shadow:none !important;
        border:none !important;
    }

}

</style>

</head>

<body class="bg-slate-100 p-6">

<div id="receiptArea"
class="max-w-5xl mx-auto bg-white border-4 border-blue-700 rounded-3xl shadow-2xl p-8">

    <!-- HEADER -->
    <div class="text-center border-b-4 border-blue-700 pb-5 mb-8">

        <h1 class="text-4xl font-extrabold text-blue-800 uppercase">
            🎓 Saraswati Bal Vidhya Mandir School
        </h1>

        <p class="text-slate-500 mt-2 font-semibold">
            Teacher Application Receipt
        </p>

    </div>

    <!-- TOP -->
    <div class="grid md:grid-cols-2 gap-4 mb-6">

        <div class="bg-slate-50 border rounded-2xl p-4">

            <p class="text-xs text-slate-500 font-bold uppercase">
                Registration ID
            </p>

            <p id="r_appNo"
            class="text-2xl font-black text-blue-700 font-mono">
            </p>

        </div>

        <div class="bg-slate-50 border rounded-2xl p-4">

            <p class="text-xs text-slate-500 font-bold uppercase">
                Academic Session
            </p>

            <p id="r_session"
            class="font-bold text-slate-800 text-lg">
            </p>

        </div>

    </div>

    <!-- PERSONAL -->
    <div class="border rounded-2xl p-5 mb-5">

        <h2 class="font-bold text-blue-700 mb-4 uppercase text-lg">
            Personal Information
        </h2>

        <div class="grid md:grid-cols-2 gap-3 text-sm">

            <p><b>Full Name :</b> <span id="r_fullName"></span></p>

            <p><b>Father Name :</b> <span id="r_fatherName"></span></p>

            <p><b>Date of Birth :</b> <span id="r_dob"></span></p>

            <p><b>Gender :</b> <span id="r_gender"></span></p>

        </div>

    </div>

    <!-- CONTACT -->
    <div class="border rounded-2xl p-5 mb-5">

        <h2 class="font-bold text-blue-700 mb-4 uppercase text-lg">
            Contact Details
        </h2>

        <div class="grid md:grid-cols-2 gap-3 text-sm">

            <p><b>Mobile :</b> <span id="r_mobile"></span></p>

            <p><b>WhatsApp :</b> <span id="r_whatsapp"></span></p>

            <p class="md:col-span-2">
                <b>Email :</b>
                <span id="r_email"></span>
            </p>

        </div>

    </div>

    <!-- PRINT -->
    <div class="mt-8 print-hide">

        <button onclick="window.print()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-xl text-lg">

            🖨️ Print Receipt

        </button>

    </div>

</div>

<script>

/*
=================================
YAHAN APNA DATA SET KARO
=================================
*/

const data = {

    appNo: "TECH-2026-1234",
    session: "2026-27",

    fullName: "Rahul Sharma",
    fatherName: "Ramesh Sharma",
    dob: "10/05/2000",
    gender: "Male",

    mobile: "9876543210",
    whatsapp: "9876543210",
    email: "rahul@gmail.com"

};

/* AUTO FILL */

document.getElementById("r_appNo").innerText =
data.appNo;

document.getElementById("r_session").innerText =
data.session;

document.getElementById("r_fullName").innerText =
data.fullName;

document.getElementById("r_fatherName").innerText =
data.fatherName;

document.getElementById("r_dob").innerText =
data.dob;

document.getElementById("r_gender").innerText =
data.gender;

document.getElementById("r_mobile").innerText =
data.mobile;

document.getElementById("r_whatsapp").innerText =
data.whatsapp;

document.getElementById("r_email").innerText =
data.email;

</script>

</body>
</html>
