<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #captchaBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin:10px 0;
      flex-wrap:wrap;
    }

    #captchaText{
      width:140px;
      height:45px;
      display:flex;
      justify-content:center;
      align-items:center;
      border:1px solid #000;
      background:#f5f5f5;
      font-weight:bold;
      letter-spacing:3px;
      border-radius:8px;
    }

    #captchaInput{
      width:140px;
      height:45px;
      font-size:18px;
      text-align:center;
      border:1px solid #1e88e5;
      border-radius:8px;
    }

    #submitBtn{
      display:block;
      margin:15px auto;
      padding:14px 40px;
      background:#43a047;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<div id="captchaBox">
  <span>Captcha:</span>
  <span id="captchaText"></span>
  <button type="button" onclick="generateCaptcha()">Refresh</button>
  <input type="text" id="captchaInput" placeholder="Enter Code">
</div>

<button id="submitBtn" onclick="verify()">Submit</button>

</div>

<script>

let captcha = "";

function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";

  for(let i=0;i<6;i++){
    captcha += chars[Math.floor(Math.random()*chars.length)];
  }

  document.getElementById("captchaText").innerText = captcha;
}

generateCaptcha();
window.addEventListener("load", generateCaptcha);

function verify(){

  let appNo = document.getElementById("appNo").value;
  let mobile = document.getElementById("mobile").value;
  let userCap = document.getElementById("captchaInput").value;

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  if(mobile.length != 10){
    alert("Enter valid mobile");
    return;
  }

  if(userCap.toUpperCase() != captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo=" + appNo + "&mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    let receiptWindow = window.open("", "_blank");

    receiptWindow.document.write(`
    <html>
    <head>
    <title>प्रवेश रसीद</title>

    <style>
    body{font-family: Arial; background:white; padding:20px;}
    .a4{width:210mm; min-height:297mm; margin:auto; border:2px solid #1565c0; padding:20px;}
    .header{text-align:center; border-bottom:2px solid #1565c0; padding-bottom:12px;}
    .header h2{margin:0; color:#1565c0;}
    .header p{margin:4px 0; font-size:14px;}
    .section{margin-top:12px; padding:12px; border:1px solid #ddd; border-radius:10px; background:#fafafa;}
    .title{font-weight:bold; color:#1565c0; margin-bottom:10px;}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
    .full{grid-column:1/-1;}
    .signature{display:flex; justify-content:space-between; margin-top:20px;}
    .sig-box{text-align:center; width:30%;}
    button{margin-top:10px; padding:10px 20px; background:#43a047; color:#fff; border:none;}
    @media print{button{display:none;}}
    </style>

    </head>

    <body>

    <div class="a4">

    <div class="header">
      <h2>सरस्वती बाल विद्या मंदिर हाई स्कूल</h2>
      <p>रुनाहा, बेरासिया (म.प्र.)</p>
      <p>Application No: ${data.appNo} | Session: ${data.session}</p>
    </div>

    <div class="section">
      <div class="title">📘 छात्र जानकारी</div>
      <div class="grid">
        <div><b>नाम:</b> ${data.name}</div>
        <div><b>पिता:</b> ${data.father}</div>
        <div><b>माता:</b> ${data.mother || ""}</div>
        <div><b>DOB:</b> ${data.dob || ""}</div>
        <div><b>कक्षा:</b> ${data.class}</div>
        <div><b>माध्यम:</b> ${data.medium}</div>
        <div><b>लिंग:</b> ${data.gender}</div>
        <div><b>जाति:</b> ${data.category || ""}</div>
      </div>
    </div>

    <div class="section">
      <div class="title">🏠 पता</div>
      <div class="grid">
        <div><b>राज्य:</b> ${data.state}</div>
        <div><b>जिला:</b> ${data.district}</div>
        <div><b>तहसील:</b> ${data.tehsil || ""}</div>
        <div><b>गाँव:</b> ${data.village || ""}</div>
        <div class="full"><b>पूरा पता:</b> ${data.address}</div>
      </div>
    </div>

    <div class="section signature">
      <div class="sig-box">छात्र</div>
      <div class="sig-box">पिता</div>
      <div class="sig-box">प्रधानाचार्य</div>
    </div>

    <div style="text-align:center;">
      <button onclick="window.print()">🖨 Print</button>
    </div>

    </div>

    </body>
    </html>
    `);

    receiptWindow.document.close();

  })
  .catch(()=>{
    alert("Server error");
  });

}

</script>

</body>
</html>
