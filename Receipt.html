<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

#captchaBox{
  display:flex;
  justify-content:center;  /* 👈 center कर देगा */
  align-items:center;
  gap:8px;
  margin:10px 0;
  flex-wrap:wrap;
}

#captchaText{
  width:140px;
  height:45px;
  display:flex;
  justify-content:center;
  align-items:center;
  border:1px solid #000;
  background:#f5f5f5;
  font-weight:bold;
  letter-spacing:3px;
  border-radius:8px;
}

#captchaInput{
  width:140px;
  height:45px;
  font-size:18px;
  text-align:center;
  border:1px solid #1e88e5;
  border-radius:8px;
}

#submitBtn{
  display:block;
  margin:15px auto;
  padding:14px 40px;   /* 👈 बड़ा button */
  background:#43a047;  /* 👈 green */
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
}
    
  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<div id="captchaBox">
  <span>Captcha:</span>
  <span id="captchaText"></span>
  <button type="button" onclick="generateCaptcha()">Refresh</button>
  <input type="text" id="captchaInput" placeholder="Enter Code">
</div>

<button id="submitBtn" onclick="verify()">Submit</button>

</div>

<script>

let captcha = "";
  
function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";

  for(let i=0;i<6;i++){
    captcha += chars[Math.floor(Math.random()*chars.length)];
  }

  document.getElementById("captchaText").innerText = captcha;
}

window.onload = generateCaptcha;

  
function verify(){

  let appNo = document.getElementById("appNo").value;
  let mobile = document.getElementById("mobile").value;
  let userCap = document.getElementById("captchaInput").value;

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  if(mobile.length != 10){
    alert("Enter valid mobile");
    return;
  }

  if(userCap.toUpperCase() != captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo=" + appNo + "&mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    if(data.status == "found"){
let photoUrl = data.photo || "https://via.placeholder.com/120x140?text=No+Photo";

    let receiptWindow = window.open("", "_blank");

receiptWindow.document.write(`
<html>
<head>
<title>Admission Form Print</title>

<style>
body{
  font-family: Arial;
  background:white;
  padding:20px;
}

.a4{
  width:210mm;
  min-height:297mm;
  margin:auto;
  border:2px solid #1565c0;
  padding:20px;
  box-sizing:border-box;
}

/* HEADER */
.header{
  text-align:center;
  border-bottom:2px solid #1565c0;
  padding-bottom:12px;
}

.header h2{
  margin:0;
  color:#1565c0;
}

.header p{
  margin:4px 0;
  font-size:14px;
}

/* SECTION */
.section{
  margin-top:12px;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  background:#fafafa;
}

/* TITLE */
.title{
  font-weight:bold;
  color:#1565c0;
  margin-bottom:10px;
  font-size:16px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:8px 20px;
  font-size:14px;
}

.row{
  display:flex;
  gap:5px;
}

.label{
  font-weight:bold;
  min-width:120px;
  color:#333;
}

.full{
  grid-column:1 / -1;
}

/* PHOTO */
.photo{
  text-align:center;
}

.photo img{
  width:120px;
  height:140px;
  border:2px solid #1565c0;
  border-radius:8px;
}

/* FLEX */
.flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SIGNATURE */
.signature{
  display:flex;
  justify-content:space-between;
  margin-top:25px;
}

.sig-box{
  text-align:center;
  width:30%;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 20px;
  background:#43a047;
  color:white;
  border:none;
  border-radius:6px;
}

@media print{
  button{display:none;}
}
</style>

</head>

<body>

<div class="a4">

  <!-- HEADER -->
  <div class="header">
    <h2>Saraswati Bal Vidhya Mandir High School </h2>
    <p> Runaha, Berasia Dist. Bhopal (M.P.)</P>
    <p>Admission Form / Print Copy</p>
    <p>
      <b>Application No:</b> ${data.appNo} |
      <b>Session:</b> ${data.session} |
      <b>Date:</b> ${new Date().toLocaleDateString()} |
      <b>Time:</b> ${new Date().toLocaleTimeString()}
    </p>
  </div>

  <!-- STUDENT INFO -->
  <div class="section">
    <div class="title">📘 छात्र की सामान्य जानकारी</div>

    <div class="grid">

      <div class="row"><span class="label"> छात्र का नाम:</span> ${data.name}</div>
      <div class="row"><span class="label">पिता का नाम:</span> ${data.father}</div>

      <div class="row"><span class="label">माता का नाम:</span> ${data.mother || ""}</div>
      <div class="row"><span class="label">जन्म तिथि:</span> ${data.dob || ""}</div>
      
      <div class="row"><span class="label">कक्षा:</span> ${data.class}</div>
      <div class="row"><span class="label">माध्यम:</span> ${data.medium}</div>
      
      <div class="row"><span class="label">विषय:</span> ${data.subject || ""}</div>
      
      <div class="row"><span class="label">लिंग Gender:</span> ${data.gender}</div>

      <div class="row full"><span class="label">जाति:</span> ${data.category || ""}</div>

    </div>
  </div>

  <!-- ADDRESS -->
  <div class="section">
    <div class="title">🏠 पता विवरण</div>

    <div class="grid">
    
      <div class="row"><span class="label"> राज्य का नाम:</span> ${data.state}</div>
      <div class="row"><span class="label">ज़िला का नाम:</span> ${data.district}</div>

      <div class="row"><span class="label">तहसील का नाम:</span> ${data.tehsil || ""}</div>
      <div class="row"><span class="label">गाँव का नाम :</span> ${data.village || ""}</div>
      <div class="row full"><span class="label">पूरा पता:</span> ${data.address}</div>
  </div>

  <!-- BANK -->
  <div class="section">
    <div class="title">🏦 बैंक / पहचान विवरण</div>

    <div class="grid">
      <div class="row"><span class="label">आधार:</span> ${data.adhar || ""}</div>
      <div class="row"><span class="label">समग्र:</span> ${data.samgra || ""}</div>

      <div class="row"><span class="label">बैंक:</span> ${data.bank || ""}</div>
      <div class="row"><span class="label">खाता:</span> ${data.accountnumber || ""}</div>

      <div class="row full"><span class="label">IFSC:</span> ${data.ifsc || ""}</div>
    </div>
  </div>

  <!-- CONTACT + PHOTO -->
  <div class="section flex">

    <div>
      <div class="title">📞 संपर्क विवरण</div>
      ${data.mobile1}
    </div>

    <div class="photo">
      <img src="${photoUrl}">
      <p>Student Photo</p>
    </div>

  </div>

  <!-- SHAPATH PATRA -->
  <div class="section">
    <div class="title">📜 शपथ पत्र (Declaration)</div>
    <p style="font-size:14px; line-height:1.6;">
      मैं यह घोषणा करता/करती हूँ कि मेरे द्वारा दी गई समस्त जानकारी मेरे ज्ञान के अनुसार पूर्णतः सत्य है। 
      यदि भविष्य में कोई भी जानकारी गलत पाई जाती है, तो मेरे बालक/बालिका का प्रवेश निरस्त किया जा सकता है।
    </p>
  </div>

  <!-- SIGNATURE -->
  <div class="section signature">

    <div class="sig-box">
      <p>__________________</p>
      <b>Student Signature</b>
    </div>

    <div class="sig-box">
      <p>__________________</p>
      <b>Father Signature</b>
    </div>

    <div class="sig-box">
      <p>__________________</p>
      <b>Principal Signature</b>
    </div>

  </div>

  <!-- PRINT BUTTON -->
  <div style="text-align:center;">
    <button onclick="window.print()">🖨 Print</button>
  </div>

</div>

</body>
</html>
`);

receiptWindow.document.close();
    } else {
      alert("Application not found");
    }

  })
  .catch(()=>{
    alert("Server error");
  });

}
</script>

</body>
</html>
