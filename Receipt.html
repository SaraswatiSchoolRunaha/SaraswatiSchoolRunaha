<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #captchaBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:10px 0;
      flex-wrap:wrap;
    }

    .captcha-display{
      display:flex;
      align-items:center;
      gap:10px;
    }

    #captchaText{
      width:140px;
      height:45px;
      display:flex;
      justify-content:center;
      align-items:center;
      border:1px solid #000;
      background:#f5f5f5;
      letter-spacing:3px;
      font-weight:bold;
      font-size:18px;
      border-radius:8px;
      color:#000; /* FIX: text visible */
    }

    #captchaInput{
      width:140px;
      height:45px;
      font-size:18px;
      text-align:center;
      border:1px solid #1e88e5;
      border-radius:8px;
      outline:none;
    }

    .refresh-btn{
      background:#1e88e5;
      color:white;
      border:none;
      padding:6px 10px;
      font-size:12px;
      cursor:pointer;
      border-radius:5px;
    }

    button{
      display:block;
      margin:15px auto;
      padding:10px 25px;
      background:#43a047;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    #receipt{
      display:none;
      margin-top:20px;
      background:#fff;
      padding:20px;
      border:2px solid #1e88e5;
      border-radius:10px;
    }

    img{
      border-radius:8px;
      border:2px solid #ccc;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<!-- CAPTCHA -->
<div id="captchaBox">
  <span>Captcha:</span>

  <div class="captcha-display">
    <span id="captchaText"></span>
    <button type="button" class="refresh-btn" onclick="generateCaptcha()">Refresh</button>
  </div>

  <input type="text" id="captchaInput" placeholder="Enter Code">
</div>

<button onclick="verify()">Submit</button>

<!-- RECEIPT -->
<div id="receipt">

  <h2>🏫 Saraswati School Runaha</h2>
  <h3 style="text-align:center;">Application Receipt</h3>

  <p style="text-align:right;"><b>Date:</b> <span id="date"></span></p>
  <hr>

  <div style="display:flex; justify-content:space-between;">

    <div style="width:70%;">
      <p><b>Application No:</b> <span id="app"></span></p>
      <p><b>Name:</b> <span id="name"></span></p>
      <p><b>Father:</b> <span id="father"></span></p>
      <p><b>Class:</b> <span id="class"></span></p>
      <p><b>Mobile:</b> <span id="mob"></span></p>
      <p><b>Address:</b> <span id="address"></span></p>
    </div>

    <div style="width:25%; text-align:center;">
      <img id="photo" width="120"><br>
      <p>Photo</p>
    </div>

  </div>

  <button onclick="window.print()">Print</button>

</div>

</div>

<script>

let captcha;

function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";

  for(let i = 0; i < 6; i++){
    captcha += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  document.getElementById("captchaText").innerText = captcha;
}

window.addEventListener("load", generateCaptcha);

function verify(){

  let appNo=document.getElementById("appNo").value;
  let mobile=document.getElementById("mobile").value;
  let userCap=document.getElementById("captchaInput").value;

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  if(mobile.length!=10){
    alert("Enter valid mobile");
    return;
  }

  if(userCap.toUpperCase()!=captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo=" + appNo + "&mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    if(data.status == "found"){

    let receiptWindow = window.open("", "_blank");

receiptWindow.document.write(`
<html>
<head>
<title>Admission Receipt</title>

<style>
body{
  font-family: Arial;
  background:#f2f6ff;
  padding:20px;
}

.card{
  max-width:700px;
  margin:auto;
  background:white;
  border:3px solid #1565c0;
  border-radius:15px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.header{
  text-align:center;
  border-bottom:2px solid #1565c0;
  padding-bottom:10px;
}

.header h2{
  margin:0;
  color:#1565c0;
}

.section{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.left{
  width:65%;
}

.right{
  width:30%;
  text-align:center;
}

.right img{
  width:120px;
  height:140px;
  border:2px solid #1565c0;
  border-radius:10px;
}

.row{
  margin:8px 0;
  font-size:16px;
}

.label{
  font-weight:bold;
  color:#333;
}

.footer{
  margin-top:20px;
  text-align:center;
}

button{
  padding:10px 20px;
  background:#43a047;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

@media print{
  button{display:none;}
  body{background:white;}
}
</style>

</head>

<body>

<div class="card">

  <div class="header">
    <h2>🏫 Saraswati School Runaha</h2>
    <p>Admission Receipt / Student Details</p>
  </div>

  <div class="section">

    <div class="left">

      <div class="row"><span class="label">Application No:</span> ${data.appNo}</div>
      <div class="row"><span class="label">Name:</span> ${data.name}</div>
      <div class="row"><span class="label">Father:</span> ${data.father}</div>
      <div class="row"><span class="label">Class:</span> ${data.class}</div>
      <div class="row"><span class="label">Mobile:</span> ${data.mobile}</div>
      <div class="row"><span class="label">Address:</span> ${data.address}</div>

    </div>

    <div class="right">
      <img src="${data.photo}">
      <p><b>Student Photo</b></p>
    </div>

  </div>

  <div class="footer">
    <button onclick="window.print()">🖨 Print Receipt</button>
  </div>

</div>

</body>
</html>
`);

</script>

</body>
</html>
