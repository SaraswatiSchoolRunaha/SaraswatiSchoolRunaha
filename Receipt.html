<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #captchaBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin:10px 0;
      flex-wrap:wrap;
    }

    #captchaText{
      width:140px;
      height:45px;
      display:flex;
      justify-content:center;
      align-items:center;
      border:1px solid #000;
      background:#f5f5f5;
      font-weight:bold;
      letter-spacing:3px;
      border-radius:8px;
    }

    #captchaInput{
      width:140px;
      height:45px;
      font-size:18px;
      text-align:center;
      border:1px solid #1e88e5;
      border-radius:8px;
    }

    #submitBtn{
      display:block;
      margin:15px auto;
      padding:14px 40px;
      background:#43a047;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<div id="captchaBox">
  <span>Captcha:</span>
  <span id="captchaText"></span>
  <button type="button" onclick="generateCaptcha()">Refresh</button>
  <input type="text" id="captchaInput" placeholder="Enter Code">
</div>

<button id="submitBtn" onclick="verify()">Submit</button>

</div>

<script>

let captcha = "";

function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";

  for(let i=0;i<6;i++){
    captcha += chars[Math.floor(Math.random()*chars.length)];
  }

  document.getElementById("captchaText").innerText = captcha;
}

generateCaptcha();

function verify(){

  let appNo = document.getElementById("appNo").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let userCap = document.getElementById("captchaInput").value.trim();

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  // strong mobile validation
  if(!/^[6-9]\d{9}$/.test(mobile)){
    alert("Enter valid 10 digit mobile");
    return;
  }

  if(userCap.toUpperCase() != captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo="
  + encodeURIComponent(appNo)
  + "&mobile=" + encodeURIComponent(mobile))

  .then(res => res.text())
  .then(text => {

    let data;
    try {
      data = JSON.parse(text);
    } catch(e){
      alert("Server response error");
      return;
    }

    if(!data){
      alert("Application not found");
      return;
    }

    let photoUrl = data.photo || "";

    let receiptWindow = window.open("", "_blank");

   receiptWindow.document.write(`
