<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

   #captchaBox{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin:10px 0;
  flex-wrap:nowrap;   /* ❌ wrap hata diya */
}

#captchaText{
  width:140px;
  height:45px;
  display:flex;
  justify-content:center;
  align-items:center;
  border:1px solid #000;
  background:#f5f5f5;
  font-weight:bold;
  letter-spacing:3px;
  border-radius:8px;
}

#captchaInput{
  width:140px;
  height:45px;
  font-size:18px;
  text-align:center;
  border:1px solid #1e88e5;
  border-radius:8px;
}

.refresh-btn{
  height:45px;
  padding:0 10px;
  border-radius:6px;
}
  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<div id="captchaBox">
  <span>Captcha:</span>
  <span id="captchaText"></span>
  <button type="button" onclick="generateCaptcha()">Refresh</button>
  <input type="text" id="captchaInput" placeholder="Enter Code">
</div>

<button onclick="verify()">Submit</button>

</div>

<script>

let captcha = "";

function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";

  for(let i=0;i<6;i++){
    captcha += chars[Math.floor(Math.random()*chars.length)];
  }

  document.getElementById("captchaText").innerText = captcha;
}

window.onload = generateCaptcha;

function verify(){

  let appNo = document.getElementById("appNo").value;
  let mobile = document.getElementById("mobile").value;
  let userCap = document.getElementById("captchaInput").value;

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  if(mobile.length != 10){
    alert("Enter valid mobile");
    return;
  }

  if(userCap.toUpperCase() != captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo=" + appNo + "&mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    if(data.status == "found"){

      let receiptWindow = window.open("", "_blank");

      receiptWindow.document.write(`
      <html>
      <head>
      <title>Admission Receipt</title>

      <style>
        body{
          font-family: Arial;
          background:#f2f6ff;
          padding:20px;
        }

        .card{
          max-width:700px;
          margin:auto;
          background:white;
          border:3px solid #1565c0;
          border-radius:15px;
          padding:20px;
        }

        .header{
          text-align:center;
          border-bottom:2px solid #1565c0;
          margin-bottom:15px;
        }

        .row{
          margin:8px 0;
        }

        .label{
          font-weight:bold;
        }

        .footer{
          text-align:center;
          margin-top:20px;
        }

        img{
          width:120px;
          border:2px solid #1565c0;
          border-radius:10px;
        }

        button{
          padding:10px 20px;
          background:#43a047;
          color:white;
          border:none;
          border-radius:6px;
        }

        @media print{
          button{display:none;}
        }
      </style>

      </head>

      <body>

      <div class="card">

        <div class="header">
          <h2>🏫 Saraswati School Runaha</h2>
          <p>Admission Receipt</p>
        </div>

        <div class="row"><span class="label">Application No:</span> ${data.appNo}</div>
        <div class="row"><span class="label">Name:</span> ${data.name}</div>
        <div class="row"><span class="label">Father:</span> ${data.father}</div>
        <div class="row"><span class="label">Class:</span> ${data.class}</div>
        <div class="row"><span class="label">Mobile:</span> ${data.mobile}</div>
        <div class="row"><span class="label">Address:</span> ${data.address}</div>

        <div style="text-align:center;margin-top:10px;">
          <img src="${data.photo}">
        </div>

        <div class="footer">
          <button onclick="window.print()">Print</button>
        </div>

      </div>

      </body>
      </html>
      `);

    } else {
      alert("Application not found");
    }

  })
  .catch(()=>{
    alert("Server error");
  });

}

</script>

</body>
</html>
