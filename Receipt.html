<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    /* CAPTCHA */
    #captchaBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:10px 0;
      flex-wrap:wrap;
    }

    .captcha-display{
      display:flex;
      align-items:center;
      gap:5px;
    }

    #captchaText{
      padding:6px 12px;
      border:1px solid #000;
      background:#f5f5f5;
      letter-spacing:3px;
      font-weight:bold;
    }

    .refresh-btn{
     background:#1e88e5;
      color:white;
    }
      padding:6px 10px;
      font-size:12px;
      cursor:pointer;
    }

    #captchaInput{
    width:280px;      /* length badh gayi */
    height:80px;      /* motai badh gayi */
    font-size:18px;
    padding:10px;
     text-align:center;
     border:3px solid #1e88e5;
     border-radius:10px;
     outline:none;
 }
    
    #captchaInput:focus{
     border-color:#43a047;
      box-shadow:0 0 10px rgba(67,160,71,0.4);
 

   button{
   display:block;
   margin:15px auto;
   padding:10px 25px;
   background:#43a047;
   color:#fff;
   border:none;
   border-radius:6px;
   cursor:pointer;
   }

    #receipt{
      display:none;
      margin-top:20px;
      background:#fff;
      padding:20px;
      border:2px solid #1e88e5;
      border-radius:10px;
    }

    img{
      border-radius:8px;
      border:2px solid #ccc;
    }

    .page-break{
      page-break-before: always;
    }

    @media print {
      body *{ visibility:hidden; }
      #receipt, #receipt *{ visibility:visible; }
      #receipt{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        border:none;
      }
      button{ display:none; }
    }

  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<!-- CAPTCHA -->
<div id="captchaBox">
  <span>Captcha:</span>

  <div class="captcha-display">
    <span id="captchaText"></span>
    <button type="button" class="refresh-btn" onclick="generateCaptcha()">Refresh</button>
  </div>

  <input type="text" id="captchaInput" placeholder="Enter">
</div>

<button onclick="verify()">Submit</button>

<!-- RECEIPT -->
<div id="receipt">

  <h2>🏫 Saraswati School Runaha</h2>
  <h3 style="text-align:center;">Application Receipt</h3>

  <p style="text-align:right;"><b>Date:</b> <span id="date"></span></p>
  <hr>

  <div style="display:flex; justify-content:space-between;">

    <div style="width:70%;">
      <p><b>Application No:</b> <span id="app"></span></p>
      <p><b>Name:</b> <span id="name"></span></p>
      <p><b>Father:</b> <span id="father"></span></p>
      <p><b>Class:</b> <span id="class"></span></p>
      <p><b>Mobile:</b> <span id="mob"></span></p>
      <p><b>Address:</b> <span id="address"></span></p>
    </div>

    <div style="width:25%; text-align:center;">
      <img id="photo" width="120"><br>
      <p>Photo</p>
    </div>

  </div>

  <button onclick="window.print()">Print</button>

</div>

</div>

<script>

let captcha;

function generateCaptcha(){
  let chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha="";
  for(let i=0;i<6;i++){
    captcha+=chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("captchaText").innerText=captcha;
}
generateCaptcha();

function verify(){

  let appNo=document.getElementById("appNo").value;
  let mobile=document.getElementById("mobile").value;
  let userCap=document.getElementById("captchaInput").value;

  // Validation
  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  if(mobile.length!=10){
    alert("Enter valid mobile");
    return;
  }

  if(userCap.toUpperCase()!=captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  document.getElementById("receipt").style.display="block";
  document.getElementById("date").innerText=new Date().toLocaleDateString();

  document.getElementById("receipt").innerHTML += "<p>Loading...</p>";

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo=" + appNo + "&mobile=" + mobile)
  .then(res=>res.json())
  .then(data=>{

    if(data.status=="found"){

      document.getElementById("photo").src=data.photo;
      document.getElementById("name").innerText=data.name;
      document.getElementById("app").innerText=data.appNo;
      document.getElementById("mob").innerText=data.mobile;
      document.getElementById("class").innerText=data.class;
      document.getElementById("address").innerText=data.address;
      document.getElementById("father").innerText=data.father;

    }else{
      alert("Application not found");
    }

  })
  .catch(()=>{
    alert("Server error");
  });

}

</script>

</body>
</html>
