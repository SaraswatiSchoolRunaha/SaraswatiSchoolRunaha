<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>

  <style>
    body{
      font-family: Arial;
      background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
      padding:20px;
    }

    .box{
      max-width:750px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #captchaBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin:10px 0;
      flex-wrap:wrap;
    }

    #captchaText{
      width:140px;
      height:45px;
      display:flex;
      justify-content:center;
      align-items:center;
      border:1px solid #000;
      background:#f5f5f5;
      font-weight:bold;
      letter-spacing:3px;
      border-radius:8px;
    }

    #captchaInput{
      width:140px;
      height:45px;
      font-size:18px;
      text-align:center;
      border:1px solid #1e88e5;
      border-radius:8px;
    }

    #submitBtn{
      display:block;
      margin:15px auto;
      padding:14px 40px;
      background:#43a047;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Application Receipt Print</h2>

<div class="row">
  <input type="text" id="appNo" placeholder="Application No">
  <input type="text" id="mobile" placeholder="Mobile No">
</div>

<div id="captchaBox">
  <span>Captcha:</span>
  <span id="captchaText"></span>
  <button type="button" onclick="generateCaptcha()">Refresh</button>
  <input type="text" id="captchaInput" placeholder="Enter Code">
</div>

<button id="submitBtn" onclick="verify()">Submit</button>

</div>

<script>

let captcha = "";

function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";

  for(let i=0;i<6;i++){
    captcha += chars[Math.floor(Math.random()*chars.length)];
  }

  document.getElementById("captchaText").innerText = captcha;
}

generateCaptcha();

function verify(){

  let appNo = document.getElementById("appNo").value;
  let mobile = document.getElementById("mobile").value;
  let userCap = document.getElementById("captchaInput").value;

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  if(mobile.length != 10){
    alert("Enter valid mobile");
    return;
  }

  if(userCap.toUpperCase() != captcha.toUpperCase()){
    alert("Wrong Captcha");
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycby3CDn1RnFNmns-aIU4HT14w5QmBnKSfU6Ymp26kBwnc7K0ysoKvsDYU1bw1Mx3VDkn/exec?appNo=" + appNo + "&mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    if(data){

      let receiptWindow = window.open("", "_blank");

      receiptWindow.document.write(`
      <html>
      <head>
      <title>Admission Form Print</title>

      <style>
      body{
        font-family: Arial;
        background:white;
        padding:20px;
      }

      .a4{
        width:210mm;
        min-height:297mm;
        margin:auto;
        border:2px solid #1565c0;
        padding:20px;
        box-sizing:border-box;
      }

      .header{
        text-align:center;
        border-bottom:2px solid #1565c0;
        padding-bottom:12px;
      }

      .header h2{margin:0;color:#1565c0;}
      .header p{margin:4px 0;font-size:14px;}

      .section{
        margin-top:12px;
        padding:12px;
        border:1px solid #ddd;
        border-radius:10px;
        background:#fafafa;
      }

      .title{
        font-weight:bold;
        color:#1565c0;
        margin-bottom:10px;
      }

      .grid{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:8px 20px;
        font-size:14px;
      }

      .row{display:flex;gap:5px;}
      .label{font-weight:bold;min-width:120px;}

      .full{grid-column:1 / -1;}

      .signature{
        display:flex;
        justify-content:space-between;
        margin-top:25px;
      }

      .sig-box{text-align:center;width:30%;}

      button{
        margin-top:10px;
        padding:10px 20px;
        background:#43a047;
        color:white;
        border:none;
        border-radius:6px;
      }

      @media print{
        button{display:none;}
      }
      </style>

      </head>

      <body>

      <div class="a4">

      <div class="header">
        <h2>Saraswati Bal Vidhya Mandir High School</h2>
        <p>Runaha, Berasia Dist. Bhopal (M.P.)</p>
        <p>Admission Form / Print Copy</p>
        <p>
          <b>Application No:</b> ${data.appNo} |
          <b>Session:</b> ${data.session} |
          <b>Date:</b> ${new Date().toLocaleDateString()} |
          <b>Time:</b> ${new Date().toLocaleTimeString()}
        </p>
      </div>

      <div class="section">
        <div class="title">📘 छात्र की सामान्य जानकारी</div>

        <div class="grid">
          <div class="row"><span class="label">नाम:</span> ${data.name}</div>
          <div class="row"><span class="label">पिता:</span> ${data.father}</div>
          <div class="row"><span class="label">माता:</span> ${data.mother || ""}</div>
          <div class="row"><span class="label">DOB:</span> ${data.dob || ""}</div>
          <div class="row"><span class="label">कक्षा:</span> ${data.class}</div>
          <div class="row"><span class="label">माध्यम:</span> ${data.medium}</div>
          <div class="row full"><span class="label">पता:</span> ${data.address}</div>
        </div>
      </div>

      <div class="section signature">

        <div class="sig-box">
          <p>__________________</p>
          <b>Student Signature</b>
        </div>

        <div class="sig-box">
          <p>__________________</p>
          <b>Father Signature</b>
        </div>

        <div class="sig-box">
          <p>__________________</p>
          <b>Principal Signature</b>
        </div>

      </div>

      <div style="text-align:center;">
        <button onclick="window.print()">🖨 Print</button>
      </div>

      </div>

      </body>
      </html>
      `);

      receiptWindow.document.close();

    } else {
      alert("Application not found");
    }

  })
  .catch(()=>{
    alert("Server error");
  });

}

</script>

</body>
</html>
