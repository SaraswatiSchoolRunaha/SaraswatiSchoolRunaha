<!DOCTYPE html>
<html>
<head>
  <title>Application Form</title>
</head>

<body>

<h2>Application Receipt</h2>

<input id="appNo" placeholder="Application No"><br><br>
<input id="mobile" placeholder="Mobile No"><br><br>

<button onclick="openReceipt()">Get Receipt</button>

<script>

function openReceipt(){

  let appNo = document.getElementById("appNo").value;
  let mobile = document.getElementById("mobile").value;

  if(!appNo || !mobile){
    alert("Fill all fields");
    return;
  }

  // 👉 direct new page open with parameters
  window.open("receipt.html?appNo=" + appNo + "&mobile=" + mobile, "_blank");
}

</script>

</body>
</html>
