<!DOCTYPE html>
<html>
<head>
  <title>Application Receipt</title>
  <style>
    /* 🔥 PAGE BACKGROUND */
    body{
      font-family: Arial;
      background:#e3f2fd;
      margin:0;
      padding:30px;
    }

    /* 🔥 OUTER PAGE BORDER */
    .page{
      max-width:800px;
      margin:auto;
      border:4px solid #1565c0;
      background:white;
      padding:20px;
      border-radius:0px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .box{
      padding:20px;
    }

    h2{
      text-align:center;
      color:#1565c0;
    }

    .row{
      display:flex;
      gap:10px;
      margin:10px 0;
    }

    .row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .captcha-box{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:15px 0;
    }

    #captchaText{
      padding:8px 15px;
      background:#f5f5f5;
      border:1px solid #000;
      font-weight:bold;
      letter-spacing:3px;
      border-radius:6px;
      min-width: 100px;
      display: inline-block;
      text-align: center;
    }

    .refresh-btn{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      background:#ff9800;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .refresh-btn:hover{
      background:#e68900;
      transform:scale(1.05);
    }

    #captchaInput{
      display:block;
      margin:15px auto;
      padding:10px;
      width:40%;
      text-align:center;
      border-radius:8px;
      border:1px solid #1e88e5;
    }

    .submit{
      display:block;
      margin:15px auto;
      padding:12px 25px;
      background:#43a047;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .submit:hover{
      background:#2e7d32;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="box">
    <h2>🎓 Application Receipt Print</h2>

    <div class="row">
      <input type="text" id="appNo" placeholder="Application Number">
      <input type="text" id="mobile" placeholder="Mobile Number">
    </div>

    <div class="captcha-box">
      <span id="captchaText"></span>
      <button type="button" class="refresh-btn" onclick="generateCaptcha()">
        🔄 Refresh
      </button>
    </div>

    <input type="text" id="captchaInput" placeholder="Enter Captcha">
    <button class="submit" onclick="openReceipt()">Submit</button>
  </div>
</div>

<script>
let captcha = "";

// 1. पेज लोड होते ही डेटा भरना और कैप्चा बनाना
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const appNoFromURL = urlParams.get('appNo');
    const mobileFromURL = urlParams.get('mobile1');

    if (appNoFromURL) { 
        document.getElementById("appNo").value = appNoFromURL; 
    }
    if (mobileFromURL) { 
        document.getElementById("mobile").value = mobileFromURL; 
    }
    
    generateCaptcha(); // कैप्चा लोड करें
};

// 2. कैप्चा जनरेट करने का फंक्शन
function generateCaptcha(){
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    captcha = "";
    for(let i=0; i<6; i++){
        captcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captchaText").innerText = captcha;
}

// 3. सबमिट बटन का फंक्शन (Verification logic ke sath)
async function openReceipt(){
    let appNo = document.getElementById("appNo").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let cap = document.getElementById("captchaInput").value.trim();
    let btn = document.querySelector(".submit");

    // Khali fields check karna
    if(!appNo || !mobile){
        alert("Application No और Mobile भरें");
        return;
    }

    // Captcha check karna
    if(cap.toUpperCase() !== captcha){
        alert("Captcha गलत है");
        generateCaptcha();
        return;
    }

    // 🔥 APNA APPS SCRIPT URL YAHAN DALEIN
    const scriptURL = "https://script.google.com/macros/s/XXXXX/exec"; 

    // Button ko disable karein taaki user baar-baar click na kare
    btn.innerText = "Checking...";
    btn.disabled = true;

    try {
        // Apps Script se poochna ki kya data sahi hai
        const response = await fetch(`${scriptURL}?appNo=${appNo}&mobile1=${mobile}`);
        const result = await response.json();

        if (result.status === "found") {
            // ✅ AGAR SAHI HAI: Tabhi ye window open hogi
            window.open("./Reciptprint.html?appNo=" + appNo + "&mobile1=" + mobile, "_blank");
        } else {
            // ❌ AGAR GALAT HAI: Toh alert aayega aur window open NAHI hogi
            alert("❌ " + (result.message || "एप्लीकेशन नंबर या मोबाइल नंबर गलत है।"));
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
        }
    } catch (error) {
        alert("⚠️ सर्वर एरर! इंटरनेट चेक करें।");
    } finally {
        // Button wapas normal karein
        btn.innerText = "Submit";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
