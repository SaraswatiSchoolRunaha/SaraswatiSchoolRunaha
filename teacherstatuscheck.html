<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Status Result</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 flex flex-col items-center justify-start min-h-screen font-sans antialiased">

    <div class="w-full max-w-6xl border-4 border-blue-700 bg-white p-6 md:p-8 shadow-xl mt-10">
        
        <div class="flex justify-between items-center mb-6 border-b border-slate-200 pb-4">
            <h2 class="text-xl font-bold text-blue-700">📋 Verification Result / सत्यापन परिणाम</h2>
            <a href="tstatussearch.html" class="bg-slate-600 text-white text-xs font-bold py-1.5 px-4 rounded hover:bg-slate-700">← Back to Search</a>
        </div>

        <div class="overflow-x-auto w-full border border-slate-200 rounded-md shadow-sm mb-4" id="tableWrapper">
            <table class="w-full text-left border-collapse bg-white">
                <thead>
                    <tr class="bg-slate-50 text-slate-700 border-b-2 border-blue-700 text-[11px] font-bold uppercase tracking-wider">
                        <th class="px-4 py-3.5">Mobile</th>
                        <th class="px-4 py-3.5">Student Name</th>
                        <th class="px-4 py-3.5">Father's Name</th>
                        <th class="px-4 py-3.5">Mother's Name</th>
                        <th class="px-3 py-3.5 text-center">DOB</th>
                        <th class="px-3 py-3.5 text-center">Class</th>
                        <th class="px-3 py-3.5 text-center">Medium</th>
                        <th class="px-3 py-3.5 text-center">Gender</th>
                        <th class="px-3 py-3.5 text-center">Category</th>
                        <th class="px-4 py-3.5 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="tableDataBody" class="text-xs text-slate-700 divide-y divide-slate-100 font-medium">
                    <tr id="statusRow">
                        <td colspan="10" class="text-center py-10 text-slate-500 font-medium text-sm">
                            🔄 Fetching records from database, please wait...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="errorCard" class="hidden p-4 rounded-md bg-red-50 border border-red-200 text-red-800 text-sm font-medium text-center max-w-xl mx-auto">
            ❌ रिकॉर्ड नहीं मिला! दर्ज किया गया एप्लीकेशन नंबर या मोबाइल नंबर डेटाबेस में उपलब्ध नहीं है।
        </div>
    </div>

    <script>
        // 🛠️ अपना GOOGLE APPS SCRIPT URL यहाँ डालें:
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7oU8z9XmmEnyhLAWJFuzcIMzCOOg4VwmW-FWGaHb-Pe_XMi2vs81Rdn5poBSYuWwmXw/exec";

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const appNo = urlParams.get('appNo');
            const mobile = urlParams.get('mobile');
            const tableBody = document.getElementById("tableDataBody");
            const statusRow = document.getElementById("statusRow");

            if (!appNo || !mobile) {
                statusRow.innerHTML = `<td colspan="10" class="text-center py-6 text-red-600 font-bold">❌ Invalid Request! Parameters missing.</td>`;
                return;
            }

            // Google Sheets से डेटा फ़ेच करने का फंक्शन
            const callbackName = "handleSheetsResponse";
            window[callbackName] = function(response) {
                // पुराना लोडिंग मैसेज हटाएँ
                statusRow.remove();

                if (response && response.found) {
                    let statusBadge = response.status.toLowerCase() === "approved" 
                        ? `<span class="bg-green-100 text-green-800 px-2.5 py-1 rounded text-[10px] font-bold uppercase block text-center">✅ Approved</span>`
                        : `<span class="bg-yellow-100 text-yellow-800 px-2.5 py-1 rounded text-[10px] font-bold uppercase block text-center">⏳ Under Review</span>`;

                    // टेबल के अंदर लाइव डेटा जोड़ना
                    tableBody.innerHTML = `
                        <tr class="hover:bg-slate-50 transition-colors animate-fade-in">
                            <td class="px-4 py-4 font-mono">${response.mobile}</td>
                            <td class="px-4 py-4 font-bold text-slate-900 uppercase">${response.studentName}</td>
                            <td class="px-4 py-4 uppercase">${response.fatherName}</td>
                            <td class="px-4 py-4 uppercase">${response.motherName}</td>
                            <td class="px-3 py-4 text-center whitespace-nowrap">${response.dob}</td>
                            <td class="px-3 py-4 text-center">${response.studentClass}</td>
                            <td class="px-3 py-4 text-center uppercase">${response.medium}</td>
                            <td class="px-3 py-4 text-center uppercase">${response.gender}</td>
                            <td class="px-3 py-4 text-center uppercase">${response.category}</td>
                            <td class="px-4 py-4 text-center">${statusBadge}</td>
                        </tr>
                    `;
                } else {
                    // रिकॉर्ड न मिलने पर खाली रो दिखाना और एरर कार्ड ऑन करना
                    tableBody.innerHTML = `<td colspan="10" class="text-center py-6 text-slate-400">No data available</td>`;
                    document.getElementById("errorCard").classList.remove("hidden");
                }
                document.getElementById('jsonpScript').remove();
                delete window[callbackName];
            };

            // API रिक्वेस्ट भेजना
            const script = document.createElement('script');
            script.id = 'jsonpScript';
            script.src = `${WEB_APP_URL}?appNo=${encodeURIComponent(appNo)}&mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
