<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Receipt System | Search</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* Main Container जैसा आपकी इमेज में है */
  .main-box {
    background: white;
    width: 90%;
    max-width: 900px;
    padding: 40px;
    border: 3px solid #1e5ba3; /* Blue Border */
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border-radius: 4px;
    text-align: center;
  }

  /* Title with Icon */
  .title-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
  }

  .title-section h2 {
    color: #1e5ba3;
    margin: 0;
    font-size: 24px;
    font-weight: bold;
  }

  /* Input Row (Application & Mobile Number) */
  .input-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  input[type="text"] {
    flex: 1;
    min-width: 250px;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
  }

  input[type="text"]:focus {
    border-color: #1e5ba3;
    box-shadow: 0 0 5px rgba(30,91,163,0.2);
  }

  /* Captcha Area */
  .captcha-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  #captcha {
    background: white;
    border: 1px solid #000;
    padding: 8px 25px;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 4px;
    border-radius: 6px;
    user-select: none;
  }

  .btn-refresh {
    background: #ff9800; /* Orange color from image */
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Captcha Input Box */
  .captcha-box {
    width: 50%;
    margin: 0 auto 25px;
  }

  .captcha-box input {
    text-align: center;
    width: 100%;
    border: 1px solid #1e5ba3;
  }

  /* Submit Button */
  .btn-submit {
    background: #4caf50; /* Green color from image */
    color: white;
    border: none;
    padding: 12px 60px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn-submit:hover {
    background: #43a047;
    transform: translateY(-2px);
  }

  /* Mobile Responsive */
  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    .captcha-box { width: 100%; }
  }
</style>
</head>
<body>

<div class="main-box">
  <div class="title-section">
    <span>🎓</span>
    <h2>Application Receipt System</h2>
  </div>

  <div class="input-row">
    <input type="text" id="appNo" placeholder="Application Number" disabled style="background: #f9f9f9; cursor: not-allowed;">
    <input type="text" id="mobile1" placeholder="Mobile Number" maxlength="10" inputmode="numeric">
  </div>

  <div class="captcha-container">
    <div id="captcha">LOADING</div>
    <button class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
  </div>

  <div class="captcha-box">
    <input type="text" id="captchaInput" placeholder="Enter Captcha">
  </div>

  <button class="btn-submit" onclick="searchData()">Submit</button>
</div>

<script>
let currentCaptcha = "";

// कैप्चा बनाने का फंक्शन
function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  currentCaptcha = "";
  for(let i=0; i<6; i++){
    currentCaptcha += chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("captcha").innerText = currentCaptcha;
}

// सर्च फंक्शन
function searchData(){
  let mobile = document.getElementById("mobile1").value.trim();
  let captchaInput = document.getElementById("captchaInput").value.trim();

  if(mobile.length !== 10 || isNaN(mobile)){
    alert("कृपया 10 अंकों का मान्य मोबाइल नंबर दर्ज करें।");
    return;
  }

  if(captchaInput.toUpperCase() !== currentCaptcha.toUpperCase()){
    alert("कैप्चा कोड गलत है।");
    generateCaptcha();
    document.getElementById("captchaInput").value = "";
    return;
  }

  // Listbox.html पर मोबाइल नंबर भेजना
  window.location.href = "Listbox.html?mobile1=" + encodeURIComponent(mobile);
}

// पेज लोड होते ही कैप्चा दिखाएँ
window.onload = generateCaptcha;
</script>

</body>
</html>
