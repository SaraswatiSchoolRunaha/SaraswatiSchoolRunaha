<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Application</title>

<style>
body{
  font-family:Arial;
  background:#e3f2fd;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:25px;
  border-radius:10px;
  width:350px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:#1565c0;
  color:#fff;
  border:none;
  cursor:pointer;
}

#captcha{
  background:#eee;
  padding:8px;
  display:inline-block;
  margin-bottom:5px;
}
</style>
</head>

<body>

<div class="box">
  <h3>Find Application No</h3>

  <input type="text" id="mobile1" placeholder="Mobile Number">

  <div id="captcha"></div>
  <button onclick="generateCaptcha()">Refresh</button>

  <input type="text" id="captchaInput" placeholder="Enter Captcha">

  <button onclick="searchData()">Search</button>
</div>

<script>
let currentCaptcha="";

function generateCaptcha(){
  let chars="ABCDEFG123456789";
  currentCaptcha="";
  for(let i=0;i<5;i++){
    currentCaptcha+=chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("captcha").innerText=currentCaptcha;
}

function searchData(){
  let mobile=document.getElementById("mobile1").value;
  let captchaInput=document.getElementById("captchaInput").value;

  if(mobile.length!=10){
    alert("Enter valid mobile");
    return;
  }

  if(captchaInput!=currentCaptcha){
    alert("Wrong captcha");
    generateCaptcha();
    return;
  }

  // Redirect
  window.location.href="Listbox.html?mobile1="+mobile1;
}

generateCaptcha();
</script>

</body>
</html>
