<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search & Update Admission</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --border-color: #002366; --primary: #2563eb; }
        body { font-family: 'Poppins', sans-serif; background: #e6f0ff; padding: 20px; }
        
        .search-card { 
            background: white; max-width: 550px; margin: auto; padding: 30px;
            border: 4px double var(--border-color); border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 35, 102, 0.2);
        }

        h2 { text-align: center; color: var(--border-color); text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }

        .captcha-container { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 10px; border-radius: 10px; margin-top: 5px; }
        #captchaBox { background: #002366; color: #fff; padding: 8px 15px; border-radius: 6px; font-weight: bold; letter-spacing: 5px; }

        .btn-submit { width: 100%; background: #008000; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1.1rem; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0, 35, 102, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 15px; position: relative; }
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .edit-btn { background: #2563eb; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; border:none; cursor:pointer; }
        .loader { text-align: center; display: none; color: #002366; margin-top: 10px; }
    </style>
</head>
<body>

<div class="search-card">
    <h2>Search & Edit Record</h2>
    
    <div class="input-group">
        <label>Registered Mobile Number</label>
        <input type="tel" id="mobile1" maxlength="10" placeholder="Enter mobile1 number">
    </div>

    <div class="input-group">
        <label>Security Check</label>
        <div class="captcha-container">
            <div id="captchaBox">XXXXX</div>
            <button type="button" onclick="generateCaptcha()" style="border:none; background:none; color:blue; cursor:pointer;">Refresh</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter Captcha Code" style="margin-top:10px;">
    </div>

    <button class="btn-submit" onclick="handleSearch()">FIND & UPDATE DATA</button>
    <div class="loader" id="loader">Searching Database...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3 style="border-bottom: 2px solid #002366;">Select Record to Edit</h3>
        <div id="resultsList"></div>
        <button onclick="closeModal()" style="margin-top:15px; width:100%; padding:10px;">Close</button>
    </div>
</div>

<script>
    const scriptURL = "YOUR_APPS_SCRIPT_URL_HERE"; // Apni URL yahan dalein

    function generateCaptcha() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let captcha = "";
        for (let i = 0; i < 5; i++) captcha += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById("captchaBox").innerText = captcha;
        window.currentCaptcha = captcha;
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    async function handleSearch() {
        const mobileValue = document.getElementById('mobile1').value.trim();
        const capInput = document.getElementById('captchaInput').value.trim().toUpperCase();

        if(!mobileValue || mobileValue.length < 10) { alert("कृपया सही मोबाइल नंबर भरें!"); return; }
        if(capInput !== window.currentCaptcha) { alert("कैप्चा गलत है!"); generateCaptcha(); return; }

        document.getElementById('loader').style.display = 'block';

        try {
            // Hum "mobile1" parameter bhej rahe hain
            const res = await fetch(`${scriptURL}?action=search&mobile1=${mobileValue}`);
            const data = await res.json();

            const list = document.getElementById('resultsList');
            list.innerHTML = "";

            if (data.length > 0) {
                data.forEach(row => {
                    list.innerHTML += `
                        <div class="result-item">
                            <div>
                                <strong>${row.studentName}</strong><br>
                                <small>ID: ${row.id} | Father: ${row.father}</small>
                            </div>
                            <button class="edit-btn" onclick="editRecord('${row.id}')">Edit Data</button>
                        </div>
                    `;
                });
                document.getElementById('modalOverlay').style.display = 'flex';
            } else {
                alert("कोई रिकॉर्ड नहीं मिला।");
            }
        } catch (e) {
            alert("सर्वर त्रुटि!");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function editRecord(id) {
        // Yahan aap user ko admission form par bhej sakte hain data update karne ke liye
        // Example: window.location.href = "AdmissionForm.html?id=" + id;
        alert("Redirecting to update ID: " + id);
    }

    window.onload = generateCaptcha;
</script>

</body>
</html>
