<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Application Number</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
}

/* Glass Card */
.card{
  width:380px;
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  color:#fff;
  text-align:center;
}

h2{
  margin-bottom:20px;
}

/* Input */
.input-box{
  position:relative;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
  color:#fff;
}

input::placeholder{
  color:#ddd;
}

/* Captcha */
.captcha-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

#captcha{
  font-weight:bold;
  letter-spacing:3px;
  background:#fff;
  color:#000;
  padding:8px 15px;
  border-radius:8px;
}

.refresh{
  cursor:pointer;
  font-size:18px;
}

/* Button */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00e5ff;
  transform:scale(1.05);
}

/* Loader */
.loader{
  display:none;
  margin-top:10px;
}

.loader span{
  display:inline-block;
  width:8px;
  height:8px;
  margin:3px;
  background:#fff;
  border-radius:50%;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

/* Result */
.result{
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  display:none;
}

.success{
  background:#00c853;
}

.error{
  background:#d50000;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔍 Find Application No.</h2>

  <div class="input-box">
    <input type="text" id="mobile" placeholder="Enter Mobile Number">
  </div>

  <div class="captcha-box">
    <div id="captcha"></div>
    <div class="refresh" onclick="generateCaptcha()">🔄</div>
  </div>

  <div class="input-box">
    <input type="text" id="captchaInput" placeholder="Enter Captcha">
  </div>

  <button onclick="searchData()">Search</button>

  <div class="loader" id="loader">
    <span></span><span></span><span></span>
  </div>

  <div id="result" class="result"></div>

</div>

<script>
let currentCaptcha="";

function generateCaptcha(){
  let chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  currentCaptcha="";
  for(let i=0;i<5;i++){
    currentCaptcha+=chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("captcha").innerText=currentCaptcha;
}

function searchData(){
  let mobile=document.getElementById("mobile").value;
  let captchaInput=document.getElementById("captchaInput").value;
  let result=document.getElementById("result");
  let loader=document.getElementById("loader");

  result.style.display="none";

  if(mobile.length!=10){
    showResult("Enter valid 10 digit mobile number","error");
    return;
  }

  if(captchaInput!=currentCaptcha){
    showResult("Wrong Captcha","error");
    generateCaptcha();
    return;
  }

  loader.style.display="block";

  setTimeout(()=>{
    let students=JSON.parse(localStorage.getItem("students"))||[];
    let found=students.find(s=>s.mobile1==mobile);

    loader.style.display="none";

    if(found){
      showResult("Application No: "+found.appno,"success");
    }else{
      showResult("No Record Found","error");
    }
  },1000);
}

function showResult(msg,type){
  let result=document.getElementById("result");
  result.innerText=msg;
  result.className="result "+type;
  result.style.display="block";
}

generateCaptcha();
</script>

</body>
</html>
