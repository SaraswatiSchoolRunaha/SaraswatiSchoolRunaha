<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Receipt System | Search</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* मुख्य बॉक्स - Capture55.JPG जैसा */
  .main-box {
    background: white;
    width: 95%;
    max-width: 600px;
    padding: 40px;
    border: 3px solid #1e5ba3; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border-radius: 4px;
    text-align: center;
  }

  .title-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 35px;
  }

  .title-section h2 {
    color: #1e5ba3;
    margin: 0;
    font-size: 26px;
    font-weight: bold;
  }

  /* मोबाइल नंबर इनपुट - अब यह अकेला और बड़ा है */
  .input-group {
    margin-bottom: 25px;
  }

  input[type="text"] {
    width: 80%;
    padding: 14px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    text-align: center;
    transition: 0.3s;
  }

  input[type="text"]:focus {
    border-color: #1e5ba3;
    box-shadow: 0 0 8px rgba(30,91,163,0.2);
  }

  /* कैप्चा सेक्शन */
  .captcha-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
  }

  #captcha {
    background: #fff;
    border: 1px solid #000;
    padding: 10px 25px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 5px;
    border-radius: 6px;
    user-select: none;
    min-width: 120px;
  }

  .btn-refresh {
    background: #ff9800; 
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .captcha-input-box {
    width: 60%;
    margin: 0 auto 30px;
  }

  .captcha-input-box input {
    width: 100%;
    border: 1px solid #1e5ba3;
    background-color: #fff;
  }

  /* सबमिट बटन */
  .btn-submit {
    background: #4caf50; 
    color: white;
    border: none;
    padding: 14px 80px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn-submit:hover {
    background: #43a047;
    box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
  }
</style>
</head>
<body>

<div class="main-box">
  <div class="title-section">
    <span>🎓</span>
    <h2> Search Application </h2>
  </div>

  <!-- अब सिर्फ मोबाइल नंबर का कॉलम है -->
  <div class="input-group">
    <input type="text" id="mobile1" placeholder="Registered Mobile Number" maxlength="10" inputmode="numeric">
  </div>

  <!-- कैप्चा कोड एरिया -->
  <div class="captcha-container">
    <div id="captcha">...</div>
    <button class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
  </div>

  <!-- कैप्चा इनपुट - यहाँ कोड डालना अनिवार्य है -->
  <div class="captcha-input-box">
    <input type="text" id="captchaInput" placeholder="Enter Captcha Code">
  </div>

  <button class="btn-submit" onclick="searchData()">Submit</button>
</div>

<script>
let currentCaptcha = "";

// नया कैप्चा कोड जनरेट करने का फंक्शन
function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  currentCaptcha = "";
  for(let i=0; i<6; i++){
    currentCaptcha += chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("captcha").innerText = currentCaptcha;
  // कैप्चा बॉक्स को खाली कर दें ताकि हर बार नया डालना पड़े
  document.getElementById("captchaInput").value = "";
}

// डेटा सर्च और वैलिडेशन
function searchData(){
  let mobile = document.getElementById("mobile1").value.trim();
  let captchaInput = document.getElementById("captchaInput").value.trim();

  // मोबाइल नंबर की जाँच
  if(mobile.length !== 10 || isNaN(mobile)){
    alert("कृपया 10 अंकों का मान्य मोबाइल नंबर दर्ज करें।");
    return;
  }

  // कैप्चा की अनिवार्य जाँच
  if(captchaInput === ""){
    alert("कृपया कैप्चा कोड दर्ज करें।");
    return;
  }

  if(captchaInput.toUpperCase() !== currentCaptcha.toUpperCase()){
    alert("कैप्चा कोड गलत है। नया कोड आ रहा है...");
    generateCaptcha(); // गलत होने पर तुरंत नया कैप्चा
    return;
  }

  // सब सही होने पर Listbox पर भेजें
  window.location.href = "Listbox.html?mobile1=" + encodeURIComponent(mobile);
}

// पेज खुलते ही कैप्चा लोड करें
window.onload = generateCaptcha;
</script>

</body>
</html>
