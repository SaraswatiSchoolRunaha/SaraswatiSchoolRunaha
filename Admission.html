<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Form with Photo Preview & Captcha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', Arial, sans-serif;
  background: #e6f0ff;
  margin:0;
  padding:20px;
}

.form-container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  border-radius:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
  padding:30px;
  border:2px solid #002366;
}

h2 {
  text-align: center;
  font-family: 'Luckiest Guy', cursive;
  font-size: 36px;
  background: linear-gradient(45deg, #ffcc00, #ff0066, #00ccff);
  -webkit-background-clip: text;
  color: transparent;
  border-bottom: 4px solid #004080;
  display: inline-block;
}

h3{background:#002366;color:#fff;padding:10px;border-radius:8px;margin-top:20px;}
label{font-weight:500;margin-top:10px;display:block;}
input, select, textarea{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc;}

.row{display:flex;gap:15px;flex-wrap:wrap;}
.row>div{flex:1;}

button[type="submit"]{
  width:200px;
  display:block;
  margin:20px auto;
  padding:18px;
  background:green;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:900;
}

.captcha-box{display:flex;gap:10px;align-items:center;}
.captcha-code{background:#e0e0e0;padding:3px 8px;border-radius:5px;}

.photo-preview{
  width:150px;
  height:150px;
  border:1px solid #ccc;
  object-fit:cover;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="form-container">

<h2>Admission Form</h2>

<form id="admissionForm">

<h3>Student Details</h3>

<label>Session (Year)</label>
<select required>
  <option value="">Select Session</option>
  <option>2024-25</option>
  <option>2025-26</option>
  <option>2026-27</option>
  <option>2027-28</option>
</select>

<label>Student Name</label>
<input type="text" required>

<div class="row">
  <div>
    <label>Father Name</label>
    <input type="text" required>
  </div>
  <div>
    <label>Mother Name</label>
    <input type="text" required>
  </div>
</div>

<label>Date of Birth</label>
<input type="date" required>

<h3>Upload Photo</h3>
<input type="file" id="photoUpload" accept="image/*">
<img id="photoPreview" class="photo-preview">

<h3>Captcha</h3>
<div class="captcha-box">
  <div id="captchaCode" class="captcha-code">XXXXXX</div>
  <button type="button" onclick="generateCaptcha()">Refresh</button>
</div>

<input type="text" id="captchaInput" placeholder="Enter Captcha" required>

<button type="submit">Submit Admission</button>

</form>
</div>

<script>
// Captcha
function generateCaptcha(){
  let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code="";
  for(let i=0;i<6;i++){
    code += chars.charAt(Math.floor(Math.random()*chars.length));
  }
  document.getElementById("captchaCode").innerText = code;
}
generateCaptcha();

// Photo preview
document.getElementById("photoUpload").addEventListener("change", function(){
  let file = this.files[0];
  let reader = new FileReader();
  reader.onload = function(e){
    document.getElementById("photoPreview").src = e.target.result;
  }
  reader.readAsDataURL(file);
});

// Submit
document.getElementById("admissionForm").addEventListener("submit", function(e){
  e.preventDefault();

  let userCaptcha = document.getElementById("captchaInput").value;
  let realCaptcha = document.getElementById("captchaCode").innerText;

  if(userCaptcha !== realCaptcha){
    alert("Captcha wrong");
    generateCaptcha();
    return;
  }

  alert("Form submitted successfully!");
  this.reset();
  generateCaptcha();
});
</script>

</body>
</html>
