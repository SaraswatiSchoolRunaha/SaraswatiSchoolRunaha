<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',Arial;
  background:#e6f0ff;
  padding:20px;
}

.form-container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

.row{display:flex;gap:10px}
.row>div{flex:1}

button{
  width:200px;
  padding:12px;
  background:green;
  color:white;
  border:0;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="form-container">

<h2>Admission Form</h2>

<form id="admissionForm">

<input id="studentName" placeholder="Student Name" required>
<input id="fatherName" placeholder="Father Name" required>
<input id="motherName" placeholder="Mother Name" required>
<input id="dob" type="date" required>

<input id="session" placeholder="Session">
<input id="category" placeholder="Category">

<div class="row">
  <div><input id="state" placeholder="State"></div>
  <div><input id="district" placeholder="District"></div>
</div>

<div class="row">
  <div><input id="tehsil" placeholder="Tehsil"></div>
  <div><input id="village" placeholder="Village"></div>
</div>

<input id="mobile" placeholder="Mobile Number">
<textarea id="address" placeholder="Address"></textarea>

<input id="aadhaar" placeholder="Aadhaar">
<input id="samagra" placeholder="Samagra">

<input id="bank" placeholder="Bank Name">
<input id="account" placeholder="Account No">
<input id="ifsc" placeholder="IFSC">

<button type="submit">Submit</button>

</form>
</div>

<script>

// 🔴 1. यहाँ अपना Google Script link डालना है
const scriptURL = "PASTE_YOUR_GOOGLE_SCRIPT_LINK_HERE";

// 🔴 2. submit form
document.getElementById("admissionForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    studentName: document.getElementById("studentName").value,
    fatherName: document.getElementById("fatherName").value,
    motherName: document.getElementById("motherName").value,
    dob: document.getElementById("dob").value,
    session: document.getElementById("session").value,
    category: document.getElementById("category").value,
    state: document.getElementById("state").value,
    district: document.getElementById("district").value,
    tehsil: document.getElementById("tehsil").value,
    village: document.getElementById("village").value,
    mobile: document.getElementById("mobile").value,
    address: document.getElementById("address").value,
    aadhaar: document.getElementById("aadhaar").value,
    samagra: document.getElementById("samagra").value,
    bank: document.getElementById("bank").value,
    account: document.getElementById("account").value,
    ifsc: document.getElementById("ifsc").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    alert("Data Google Sheet me save ho gaya!");
    document.getElementById("admissionForm").reset();
  })
  .catch(err => alert("Error aa gaya"));
});

</script>

</body>
</html>
