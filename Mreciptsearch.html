<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Receipt System | Search</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f9;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    height: 100vh;
    margin: 0;
  }

  /* मुख्य बॉक्स - जैसा आपने माँगा */
  .main-box {
    background: white;
    width: 95%;
    max-width: 600px;
    padding: 40px;
    border: 3px solid #1e5ba3; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border-radius: 4px;
    text-align: center;
  } 

  .title-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 35px;
  }

  .title-section h2 {
    color: #1e5ba3;
    margin: 0;
    font-size: 26px;
    font-weight: bold;
  }

  .input-group {
    margin-bottom: 25px;
  }

  /* इनपुट फील्ड्स स्टाइल */
  input[type="text"] {
    width: 80%;
    padding: 14px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    text-align: center;
    transition: 0.3s;
    box-sizing: border-box;
  }

  input[type="text"]:focus {
    border-color: #1e5ba3;
    box-shadow: 0 0 8px rgba(30,91,163,0.2);
  }

  /* कैप्चा कंटेनर */
  .captcha-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
  }

  #captcha {
    background: #fff;
    border: 1px solid #000;
    padding: 10px 25px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 5px;
    border-radius: 6px;
    user-select: none;
    min-width: 120px;
    font-style: italic;
    text-decoration: line-through;
  }

  .btn-refresh {
    background: #ff9800; 
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .captcha-input-box {
    width: 60%;
    margin: 0 auto 30px;
  }

  .captcha-input-box input {
    width: 100%;
    border: 1px solid #1e5ba3;
    background-color: #fff;
  }

  /* सबमिट बटन - हरा रंग जैसा आपके डिजाइन में था */
  .btn-submit {
    background: #4caf50; 
    color: white;
    border: none;
    padding: 14px 80px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn-submit:hover {
    background: #43a047;
    box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
  }
</style>
</head>
<body>

<div class="main-box">
  <div class="title-section">
    <span>🎓</span>
    <h2> Student Portal Search </h2>
  </div>

  <!-- डेटा फील्ड्स: Application Number और Roll Number -->
  <div class="input-group">
    <input type="text" id="appNo" placeholder="Application Number (Eg: APP-2024-001)">
  </div>

  <div class="input-group">
    <input type="text" id="rollNo" placeholder="Roll Number (Eg: 12345678)">
  </div>

  <!-- कैप्चा सेक्शन -->
  <div class="captcha-container">
    <div id="captcha">लोड हो रहा है...</div>
    <button class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
  </div>

  <div class="captcha-input-box">
    <input type="text" id="capInput" placeholder="Enter Captcha Code">
  </div>

  <button class="btn-submit" onclick="handleSearch()">Search Data</button>
</div>

<script>
let currentCap = "";

// कैप्चा बनाने का फंक्शन
function generateCaptcha() {
    const chars = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";
    currentCap = "";
    for(let i=0; i<5; i++) {
        currentCap += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captcha").innerText = currentCap;
    document.getElementById("capInput").value = "";
}

// सर्च हैंडल करना
function handleSearch() {
    const app = document.getElementById("appNo").value.trim();
    const roll = document.getElementById("rollNo").value.trim();
    const input = document.getElementById("capInput").value.trim().toUpperCase();

    if (!app || !roll) {
        alert("कृपया सभी विवरण भरें!");
        return;
    }

    if (input !== currentCap) {
        alert("कैप्चा कोड गलत है!");
        generateCaptcha();
        return;
    }

    // डेटा को URL के साथ जोड़कर भेजना
    const url = "marksheetrecipt.html?app=" + encodeURIComponent(app) + "&roll=" + encodeURIComponent(roll);
    window.open(url, "_blank");
}

// पेज लोड होते ही कैप्चा दिखाएँ
window.onload = generateCaptcha;
</script>

</body>
</html>
