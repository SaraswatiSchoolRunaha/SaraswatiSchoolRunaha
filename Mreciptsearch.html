<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Receipt System | Search</title>
    <style>
        :root {
            --primary: #004e92;
            --accent: #ff9933;
            --bg: #ffffff;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        /* कार्ड का डिजाइन - Student Portal स्टाइल */
        .search-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ऊपर की नीली/नारंगी पट्टी */
        .search-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .header-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-box h2 {
            margin: 0;
            color: var(--primary);
            letter-spacing: 1px;
            font-size: 24px;
            font-weight: bold;
        }

        .header-box p {
            font-size: 14px;
            color: #777;
            margin: 5px 0 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0,78,146,0.1);
        }

        /* कैप्चा सेक्शन */
        .captcha-wrapper {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .captcha-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #captcha {
            background: #fff;
            padding: 8px 20px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #444;
            border-radius: 5px;
            border: 1px solid #ccc;
            user-select: none;
            font-style: italic;
            text-decoration: line-through;
            background-image: radial-gradient(#ddd 1px, transparent 0);
            background-size: 10px 10px;
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.4s ease;
        }

        .refresh-btn:hover { transform: rotate(180deg); }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary), #0072ff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,78,146,0.2);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,78,146,0.3);
        }
    </style>
</head>
<body>

<div class="search-card">
    <div class="header-box">
        <h2>SEARCH APPLICATION</h2>
        <p>अपनी जानकारी सुरक्षित रूप से खोजें</p>
    </div>

    <!-- डेटा वही है: mobile1 -->
    <div class="input-group">
        <label>Registered Mobile Number</label>
        <input type="text" id="mobile1" placeholder="Registered Mobile Number" maxlength="10" inputmode="numeric">
    </div>

    <div class="captcha-wrapper">
        <div class="captcha-row">
            <div id="captcha">...</div>
            <button class="refresh-btn" onclick="generateCaptcha()" title="Reload Captcha">↻</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter Captcha Code" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; box-sizing: border-box; outline: none;">
    </div>

    <button class="btn-submit" onclick="searchData()">SUBMIT</button>
</div>

<script>
let currentCaptcha = "";

// कैप्चा जनरेट करने का वही फंक्शन
function generateCaptcha(){
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  currentCaptcha = "";
  for(let i=0; i<6; i++){
    currentCaptcha += chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("captcha").innerText = currentCaptcha;
  document.getElementById("captchaInput").value = "";
}

// डेटा सर्च लॉजिक - बिल्कुल वही जो आपने दिया था
function searchData(){
  let mobile = document.getElementById("mobile1").value.trim();
  let captchaInput = document.getElementById("captchaInput").value.trim();

  if(mobile.length !== 10 || isNaN(mobile)){
    alert("कृपया 10 अंकों का मान्य मोबाइल नंबर दर्ज करें।");
    return;
  }

  if(captchaInput === ""){
    alert("कृपया कैप्चा कोड दर्ज करें।");
    return;
  }

  if(captchaInput.toUpperCase() !== currentCaptcha.toUpperCase()){
    alert("कैप्चा कोड गलत है।");
    generateCaptcha();
    return;
  }

  // वही URL: Listbox.html?mobile1=
  window.location.href = "Listbox.html?mobile1=" + encodeURIComponent(mobile);
}

window.onload = generateCaptcha;
</script>

</body>
</html>
