<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal | Search</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #ffffff; /* बैकग्राउंड पूरी तरह सफ़ेद */
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px;
    height: 100vh;
    margin: 0;
  }

  /* मुख्य बॉक्स - बॉर्डर वाला डिज़ाइन जैसा आपने माँगा */
  .main-box {
    background: white;
    width: 95%;
    max-width: 600px;
    padding: 25px;
    border: 3px solid #1e5ba3; /* गहरा नीला बॉर्डर */
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border-radius: 4px;
    text-align: center;
  } 

  .title-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 35px;
  }

  .title-section h2 {
    color: #1e5ba3;
    margin: 0;
    font-size: 26px;
    font-weight: bold;
    text-transform: uppercase;
  }

  /* इनपुट ग्रुप */
  .input-group {
    margin-bottom: 25px;
  }

  input[type="text"] {
    width: 85%;
    padding: 14px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    text-align: center;
    transition: 0.3s;
    box-sizing: border-box;
  }

  input[type="text"]:focus {
    border-color: #1e5ba3;
    box-shadow: 0 0 8px rgba(30,91,163,0.2);
  }

  /* कैप्चा सेक्शन */
  .captcha-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
  }

  #captcha {
    background: #fff;
    border: 1px solid #000;
    padding: 10px 25px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 5px;
    border-radius: 6px;
    user-select: none;
    min-width: 130px;
    font-style: italic;

  }

  .btn-refresh {
    background: #ff9800; /* ऑरेंज रिफ्रेश बटन */
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .captcha-input-box {
    width: 65%;
    margin: 0 auto 30px;
  }

  .captcha-input-box input {
    width: 100%;
    border: 1px solid #1e5ba3;
    background-color: #fff;
  }

  /* सबमिट बटन - हरा रंग */
  .btn-submit {
    background: #4caf50; 
    color: white;
    border: none;
    padding: 14px 80px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
  }

  .btn-submit:hover {
    background: #43a047;
    box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
  }
</style>
</head>
<body>

<div class="main-box">
  <div class="title-section">
    <span>🎓</span>
    <h2> Student Marksheet Recipt Search</h2>
  </div>

  <!-- इनपुट फ़ील्ड्स (Data वही है) -->
  <div class="input-group">
    <input type="text" id="appNo" placeholder="Appcation Number - CORR -001">
  </div>

  <div class="input-group">
    <input type="text" id="rollNo" placeholder=" Enter Roll Number">
  </div>

  <!-- कैप्चा एरिया -->
  <div class="captcha-container">
    <div id="captcha">...</div>
    <button class="btn-refresh" onclick="generateCaptcha()">🔄 Refresh</button>
  </div>

  <!-- कैप्चा इनपुट -->
  <div class="captcha-input-box">
    <input type="text" id="capInput" placeholder="Enter Captcha Code">
  </div>

  <button class="btn-submit" onclick="handleSearch()">Search Data</button>
</div>

<script>
let currentCap = "";

// कैप्चा जनरेट करने का फंक्शन
function generateCaptcha() {
    const chars = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";
    currentCap = "";
    for(let i=0; i<5; i++) {
        currentCap += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captcha").innerText = currentCap;
    document.getElementById("capInput").value = "";
}

// सर्च हैंडलर
function handleSearch() {
    const app = document.getElementById("appNo").value.trim();
    const roll = document.getElementById("rollNo").value.trim();
    const input = document.getElementById("capInput").value.trim().toUpperCase();

    if (!app || !roll) {
        alert("कृपया सभी विवरण भरें!");
        return;
    }

    if (input !== currentCap) {
        alert("कैप्चा कोड गलत है!");
        generateCaptcha();
        return;
    }

    // रिजल्ट पेज पर भेजना
    const url = "marksheetrecipt.html?app=" + encodeURIComponent(app) + "&roll=" + encodeURIComponent(roll);
    window.open(url, "_blank");
}

// पेज लोड होते ही कैप्चा लोड करें और URL से डेटा फेच करें
window.onload = function() {
    generateCaptcha(); // कैप्चा जनरेट करें
    
    // URL से app और roll नंबर निकालने के लिए
    const urlParams = new URLSearchParams(window.location.search);
    const urlApp = urlParams.get('app');
    const urlRoll = urlParams.get('roll');
    
    // अगर URL में डेटा मौजूद है, तो इनपुट बॉक्स में भर दें
    if (urlApp) {
        document.getElementById("appNo").value = urlApp;
    }
    if (urlRoll) {
        document.getElementById("rollNo").value = urlRoll;
    }
};
  
</script>

</body>
</html>
