<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Marksheet | Student Portal</title>
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #ff9933;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .search-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary-color);
        }

        .search-card h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .search-card p {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        /* Captcha Styling */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #bbb;
            margin-bottom: 10px;
        }

        #captcha-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #333;
            user-select: none;
            background: #eee;
            padding: 5px 15px;
            border-radius: 4px;
            text-decoration: line-through; /* थोड़ा सुरक्षा के लिए */
        }

        .refresh-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--primary-color);
        }

        .search-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-btn:hover {
            background-color: #002244;
        }

        #error-msg {
            color: #d93025;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            display: none;
            background: #fbe9e7;
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="search-card">
    <h2>Student Portal</h2>
    <p>अपनी मार्कशीट/रसीद खोजने के लिए विवरण भरें</p>

    <div class="form-group">
        <label>Application Number</label>
        <input type="text" id="appNo" placeholder="Enter Application No.">
    </div>

    <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="rollNo" placeholder="Enter Roll Number">
    </div>

    <label style="font-size: 13px; font-weight: 600;">Security Code (Captcha)</label>
    <div class="captcha-container">
        <div id="captcha-code">XXXXX</div>
        <button class="refresh-btn" onclick="generateCaptcha()">↻</button>
    </div>

    <div class="form-group">
        <input type="text" id="captchaInput" placeholder="Enter code shown above">
    </div>

    <button class="search-btn" onclick="validateAndSearch()">VIEW MARKSHEET</button>

    <div id="error-msg"></div>
</div>

<script>
    let currentCaptcha = "";

    // पेज लोड होते ही कैप्चा बनाएँ
    window.onload = function() {
        generateCaptcha();
    };

    // नया कैप्चा कोड जनरेट करना
    function generateCaptcha() {
        const characters = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // भ्रम दूर करने के लिए I, O, 0, 1 हटा दिए
        currentCaptcha = "";
        for (let i = 0; i < 5; i++) {
            currentCaptcha += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        document.getElementById("captcha-code").innerText = currentCaptcha;
    }

    function validateAndSearch() {
        const appNo = document.getElementById("appNo").value.trim();
        const rollNo = document.getElementById("rollNo").value.trim();
        const captchaInput = document.getElementById("captchaInput").value.trim().toUpperCase();
        const errorMsg = document.getElementById("error-msg");

        // बेसिक वैलिडेशन
        if (!appNo || !rollNo) {
            showError("कृपया Application और Roll Number दोनों भरें।");
            return;
        }

        // कैप्चा वैलिडेशन
        if (captchaInput !== currentCaptcha) {
            showError("कैप्चा कोड गलत है! कृपया पुनः प्रयास करें।");
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
            return;
        }

        // अगर सब ठीक है
        errorMsg.style.display = "none";
        
        // यहाँ से डेटा खोजने का लॉजिक शुरू होगा
        alert("Searching for App: " + appNo + " and Roll: " + rollNo);
        
        // अगर आप Google Apps Script यूज़ कर रहे हैं तो यहाँ कॉल करें:
        /*
        google.script.run.withSuccessHandler(function(studentData) {
            if(studentData) {
               openReport(studentData, appNo); // आपका पुराना रिपोर्ट फंक्शन
            } else {
               showError("कोई रिकॉर्ड नहीं मिला। विवरण जांचें।");
            }
        }).getStudentData(appNo, rollNo);
        */
    }

    function showError(msg) {
        const errorMsg = document.getElementById("error-msg");
        errorMsg.innerText = msg;
        errorMsg.style.display = "block";
    }
</script>

</body>
</html>
