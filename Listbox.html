<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student List</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.box{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#1565c0;
  color:#fff;
}

button{
  padding:5px 10px;
  background:green;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Student List</h2>

  <table>
    <thead>
      <tr>
        <th>App No</th>
        <th>Name</th>
        <th>Father</th>
        <th>Mother</th>
        <th>DOB</th>
        <th>Class</th>
        <th>Medium</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>

// 🔹 URL से mobile लेना
let params = new URLSearchParams(window.location.search);
let mobile = params.get("mobile1");

if(mobile){
  mobile = mobile.trim();
}

// 🔹 LocalStorage से data लेना
let students = JSON.parse(localStorage.getItem("students")) || [];

console.log("All Students:", students);
console.log("Search Mobile:", mobile);

// 🔹 Filter (FINAL FIX)
let filtered = students.filter(s => 
  s.mobile1 && s.mobile1.toString().trim() === mobile
);

let html = "";

// 🔹 Data show
if(filtered.length > 0){
  filtered.forEach(s=>{
    html += `
    <tr>
      <td>${s.appno}</td>
      <td>${s.name}</td>
      <td>${s.father}</td>
      <td>${s.mother}</td>
      <td>${s.dob}</td>
      <td>${s.class}</td>
      <td>${s.medium}</td>
      <td>
        <button onclick="printRec('${s.appno}')">Print</button>
      </td>
    </tr>
    `;
  });
}else{
  html = "<tr><td colspan='8'>No Record Found</td></tr>";
}

// 🔹 Table में डालना
document.getElementById("data").innerHTML = html;

// 🔹 Print function
function printRec(appno){
  window.location.href = "reciptprint.html?appno=" + appno;
}

</script>

</body>
</html>
