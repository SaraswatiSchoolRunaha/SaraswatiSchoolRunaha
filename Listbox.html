<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student List</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.box{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#1565c0;
  color:#fff;
}

button{
  padding:5px 10px;
  background:green;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Student List</h2>

  <table>
    <thead>
      <tr>
        <th>App No</th>
        <th>Name</th>
        <th>Father</th>
        <th>Mother</th>
        <th>DOB</th>
        <th>Class</th>
        <th>Medium</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>

let params = new URLSearchParams(window.location.search);

// ✅ BEST: appNo use करो (mobile छोड़ दिया)
let appno = params.get("appNo");

// 🔹 LocalStorage data
let students = JSON.parse(localStorage.getItem("students")) || [];

console.log("All Students:", students);
console.log("Search AppNo:", appno);

// 🔥 FILTER FIXED (SAFE + ACCURATE)
let filtered = students.filter(s =>
  appno ? s.appno == appno : true   // अगर appNo नहीं है तो सब दिखाओ
);

let html = "";

// 🔹 Data show
if(filtered.length > 0){
  filtered.forEach(s=>{
    html += `
    <tr>
      <td>${s.appno}</td>
      <td>${s.name}</td>
      <td>${s.father}</td>
      <td>${s.mother}</td>
      <td>${s.dob}</td>
      <td>${s.class}</td>
      <td>${s.medium}</td>
      <td>
      <button onclick="printRec('${s.appno}','${s.mobile1}')">Print</button>
      </td>
    </tr>
    `;
  });
}else{
  html = "<tr><td colspan='8'>No Record Found</td></tr>";
}

// 🔹 Table render
document.getElementById("data").innerHTML = html;

// 🔹 Print function
function printRec(appno, mobile){
  window.location.href = "Reciptprint.html?appNo=" + appno + "&mobile=" + mobile;
}

</script>

</body>
</html>
