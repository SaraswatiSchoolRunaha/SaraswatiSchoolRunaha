<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal | Record List</title>

<style>
  /* Base Style */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f0f4f8;
    background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
    margin: 0;
    padding: 30px 15px;
  }

  /* Container Box */
  .box {
    max-width: 1100px;
    margin: auto;
    background: #fff;
    padding: 0; /* Header control ke liye zero padding */
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
    border: 1px solid #e0e0e0;
  }

  /* Table Header Title Section */
  .list-header {
    background: #1565c0;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .list-header h2 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.5px;
  }

  .total-count {
    background: rgba(255,255,255,0.2);
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 14px;
  }

  /* Table Design */
  .table-container {
    padding: 20px;
    overflow-x: auto; /* Mobile par table scroll ho sake */
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px; /* Table layout fix */
  }

  th {
    background: #f1f5f9;
    color: #455a64;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 13px;
    padding: 15px 10px;
    border-bottom: 2px solid #1565c0;
    text-align: center;
  }

  td {
    padding: 12px 10px;
    border-bottom: 1px solid #f0f0f0;
    color: #333;
    font-size: 14px;
    text-align: center;
  }

  /* Row Hover Effect */
  tr:hover td {
    background-color: #f9fbff;
  }

  /* Print Button Styling */
  .btn-print {
    padding: 8px 18px;
    background: #2e7d32; /* Rich Green */
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .btn-print:hover {
    background: #1b5e20;
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  /* Back Button (Optional but helpful) */
  .btn-back {
    display: inline-block;
    margin-bottom: 15px;
    color: #1565c0;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }

  /* Empty State */
  .no-data {
    padding: 50px;
    color: #999;
    font-style: italic;
  }
</style>
</head>

<body>

<div class="box">
  <div class="list-header">
    <h2>Student Records List</h2>
    <span class="total-count" id="count-label">Loading...</span>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>App No</th>
          <th>mobile1</th>
          <th>Student Name</th>
          <th>Father's Name</th>
          <th>Mother's Name</th>
          <th>DOB</th>
          <th>Class</th>
          <th>Medium</th>
          <th>gender</th>
          <th>category</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="data">
        </tbody>
    </table>
  </div>
</div>

<script>
  let params = new URLSearchParams(window.location.search);
  let appno = params.get("appNo");
  let mobile_search = params.get("mobile1"); // Check for mobile search too

  // LocalStorage data
  let students = JSON.parse(localStorage.getItem("students")) || [];

  // Filter Logic: Check for AppNo OR Mobile Number
  let filtered = students.filter(s => {
    if (appno) return s.appno == appno;
    if (mobile_search) return s.mobile1 == mobile_search;
    return true; 
  });

  let html = "";
  document.getElementById("count-label").innerText = filtered.length + " Record(s) Found";

  if(filtered.length > 0){
    filtered.forEach(s => {
      html += `
      <tr>
        <td style="font-weight:bold; color:#1565c0;">${s.appno}</td>
        <td style="text-align:left;">${s.mobile1}</td>
        <td style="text-align:left;">${s.name}</td>
        <td style="text-align:left;">${s.father}</td>
        <td>${s.mother}</td>
        <td>${s.dob}</td>
        <td><span style="background:#e3f2fd; padding:3px 8px; border-radius:4px; font-weight:bold;">${s.class}</span></td>
        <td>${s.medium}</td>
        <td>${s.gender}</td>
        <td>${s.category}</td>
        <td>
          <button class="btn-print" onclick="printRec('${s.appno}','${s.mobile1}')">
            🖨️ PRINT
          </button>
        </td>
      </tr>
      `;
    });
  } else {
    html = "<tr><td colspan='8' class='no-data'>No Record Found for this search.</td></tr>";
  }

  document.getElementById("data").innerHTML = html;

  // Print function
  function printRec(appno, mobile){
    window.location.href = "Reciptprint.html?appNo=" + appno + "&mobile=" + mobile;
  }
</script>

</body>
</html>
